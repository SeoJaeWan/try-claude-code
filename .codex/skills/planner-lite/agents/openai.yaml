interface:
  display_name: "Planner Lite"
  short_description: "Execute plan.md phases by orchestrating child agents in isolated worktrees."
  default_prompt: "Use $planner-lite to execute a finalized plan.md by dispatching each phase to its mapped named custom agent only, while planner-lite manages worktrees, validation, commits, and final merge coordination."

policy:
  allow_implicit_invocation: true
