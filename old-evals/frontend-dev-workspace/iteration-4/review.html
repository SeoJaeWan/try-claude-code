<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>평가 리뷰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #141413;
      --text-muted: #b0aea5;
      --accent: #d97757;
      --accent-hover: #c4613f;
      --green: #788c5d;
      --green-bg: #eef2e8;
      --red: #c44;
      --red-bg: #fceaea;
      --header-bg: #141413;
      --header-text: #faf9f5;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .header .instructions {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    .header .progress {
      font-size: 0.875rem;
      opacity: 0.8;
      text-align: right;
    }

    /* ---- Main content ---- */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ---- Sections ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .section-header {
      font-family: 'Poppins', sans-serif;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .section-body {
      padding: 1rem;
    }

    /* ---- Config badge ---- */
    .config-badge {
      display: inline-block;
      padding: 0.2rem 0.625rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-left: 0.75rem;
      vertical-align: middle;
    }
    .config-badge.config-primary {
      background: rgba(33, 150, 243, 0.12);
      color: #1976d2;
    }
    .config-badge.config-baseline {
      background: rgba(255, 193, 7, 0.15);
      color: #f57f17;
    }

    /* ---- Prompt ---- */
    .prompt-text {
      white-space: pre-wrap;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    /* ---- Outputs ---- */
    .output-file {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .output-file + .output-file {
      margin-top: 1rem;
    }
    .output-file-header {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .output-file-header .dl-btn {
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      opacity: 0.8;
    }
    .output-file-header .dl-btn:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .output-file-content {
      padding: 0.75rem;
      overflow-x: auto;
    }
    .output-file-content pre {
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .output-file-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .output-file-content iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    .output-file-content table {
      border-collapse: collapse;
      font-size: 0.8125rem;
      width: 100%;
    }
    .output-file-content table td,
    .output-file-content table th {
      border: 1px solid var(--border);
      padding: 0.375rem 0.5rem;
      text-align: left;
    }
    .output-file-content table th {
      background: var(--bg);
      font-weight: 600;
    }
    .output-file-content .download-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .output-file-content .download-link:hover {
      background: var(--border);
    }
    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      padding: 2rem;
      text-align: center;
    }

    /* ---- Feedback ---- */
    .prev-feedback {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.625rem 0.75rem;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .prev-feedback-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
      color: var(--text-muted);
    }
    .feedback-textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9375rem;
      line-height: 1.5;
      resize: vertical;
      color: var(--text);
    }
    .feedback-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .feedback-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      min-height: 1.1em;
    }

    /* ---- Grades (collapsible) ---- */
    .grades-toggle {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .grades-toggle:hover {
      color: var(--accent);
    }
    .grades-toggle .arrow {
      margin-right: 0.5rem;
      transition: transform 0.15s;
      font-size: 0.75rem;
    }
    .grades-toggle .arrow.open {
      transform: rotate(90deg);
    }
    .grades-content {
      display: none;
      margin-top: 0.75rem;
    }
    .grades-content.open {
      display: block;
    }
    .grades-summary {
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .grade-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .grade-pass { background: var(--green-bg); color: var(--green); }
    .grade-fail { background: var(--red-bg); color: var(--red); }
    .assertion-list {
      list-style: none;
    }
    .assertion-item {
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .assertion-item:last-child { border-bottom: none; }
    .assertion-status {
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .assertion-status.pass { color: var(--green); }
    .assertion-status.fail { color: var(--red); }
    .assertion-evidence {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      padding-left: 1.5rem;
    }

    /* ---- View tabs ---- */
    .view-tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-tab {
      font-family: 'Poppins', sans-serif;
      padding: 0.625rem 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .view-panel { display: none; }
    .view-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* ---- Benchmark view ---- */
    .benchmark-view {
      padding: 1.5rem 2rem;
      overflow-y: auto;
      flex: 1;
    }
    .benchmark-table {
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .benchmark-table th, .benchmark-table td {
      padding: 0.625rem 0.75rem;
      text-align: left;
      border: 1px solid var(--border);
    }
    .benchmark-table th {
      font-family: 'Poppins', sans-serif;
      background: var(--header-bg);
      color: var(--header-text);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .benchmark-table tr:hover { background: var(--bg); }
    .benchmark-table tr.benchmark-row-with { background: rgba(33, 150, 243, 0.06); }
    .benchmark-table tr.benchmark-row-without { background: rgba(255, 193, 7, 0.06); }
    .benchmark-table tr.benchmark-row-with:hover { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-without:hover { background: rgba(255, 193, 7, 0.12); }
    .benchmark-table tr.benchmark-row-avg { font-weight: 600; border-top: 2px solid var(--border); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-with { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-without { background: rgba(255, 193, 7, 0.12); }
    .benchmark-delta-positive { color: var(--green); font-weight: 600; }
    .benchmark-delta-negative { color: var(--red); font-weight: 600; }
    .benchmark-notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .benchmark-notes h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }
    .benchmark-notes ul {
      list-style: disc;
      padding-left: 1.25rem;
    }
    .benchmark-notes li {
      font-size: 0.8125rem;
      line-height: 1.6;
      margin-bottom: 0.375rem;
    }
    .benchmark-empty {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      padding: 3rem;
    }

    /* ---- Navigation ---- */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .nav-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      transition: all 0.15s;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .done-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .done-btn:hover {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .done-btn.ready {
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .done-btn.ready:hover {
      background: var(--accent-hover);
    }
    /* ---- Done overlay ---- */
    .done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .done-overlay.visible {
      display: flex;
    }
    .done-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
    }
    .done-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .done-card p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .done-card .btn-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .done-card button {
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
    }
    .done-card button:hover {
      background: var(--bg);
    }
    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--header-bg);
      color: var(--header-text);
      padding: 0.625rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app" style="height:100vh; display:flex; flex-direction:column;">
    <div class="header">
      <div>
        <h1>평가 리뷰: <span id="skill-name"></span></h1>
        <div class="instructions">각 출력을 검토하고 아래에 피드백을 남겨주세요. 화살표 키 또는 버튼으로 이동할 수 있습니다. 완료되면 피드백을 복사하여 Claude Code에 붙여넣으세요.</div>
      </div>
      <div class="progress" id="progress"></div>
    </div>

    <!-- View tabs (only shown when benchmark data exists) -->
    <div class="view-tabs" id="view-tabs" style="display:none;">
      <button class="view-tab active" onclick="switchView('outputs')">출력 결과</button>
      <button class="view-tab" onclick="switchView('benchmark')">벤치마크</button>
    </div>

    <!-- Outputs panel (qualitative review) -->
    <div class="view-panel active" id="panel-outputs">
    <div class="main">
      <!-- Prompt -->
      <div class="section">
        <div class="section-header">프롬프트 <span class="config-badge" id="config-badge" style="display:none;"></span></div>
        <div class="section-body">
          <div class="prompt-text" id="prompt-text"></div>
        </div>
      </div>

      <!-- Outputs -->
      <div class="section">
        <div class="section-header">출력</div>
        <div class="section-body" id="outputs-body">
          <div class="empty-state">출력 파일을 찾을 수 없습니다</div>
        </div>
      </div>

      <!-- Previous Output (collapsible) -->
      <div class="section" id="prev-outputs-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="togglePrevOutputs()">
            <span class="arrow" id="prev-outputs-arrow">&#9654;</span>
            이전 출력
          </div>
        </div>
        <div class="grades-content" id="prev-outputs-content"></div>
      </div>

      <!-- Grades (collapsible) -->
      <div class="section" id="grades-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="toggleGrades()">
            <span class="arrow" id="grades-arrow">&#9654;</span>
            평가 등급
          </div>
        </div>
        <div class="grades-content" id="grades-content"></div>
      </div>

      <!-- Feedback -->
      <div class="section">
        <div class="section-header">피드백</div>
        <div class="section-body">
          <textarea
            class="feedback-textarea"
            id="feedback"
            placeholder="이 출력에 대해 어떻게 생각하시나요? 문제점, 제안사항, 또는 잘된 점이 있나요?"
          ></textarea>
          <div class="feedback-status" id="feedback-status"></div>
          <div class="prev-feedback" id="prev-feedback" style="display:none;">
            <div class="prev-feedback-label">이전 피드백</div>
            <div id="prev-feedback-text"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="nav" id="outputs-nav">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&#8592; 이전</button>
      <button class="done-btn" id="done-btn" onclick="showDoneDialog()">모든 리뷰 제출</button>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">다음 &#8594;</button>
    </div>
    </div><!-- end panel-outputs -->

    <!-- Benchmark panel (quantitative stats) -->
    <div class="view-panel" id="panel-benchmark">
      <div class="benchmark-view" id="benchmark-content">
        <div class="benchmark-empty">벤치마크 데이터가 없습니다. 벤치마크를 실행하면 여기에 정량적 결과가 표시됩니다.</div>
      </div>
    </div>
  </div>

  <!-- Done overlay -->
  <div class="done-overlay" id="done-overlay">
    <div class="done-card">
      <h2>리뷰 완료</h2>
      <p>피드백이 저장되었습니다. Claude Code 세션으로 돌아가서 리뷰가 끝났다고 알려주세요.</p>
      <div class="btn-row">
        <button onclick="closeDoneDialog()">확인</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>

    const EMBEDDED_DATA = {"skill_name": "frontend-dev", "runs": [{"id": "notification-filter-with_skill", "prompt": "plans/sample-frontend-dashboard-notification-filter/plan.md의 Phase 1을 실행해줘. NotificationList에 all/unread 필터를 추가하고 empty state, error 처리까지 해줘", "eval_id": 1, "outputs": [{"name": "summary.md", "type": "text", "content": "# Phase 1 Execution Summary\n\n## Task\n\nAdd `all`/`unread` notification filter to `/dashboard` NotificationList component, including empty state and error-first rendering contract.\n\n## What Was Done\n\n### 1. Modified `features/next-app/components/NotificationList.tsx`\n\n- Added `FilterType` (`\"all\" | \"unread\"`) state with `\"all\"` as default\n- Added two segmented filter buttons (`notifications-filter-all`, `notifications-filter-unread`) rendered only when there is no error\n- Implemented client-side filtering: `unread` mode filters to `read === false` items only\n- Added empty state (`notifications-empty`) shown when filtered results are empty (e.g., no unread notifications)\n- Preserved error-first rendering: when API fails, only the error message (`notifications-error`) is shown -- filter buttons are not rendered\n\n### 2. Copied E2E test artifact\n\n- Copied `plans/sample-frontend-dashboard-notification-filter/e2e/dashboard-notification-filter.spec.ts` to `features/next-app/tests/dashboard-notification-filter.spec.ts`\n- The E2E spec was not modified (frozen plan artifact)\n\n### 3. No changes to `features/next-app/app/dashboard/page.tsx`\n\n- The dashboard page already imports and renders `<NotificationList />` without props\n- All filter logic is self-contained within the `NotificationList` component, so no dashboard changes were needed\n\n## Data-testid Locator Contract\n\n| Locator | Element | Condition |\n| --- | --- | --- |\n| `notifications-filter-all` | All filter button | Visible on success |\n| `notifications-filter-unread` | Unread filter button | Visible on success |\n| `notifications-list` | List container ", "type": "text", "content": "import { test, expect, type Page } from \"@playwright/test\";\n\ntype Notification = {\n  id: string;\n  message: string;\n  time: string;\n  read: boolean;\n};\n\nclass DashboardNotificationsSection {\n  constructor(private readonly page: Page) {}\n\n  allFilter() {\n    return this.page.getByTestId(\"notifications-filter-all\");\n  }\n\n  unreadFilter() {\n    return this.page.getByTestId(\"notifications-filter-unread\");\n  }\n\n  list() {\n    return this.page.getByTestId(\"notifications-list\");\n  }\n\n  empty() {\n    return this.page.getByTestId(\"notifications-empty\");\n  }\n\n  error() {\n    return this.page.getByTestId(\"notifications-error\");\n  }\n\n  item(id: string) {\n    return this.page.getByTestId(`notification-${id}`);\n  }\n}\n\nasync function loginAsTestUser(page: Page) {\n  await page.goto(\"/signup\");\n  await page.getByTestId(\"signup-name\").fill(\"테스트유저\");\n  await page.getByTestId(\"signup-email\").fill(`notification-${Date.now()}@example.com`);\n  await page.getByTestId(\"signup-password\").fill(\"password123\");\n  await page.getByTestId(\"signup-confirm-password\").fill(\"password123\");\n  await page.getByTestId(\"signup-submit\").click();\n  await page.waitForURL(\"**/dashboard\");\n}\n\nasync function stubNotifications(page: Page, notifications: Notification[] | \"error\") {\n  await page.route(\"**/api/notifications\", async (route) => {\n    if (notifications === \"error\") {\n      await route.fulfill({\n        status: 500,\n        contentType: \"application/json\",\n        body: JSON.stringify({ message: \"알림을 불러올 수 없습니다\" }),\n      });\n      return;\n    }\n\n    await route.fulfill({\n      status: 200,\n      contentType: \"application/json\",\n      body: JSON.stringify({\n        notifications,\n        total: notifications.length,\n      }),\n    });\n  });\n}\n\ntest.describe(\"대시보드 알림 필터\", () => {\n  test.beforeEach(async ({ page }) => {\n    await page.addInitScript(() => {\n      localStorage.setItem(\"cookie-consent\", \"true\");\n    });\n\n    await loginAsTestUser(page);\n  });\n\n  test(\"[C-NOTI-001] 기본 진입 시 전체 알림이 노출된다\", async ({ page }) => {\n    // Arrange\n    await stubNotifications(page, [\n      { id: \"1\", message: \"새 알림\", time: new Date().toISOString(), read: false },\n      { id: \"2\", message: \"읽은 알림\", time: new Date().toISOString(), read: true },\n    ]);\n    const section = new DashboardNotificationsSection(page);\n\n    // Act\n    await page.goto(\"/dashboard\");\n\n    // Assert\n    await expect(section.list()).toBeVisible();\n    await expect(section.allFilter()).toBeVisible();\n    await expect(section.unreadFilter()).toBeVisible();\n    await expect(section.item(\"1\")).toBeVisible();\n    await expect(section.item(\"2\")).toBeVisible();\n  });\n\n  test(\"[C-NOTI-002][C-NOTI-003] unread filter는 읽지 않은 알림만 남기고 비면 empty state를 노출한다\", async ({\n    page,\n  }) => {\n    // Arrange\n    await stubNotifications(page, [\n      { id: \"2\", message: \"읽은 알림\", time: new Date().toISOString(), read: true },\n    ]);\n    const section = new DashboardNotificationsSection(page);\n    await page.goto(\"/dashboard\");\n\n    // Act\n    await section.unreadFilter().click();\n\n    // Assert\n    await expect(section.item(\"2\")).not.toBeVisible();\n    await expect(section.empty()).toBeVisible();\n  });\n\n  test(\"[C-NOTI-004] API 오류면 오류 상태가 필터 UI보다 우선한다\", async ({ page }) => {\n    // Arrange\n    await stubNotifications(page, \"error\");\n    const section = new DashboardNotificationsSection(page);\n\n    // Act\n    await page.goto(\"/dashboard\");\n\n    // Assert\n    await expect(section.error()).toBeVisible();\n    await expect(section.allFilter()).not.toBeVisible();\n    await expect(section.unreadFilter()).not.toBeVisible();\n  });\n});\n"}, {"name": "NotificationList.tsx", "type": "text", "content": "\"use client\";\n\nimport { useEffect, useState } from \"react\";\n\ninterface Notification {\n  id: string;\n  message: string;\n  time: string;\n  read: boolean;\n}\n\ntype FilterType = \"all\" | \"unread\";\n\nexport default function NotificationList() {\n  const [notifications, setNotifications] = useState<Notification[]>([]);\n  const [loading, setLoading] = useState(true);\n  const [error, setError] = useState<string | null>(null);\n  const [filter, setFilter] = useState<FilterType>(\"all\");\n\n  useEffect(() => {\n    fetch(\"/api/notifications\")\n      .then((res) => {\n        if (!res.ok) throw new Error(\"알림을 불러올 수 없습니다\");\n        return res.json();\n      })\n      .then((data) => {\n        setNotifications(data.notifications);\n        setLoading(false);\n      })\n      .catch((err) => {\n        setError(err.message);\n        setLoading(false);\n      });\n  }, []);\n\n  if (loading) {\n    return (\n      <div data-testid=\"notifications-loading\" className=\"animate-pulse space-y-2\">\n        {[1, 2, 3].map((i) => (\n          <div key={i} className=\"h-12 rounded bg-zinc-200 dark:bg-zinc-700\" />\n        ))}\n      </div>\n    );\n  }\n\n  if (error) {\n    return (\n      <p data-testid=\"notifications-error\" className=\"text-sm text-red-500\">\n        {error}\n      </p>\n    );\n  }\n\n  const filtered =\n    filter === \"unread\"\n      ? notifications.filter((n) => !n.read)\n      : notifications;\n\n  return (\n    <div>\n      <div className=\"mb-3 flex gap-2\">\n        <button\n          data-testid=\"notifications-filter-all\"\n          onClick={() => setFilter(\"all\")}\n          className={`rounded px-3 py-1 text-sm font-medium transition-colors ${\n            filter === \"all\"\n              ? \"bg-blue-600 text-white\"\n              : \"bg-zinc-100 text-zinc-600 hover:bg-zinc-200 dark:bg-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-600\"\n          }`}\n        >\n          전체\n        </button>\n        <button\n          data-testid=\"notifications-filter-unread\"\n          onClick={() => setFilter(\"unread\")}\n          className={`rounded px-3 py-1 text-sm font-medium transition-colors ${\n            filter === \"unread\"\n              ? \"bg-blue-600 text-white\"\n              : \"bg-zinc-100 text-zinc-600 hover:bg-zinc-200 dark:bg-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-600\"\n          }`}\n        >\n          읽지 않음\n        </button>\n      </div>\n\n      {filtered.length === 0 ? (\n        <p\n          data-testid=\"notifications-empty\"\n          className=\"py-6 text-center text-sm text-zinc-400\"\n        >\n          알림이 없습니다\n        </p>\n      ) : (\n        <ul data-testid=\"notifications-list\" className=\"space-y-2\">\n          {filtered.map((n) => (\n            <li\n              key={n.id}\n              data-testid={`notification-${n.id}`}\n              className={`rounded border p-3 text-sm ${\n                n.read\n                  ? \"border-zinc-200 bg-white dark:border-zinc-700 dark:bg-zinc-800\"\n                  : \"border-blue-200 bg-blue-50 dark:border-blue-800 dark:bg-blue-900/20\"\n              }`}\n            >\n              <p className=\"text-zinc-800 dark:text-zinc-200\">{n.message}</p>\n              <time\n                data-testid={`notification-time-${n.id}`}\n                className=\"mt-1 block text-xs text-zinc-400\"\n              >\n                {new Date(n.time).toLocaleString(\"ko-KR\")}\n              </time>\n            </li>\n          ))}\n        </ul>\n      )}\n    </div>\n  );\n}\n"}, {"name": "summary.md", "type": "text", "content": "# Phase 1 Implementation Summary\n\n## Task\n\nExecute Phase 1 of `plans/sample-frontend-dashboard-notification-filter/plan.md`: add all/unread filter to `NotificationList`, implement empty state when no unread notifications exist, and ensure error state takes priority over filter UI.\n\n## What Was Done\n\n### 1. Modified: `features/next-app/components/NotificationList.tsx`\n\nAdded the following capabilities:\n\n- **Filter state** (`all` | `unread`): a `useState ery pattern**: The hook accepts an `orderId` and an optional `enabled` flag. It automatically fetches when mounted (if enabled) and re-fetches when `orderId` changes.\n- **Return shape**: Returns `{ data, isLoading, isError, error, refetch }` -- a standard query-hook interface similar to TanStack Query / SWR conventions.\n- **Type definitions**: Includes `Order` and `OrderItem` interfaces with common order fields (status enum, items, amounts, timestamps).\n- **Error handling**: Catches both network errors and non-OK HTTP responses, surfacing them through `isError` and `error`.\n- **`\"use client\"` directive**: Included to match the project convention (Next.js App Router client components).\n- **Korean error messages**: Matches the project's existing Korean-language UI strings.\n\n## Files created\n\n| File | Description |\n|------|-------------|\n| `evals/frontend-dev-workspace/iteration-4/api-hook-order/without_skill/outputs/useFetchOrder.ts` | The `useFetchOrder` hook with `Order` and `OrderItem` type exports |\n| `evals/frontend-dev-workspace/iteration-4/api-hook-order/without_skill/outputs/summary.md` | This summary document |\n\n## Final file paths\n\n- `C:\\Users\\sjw73\\Desktop\\dev\\try-claude-code\\evals\\frontend-dev-workspace\\iteration-4\\api-hook-order\\without_skill\\outputs\\useFetchOrder.ts`\n- `C:\\Users\\sjw73\\Desktop\\dev\\try-claude-code\\evals\\frontend-dev-workspace\\iteration-4\\api-hook-order\\without_skill\\outputs\\summary.md`\n"}, {"name": "useFetchOrder.ts", "type": "text", "content": "\"use client\";\n\nimport { useState, useEffect, useCallback } from \"react\";\n\nexport interface OrderItem {\n  id: string;\n  productName: string;\n  quantity: number;\n  unitPrice: number;\n}\n\nexport interface Order {\n  id: string;\n  userId: string;\n  items: OrderItem[];\n  totalAmount: number;\n  status: \"pending\" | \"confirmed\" | \"shipped\" | \"delivered\" | \"cancelled\";\n  createdAt: string;\n  updatedAt: string;\n}\n\ninterface UseFetchOrderParams {\n  orderId: string | undefined;\n  enabled?: boolean;\n}\n\ninterface UseFetchOrderResult {\n  data: Order | null;\n  isLoading: boolean;\n  isError: boolean;\n  error: Error | null;\n  refetch: () => Promise<void>;\n}\n\nexport function useFetchOrder({\n  orderId,\n  enabled = true,\n}: UseFetchOrderParams): UseFetchOrderResult {\n  const [data, setData] = useState<Order | null>(null);\n  const [isLoading, setIsLoading] = useState(false);\n  const [isError, setIsError] = useState(false);\n  const [error, setError] = useState<Error | null>(null);\n\n  const fetchOrder = useCallback(async () => {\n    if (!orderId) return;\n\n    setIsLoading(true);\n    setIsError(false);\n    setError(null);\n\n    try {\n      const response = await fetch(`/api/orders/${orderId}`);\n\n      if (!response.ok) {\n        throw new Error(`주문 조회 실패: ${response.status} ${response.statusText}`);\n      }\n\n      const order: Order = await response.json();\n      setData(order);\n    } catch (err) {\n      const fetchError = err instanceof Error ? err : new Error(\"알 수 없는 오류가 발생했습니다\");\n      setError(fetchError);\n      setIsError(true);\n      setData(null);\n    } finally {\n      setIsLoading(false);\n    }\n  }, [orderId]);\n\n  useEffect(() => {\n    if (enabled && orderId) {\n      fetchOrder();\n    }\n  }, [enabled, orderId, fetchOrder]);\n\n  return { data, isLoading, isError, error, refetch: fetchOrder };\n}\n"}], "grading": {"eval_name": "api-hook-order/without_skill", "expectations": [{"text": "generate-output-exists: generate.mjs api-hook 실행 결과로 생성된 보일러플레이트 파일이 존재한다", "passed": false, "evidence": "Summary makes no mention of running generate.mjs. The hook was manually written. No evidence of generate.mjs execution."}, {"text": "hook-file-exists: useFetchOrder 훅 파일이 존재한다", "passed": true, "evidence": "File exists at evals/frontend-dev-workspace/iteration-4/api-hook-order/without_skill/outputs/useFetchOrder.ts"}, {"text": "hook-in-queries: 훅 파일이 apis/queries/ il}\n            onChange={(e) => setEmail(e.target.value)}\n            onBlur={() => validateField(\"email\")}\n            className=\"w-full rounded-lg border border-zinc-300 px-4 py-2 text-sm focus:border-blue-500 focus:outline-none dark:border-zinc-700 dark:bg-zinc-900 dark:text-zinc-50\"\n            data-testid=\"login-email\"\n          />\n          {errors.email && <p className=\"mt-1 text-xs text-red-600\" data-testid=\"email-error\">{errors.email}</p>}\n        </div>\n\n        <div>\n          <label htmlFor=\"password\" className=\"mb-1 block text-sm font-medium text-zinc-700 dark:text-zinc-300\">비밀번호</label>\n          <input\n            id=\"password\"\n            type=\"password\"\n            value={password}\n            onChange={(e) => setPassword(e.target.value)}\n            onBlur={() => validateField(\"password\")}\n            className=\"w-full rounded-lg border border-zinc-300 px-4 py-2 text-sm focus:border-blue-500 focus:outline-none dark:border-zinc-700 dark:bg-zinc-900 dark:text-zinc-50\"\n            data-testid=\"login-password\"\n          />\n          {errors.password && <p className=\"mt-1 text-xs text-red-600\" data-testid=\"password-error\">{errors.password}</p>}\n        </div>\n\n        <button\n          type=\"submit\"\n          className=\"w-full rounded-lg bg-blue-600 py-2 text-sm font-medium text-white hover:bg-blue-700\"\n          data-testid=\"login-submit\"\n        >\n          로그인\n        </button>\n      </form>\n\n      <p className=\"mt-4 text-center text-sm text-zinc-500\">\n        계정이 없으신가요?{\" \"}\n        <Link href=\"/signup\" className=\"text-blue-600 hover:text-blue-800\">회원가입</Link>\n      </p>\n    </div>\n  );\n}\n"}, {"name": "summary.md", "type": "text", "content": "# Login Hook Composition - Summary\n\n## What was done\n\nThe login page (`features/next-app/app/login/page.tsx`) was refactored by extracting its logic into two custom hooks and recomposing them in the page component.\n\n### 1. `useLoginForm` hook — Form state and validation\n\nExtracts all form-related state and validation logic:\n\n- `email` / `password` state with setters\n- `errors` record for field-level validation messages\n- `validateField(field)` — validates a single field (used on blur)\n- `validateAll()` — validates all fields at once, returns `true` if valid\n- `resetErrors()` — clears all field errors\n\nUses `@/lib/validators` (`validateEmail`, `validatePassword`) for validation rules, matching the original behavior.\n\n### 2. `useLogin` hook — Login API call\n\nEncapsulates the authentication call and navigation:\n\n- `generalError` — server/auth-level error message (e.g., wrong password)\n- `handleLogin(email, password)` — calls `useAuth().login()`, navigates to `/dashboard` on success\n- `clearError()` — resets the general error\n\n### 3. Refactored `page.tsx` — Composition\n\nThe page component now composes both hooks and wires them together in `handleSubmit`:\n\n1. Clears any previous general error\n2. Runs form validation via `validateAll()`\n3. If valid, calls `handleLogin(email, password)`\n\nAll `data-testid` attributes, CSS classes, and UI structure are preserved identically.\n\n## Files created\n\n| File | Description | Target path in app |\n|------|-------------|--------------------|\n| `useLoginForm.ts` | Form state & validation hook | `features/next-app/hooks/useLoginForm.ts` |\n| `useLogin.ts` | Login API hook | `features/next-app/hooks/useLogin.ts` |\n| `page.tsx` | Refactored login page | `features/next-app/app/login/page.tsx` |\n| `summary.md` | This summary | — |\n\n## Output file paths\n\n- `evals/frontend-dev-workspace/iteration-4/login-hook-composition/without_skill/outputs/useLoginForm.ts`\n- `evals/frontend-dev-workspace/iteration-4/login-hook-composition/without_skill/outputs/useLogin.ts`\n- `evals/frontend-dev-workspace/iteration-4/login-hook-composition/without_skill/outputs/page.tsx`\n- `evals/frontend-dev-workspace/iteration-4/login-hook-composition/without_skill/outputs/summary.md`\n"}, {"name": "useLogin.ts", "type": "text", "content": "\"use client\";\n\nimport { useState, useCallback } from \"react\";\nimport { useRouter } from \"next/navigation\";\nimport { useAuth } from \"@/contexts/AuthContext\";\n\ninterface UseLoginReturn {\n  generalError: string | null;\n  handleLogin: (email: string, password: string) => void;\n  clearError: () => void;\n}\n\nexport function useLogin(): UseLoginReturn {\n  const { login } = useAuth();\n  const router = useRouter();\n  const [generalError, setGeneralError] = useState<string | null>(null);\n\n  const handleLogin = useCallback(\n    (email: string, password: string) => {\n      setGeneralError(null);\n      const err = login(email, password);\n      if (err) {\n        setGeneralError(err);\n      } else {\n        router.push(\"/dashboard\");\n      }\n    },\n    [login, router]\n  );\n\n  const clearError = useCallback(() => {\n    setGeneralError(null);\n  }, []);\n\n  return {\n    generalError,\n    handleLogin,\n    clearError,\n  };\n}\n"}, {"name": "useLoginForm.ts", "type": "text", "content": "\"use client\";\n\nimport { useState, useCallback } from \"react\";\nimport { validateEmail, validatePassword } from \"@/lib/validators\";\n\ninterface UseLoginFormReturn {\n  email: string;\n  password: string;\n  errors: Record<string, string>;\n  setEmail: (value: string) => void;\n  setPassword: (value: string) => void;\n  validateField: (field: \"email\" | \"password\") => void;\n  validateAll: () => boolean;\n  resetErrors: () => void;\n}\n\nexport function useLoginForm(): UseLoginFormReturn {\n  const [email, setEmail] = useState(\"\");\n  const [password, setPassword] = useState(\"\");\n  const [errors, setErrors] = useState<Record<string, string>>({});\n\n  const validateField = useCallback(\n    (field: \"email\" | \"password\") => {\n      const err =\n        field === \"email\" ? validateEmail(email) : validatePassword(password);\n      setErrors((prev) => {\n        if (err) return { ...prev, [field]: err };\n        const { [field]: _, ...rest } = prev;\n        return rest;\n      });\n    },\n    [email, password]\n  );\n\n  const validateAll = useCallback((): boolean => {\n    const errs: Record<string, string> = {};\n    const emailErr = validateEmail(email);\n    if (emailErr) errs.email = emailErr;\n    const pwErr = validatePassword(password);\n    if (pwErr) errs.password = pwErr;\n    setErrors(errs);\n    return Object.keys(errs).length === 0;\n  }, [email, password]);\n\n  const resetErrors = useCallback(() => {\n    setErrors({});\n  }, []);\n\n  return {\n    email,\n    password,\n    errors,\n    setEmail,\n    setPassword,\n    validateField,\n    validateAll,\n    resetErrors,\n  };\n}\n"}], "grading": {"eval_name": "login-hook-composition/without_skill", "expectations": [{"text": "generate-form-hook: generate.mjs hook useLoginForm 실행 결과로 생성된 파일이 존재한다", "passed": false, "evidence": "Summary makes no mention of running generate.mjs. Files were manually created. No evidence of generate.mjs execution."}, {"text": "generate-api-hook: generate.mjs api-hook useLogin 실행 결과로 생성된 파일이 존재한다", "passed": false, "evidence": "Same as above - no generate.mjs execution mentioned or evidenced"}, {"text": "login-hook-in-mutations: useLogin 훅이 apis/mutations/ 경로 하위에 배치된다", "passed": false, "evidence": "useLogin.ts is in outputs/ directory. Summary target path is 'features/next-app/hooks/useLogin.ts' - directly in hooks/, not in apis/mutations/"}, {"text": "form-hook-placement: useLoginForm이 hooks/ 하위에 배치된다", "passed": true, "evidence": "useLoginForm.ts exists in outputs/ and summary target path is 'features/next-app/hooks/useLoginForm.ts', which is under hooks/"}, {"text": "page-imports-hooks: 로그인 페이지 파일이 useLoginForm과 useLogin을 import한다", "passed": true, "evidence": "page.tsx imports from '@/hooks/useLoginForm' and '@/hooks/useLogin'"}, {"text": "page-no-direct-logic: 로그인 페이지 컴포넌트에 직접적인 useState/fetch 로직이 없고 훅 조합만 한 r UI.\n\n### 3. Dashboard Page\n\n`features/next-app/app/dashboard/page.tsx` was not modified. The NotificationList component is self-contained and no changes to the dashboard shell were needed.\n\n## Locator Registry (data-testid)\n\nAll locators from the plan's E2E manifest are implemented:\n\n| Locator | Status |\n| --- | --- |\n| `notifications-filter-all` | Added |\n| `notifications-filter-unread` | Added |\n| `notifications-list` | Preserved |\n| `notification-{id}` | Preserved |\n| `notifications-empty` | Added |\n| `notifications-loading` | Preserved |\n| `notifications-error` | Preserved |\n\n## Verification Scripts Run\n\n| Command | Result |\n| --- | --- |\n| `pnpm lint --fix` | Clean for our files (pre-existing warnings in unrelated files) |\n| `pnpm exec tsc --noEmit` | No errors in NotificationList.tsx or dashboard/page.tsx (pre-existing errors in unrelated files) |\n| `pnpm build` | Compilation successful; build fails on pre-existing `playwright.config.ts` type error (unrelated) |\n\n## Files Created/Modified\n\n- **Modified**: `features/next-app/components/NotificationList.tsx`\n- **Created**: `features/next-app/tests/dashboard-notification-filter.spec.ts` (copied from plan E2E artifacts)\n- **Created**: `evals/frontend-dev-workspace/iteration-3/notification-filter/with_skill/outputs/summary.md`\n\n## Final File Structure\n\n```\nfeatures/next-app/\n  components/\n    NotificationList.tsx          # Modified: filter state, empty state, error priority\n  app/\n    dashboard/\n      page.tsx                    # Unchanged\n    api/\n      notifications/\n        route.ts                  # Unchanged\n  tests/\n    dashboard-notification-filter.spec.ts  # New: E2E spec from plan artifacts\n```\n\n## Exit Criteria Status\n\n- [x] Default entry shows all notifications (filter defaults to \"all\")\n- [x] Unread filter shows only unread notifications\n- [x] Empty state is displayed when unread results are zero\n- [x] API error shows error UI, filter buttons are hidden (error takes priority)\n"}], "notification-filter-without_skill": [{"name": "dashboard-notification-filter.spec.ts", "type": "text", "content": "import { test, expect, type Page } from \"@playwright/test\";\n\ntype Notification = {\n  id: string;\n  message: string;\n  time: string;\n  read: boolean;\n};\n\nclass DashboardNotificationsSection {\n  constructor(private readonly page: Page) {}\n\n  allFilter() {\n    return this.page.getByTestId(\"notifications-filter-all\");\n  }\n\n  unreadFilter() {\n    return this.page.getByTestId(\"notifications-filter-unread\");\n  }\n\n  list() {\n    return this.page.getByTestId(\"notifications-list\");\n  }\n\n  empty() {\n    return this.page.getByTestId(\"notifications-empty\");\n  }\n\n  error() {\n    return this.page.getByTestId(\"notifications-error\");\n  }\n\n  item(id: string) {\n    return this.page.getByTestId(`notification-${id}`);\n  }\n}\n\nasync function loginAsTestUser(page: Page) {\n  await page.goto(\"/signup\");\n  await page.getByTestId(\"signup-name\").fill(\"테스트유저\");\n  await page.getByTestId(\"signup-email\").fill(`notification-${Date.now()}@example.com`);\n  await page.getByTestId(\"signup-password\").fill(\"password123\");\n  await page.getByTestId(\"signup-confirm-password\").fill(\"password123\");\n  await page.getByTestId(\"signup-submit\").click();\n  await page.waitForURL(\"**/dashboard\");\n}\n\nasync function stubNotifications(page: Page, notifications: Notification[] | \"error\") {\n  await page.route(\"**/api/notifications\", async (route) => {\n    if (notifications === \"error\") {\n      await route.fulfill({\n        status: 500,\n        contentType: \"application/json\",\n        body: JSON.stringify({ message: \"알림을 불러올 수 없습니다\" }),\n      });\n      return;\n    }\n\n    await route.fulfill({\n      status: 200,\n      contentType: \"application/json\",\n      body: JSON.stringify({\n        notifications,\n        total: notifications.length,\n      }),\n    });\n  });\n}\n\ntest.describe(\"대시보드 알림 필터\", () => {\n  test.beforeEach(async ({ page }) => {\n    await page.addInitScript(() => {\n      localStorage.setItem(\"cookie-consent\", \"true\");\n    });\n\n    await loginAsTestUser(page);\n  });\n\n  test(\"[C-NOTI-001] 기본 진입 시 전체 알림이 노출된다\", async ({ page }) => {\n    // Arrange\n    await stubNotifications(page, [\n      { id: \"1\", message: \"새 알림\", time: new Date().toISOString(), read: false },\n      { id: \"2\", message: \"읽은 알림\", time: new Date().toISOString(), read: true },\n    ]);\n    const section = new DashboardNotificationsSection(page);\n\n    // Act\n    await page.goto(\"/dashboard\");\n\n    // Assert\n    await expect(section.list()).toBeVisible();\n    await expect(section.allFilter()).toBeVisible();\n    await expect(section.unreadFilter()).toBeVisible();\n    await expect(section.item(\"1\")).toBeVisible();\n    await expect(section.item(\"2\")).toBeVisible();\n  });\n\n  test(\"[C-NOTI-002][C-NOTI-003] unread filter는 읽지 않은 알림만 남기고 비면 empty state를 노출한다\", async ({\n    page,\n  }) => {\n    // Arrange\n    await stubNotifications(page, [\n      { id: \"2\", message: \"읽은 알림\", time: new Date().toISOString(), read: true },\n    ]);\n    const section = new DashboardNotificationsSection(page);\n    await page.goto(\"/dashboard\");\n\n    // Act\n    await section.unreadFilter().click();\n\n    // Assert\n    await expect(section.item(\"2\")).not.toBeVisible();\n    await expect(section.empty()).toBeVisible();\n  });\n\n  test(\"[C-NOTI-004] API 오류면 오류 상태가 필터 UI보다 우선한다\", async ({ page }) => {\n    // Arrange\n    await stubNotifications(page, \"error\");\n    const section = new DashboardNotificationsSection(page);\n\n    // Act\n    await page.goto(\"/dashboard\");\n\n    // Assert\n    await expect(section.error()).toBeVisible();\n    await expect(section.allFilter()).not.toBeVisible();\n    await expect(section.unreadFilter()).not.toBeVisible();\n  });\n});\n"}, {"name": "NotificationList.tsx", "type": "text", "content": "\"use client\";\n\nimport { useEffect, useState } from \"react\";\n\ninterface Notification {\n  id: string;\n  message: string;\n  time: string;\n  read: boolean;\n}\n\ntype FilterType = \"all\" | \"unread\";\n\nexport default function NotificationList() {\n  const [notifications, setNotifications] = useState<Notification[]>([]);\n  const [loading, setLoading] = useState(true);\n  const [error, setError] = useState<string | null>(null);\n  const [filter, setFilter] = useState<FilterType>(\"all\");\n\n  useEffect(() => {\n    fetch(\"/api/notifications\")\n      .then((res) => {\n        if (!res.ok) throw new Error(\"알림을 불러올 수 없습니다\");\n        return res.json();\n      })\n      .then((data) => {\n        setNotifications(data.notifications);\n        setLoading(false);\n      })\n      .catch((err) => {\n        setError(err.message);\n        setLoading(false);\n      });\n  }, []);\n\n  if (loading) {\n    return (\n      <div data-testid=\"notifications-loading\" className=\"animate-pulse space-y-2\">\n        {[1, 2, 3].map((i) => (\n          <div key={i} className=\"h-12 rounded bg-zinc-200 dark:bg-zinc-700\" />\n        ))}\n      </div>\n    );\n  }\n\n  if (error) {\n    return (\n      <p data-testid=\"notifications-error\" className=\"text-sm text-red-500\">\n        {error}\n      </p>\n    );\n  }\n\n  const filteredNotifications =\n    filter === \"unread\"\n      ? notifications.filter((n) => !n.read)\n      : notifications;\n\n  return (\n    <div>\n      <div className=\"mb-4 flex gap-2\">\n        <button\n          data-testid=\"notifications-filter-all\"\n          onClick={() => setFilter(\"all\")}\n          className={`rounded px-3 py-1 text-sm font-medium transition-colors ${\n            filter === \"all\"\n              ? \"bg-blue-600 text-white\"\n              : \"bg-zinc-100 text-zinc-600 hover:bg-zinc-200 dark:bg-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-600\"\n          }`}\n        >\n          전체\n        </button>\n        <button\n          data-testid=\"notifications-filter-unread\"\n          onClick={() => setFilter(\"unread\")}\n          className={`rounded px-3 py-1 text-sm font-medium transition-colors ${\n            filter === \"unread\"\n              ? \"bg-blue-600 text-white\"\n              : \"bg-zinc-100 text-zinc-600 hover:bg-zinc-200 dark:bg-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-600\"\n          }`}\n        >\n          안 읽음\n        </button>\n      </div>\n\n      {filteredNotifications.length === 0 ? (\n        <p\n          data-testid=\"notifications-empty\"\n          className=\"py-8 text-center text-sm text-zinc-400\"\n        >\n          표시할 알림이 없습니다\n        </p>\n      ) : (\n        <ul data-testid=\"notifications-list\" className=\"space-y-2\">\n          {filteredNotifications.map((n) => (\n            <li\n              key={n.id}\n              data-testid={`notification-${n.id}`}\n              className={`rounded border p-3 text-sm ${\n                n.read\n                  ? \"border-zinc-200 bg-white dark:border-zinc-700 dark:bg-zinc-800\"\n                  : \"border-blue-200 bg-blue-50 dark:border-blue-800 dark:bg-blue-900/20\"\n              }`}\n            >\n              <p className=\"text-zinc-800 dark:text-zinc-200\">{n.message}</p>\n              <time\n                data-testid={`notification-time-${n.id}`}\n                className=\"mt-1 block text-xs text-zinc-400\"\n              >\n                {new Date(n.time).toLocaleString(\"ko-KR\")}\n              </time>\n            </li>\n          ))}\n        </ul>\n      )}\n    </div>\n  );\n}\n"}, {"name": "page.tsx", "type": "text", "content": "\"use client\";\n\nimport { useEffect } from \"react\";\nimport { useRouter } from \"next/navigation\";\nimport Link from \"next/link\";\nimport { useAuth } from \"@/contexts/AuthContext\";\nimport { useTodos } from \"@/contexts/TodoContext\";\nimport StatsCard from \"@/components/StatsCard\";\nimport TodoForm from \"@/components/TodoForm\";\nimport NotificationList from \"@/components/NotificationList\";\n\nexport default function DashboardPage() {\n  const { user, isAuthenticated, mounted } = useAuth();\n  const { todos, addTodo } = useTodos();\n  const router = useRouter();\n\n  useEffect(() => {\n    if (mounted && !isAuthenticated) router.push(\"/login\");\n  }, [mounted, isAuthenticated, router]);\n\n  if (!mounted || !isAuthenticated) return null;\n\n  const completed = todos.filter((t) => t.completed).length;\n  const pending = todos.length - completed;\n\n  return (\n    <div>\n      <h1 className=\"text-2xl font-bold text-zinc-900 dark:text-zinc-50\" data-testid=\"greeting\">\n        안녕하세요, {user?.name}님\n      </h1>\n      <p className=\"mt-1 text-sm text-zinc-500\">오늘도 좋은 하루 되세요!</p>\n      <p className=\"mt-1 text-xs text-zinc-400\" data-testid=\"current-date\">\n        {new Date().toLocaleDateString(\"ko-KR\")}\n      </p>\n\n      <div className=\"mt-8 grid grid-cols-1 gap-4 sm:grid-cols-3\">\n        <StatsCard label=\"전체 할 일\" value={todos.length} testId=\"stat-total\" />\n        <StatsCard label=\"완료\" value={completed} testId=\"stat-completed\" />\n        <StatsCard label=\"진행중\" value={pending} testId=\"stat-pending\" />\n      </div>\n\n      <div className=\"mt-8\">\n        <h2 className=\"mb-4 text-lg font-semibold text-zinc-900 dark:text-zinc-50\">빠른 추가</h2>\n        <TodoForm onSubmit={addTodo} />\n      </div>\n\n      <div className=\"mt-8\">\n        <h2 className=\"mb-4 text-lg font-semibold text-zinc-900 dark:text-zinc-50\">알림</h2>\n        <NotificationList />\n      </div>\n\n      <div className=\"mt-6\">\n        <Link\n          href=\"/todos\"\n          className=\"text-sm text-blue-600 hover:text-blue-800\"\n          data-testid=\"go-to-todos\"\n        >\n          전체 할 일 목록 보기 &rarr;\n        </Link>\n      </div>\n    </div>\n  );\n}\n"}, {"name": "summary.md", "type": "text", "content": "# Phase 1 Execution Summary: Dashboard Notification Filter\n\n## What Was Done\n\nExecuted Phase 1 of `plans/sample-frontend-dashboard-notification-filter/plan.md`. The `NotificationList` component was updated with `all`/`unread` filter functionality, empty state handling, and error-priority rendering.\n\n## Changes\n\n### Modified: `features/next-app/components/NotificationList.tsx`\n\n- Added `FilterType` (`\"all\" | \"unread\"`) state with `\"all\"` as default.\n- Added two segmented filter buttons with `data-testid=\"notifications-filter-all\"` and `data-testid=\"notifications-filter-unread\"`.\n- When `unread` filter is active, only notifications with `read === false` are displayed.\n- When filtered results are empty, an empty state element with `data-testid=\"notifications-empty\"` is rendered instead of the list.\n- Error state (`data-testid=\"notifications-error\"`) returns early before filter UI, ensuring error is prioritized over filter buttons per contract [C-NOTI-004].\n\n### Unchanged: `features/next-app/app/dashboard/page.tsx`\n\n- No changes required. The dashboard page already renders `<NotificationList />` and all filter/empty/error logic is self-contained within the component.\n\n### Created: `features/next-app/tests/dashboard-notification-filter.spec.ts`\n\n- Copied from `plans/sample-frontend-dashboard-notification-filter/e2e/dashboard-notification-filter.spec.ts` to the project's test directory following the `features/next-app/tests/*.spec.ts` convention.\n- Covers all four constraints: [C-NOTI-001], [C-NOTI-002], [C-NOTI-003], [C-NOTI-004].\n\n## Locator Contract\n\n| Locator | Element | Status |\n| --- | --- | --- |\n| `notifications-filter-all` | All filter button | Added |\n| `notifications-filter-unread` | Unread filter button | Added |\n| `notifications-list` | Notification list container | Retained |\n| `notification-{id}` | Individual notification row | Retained |\n| `notifications-empty` | Empty state (unread filter, 0 results) | Added |\n| `notifications-loading` | Loading skeleton | Retained |\n| `notifications-error` | Error message | Retained |\n\n## Output File Structure\n\n```\nevals/frontend-dev-workspace/iteration-3/notification-filter/without_skill/outputs/\n  NotificationList.tsx                      # Modified component\n  page.tsx                                  # Dashboard page (unchanged)\n  dashboard-notification-filter.spec.ts     # E2E test spec\n  summary.md                                # This file\n```\n\n## Verification\n\n- Lint: `pnpm --dir features/next-app lint`\n- E2E: `pnpm --dir features/next-app exec playwright test tests/dashboard-notification-filter.spec.ts`\n"}], "api-hook-order-with_skill": [{"name": "summary.md", "type": "text", "content": "# useFetchOrder API Hook - Implementation Summary\n\n## What was done\n\nCreated a `useFetchOrder` custom React hook that fetches order data from a REST API endpoint using a query pattern. The hook follows the project's existing conventions (`@/` path alias, `\"use client\"` directive, TypeScript strict mode) and is placed in a well-structured hooks directory.\n\n### Key features of the hook\n\n- **Auto-fetch on mount** when `orderId` is provided and `enabled` is true\n- **Reactive re-fetch** when `orderId` changes\n- **AbortController support** to cancel stale/in-flight requests on cleanup or re-fetch\n- **Standard query state** exposing `data`, `isLoading`, `error`\n- **Manual refetch** via the returned `refetch` function\n- **`enabled` option** to conditionally disable automatic fetching\n\n## Files created\n\n| File | Purpose |\n|------|---------|\n| `features/next-app/hooks/apis/queries/useFetchOrder.ts` | Main hook implementation |\n| `features/next-app/hooks/apis/queries/index.ts` | Barrel export for queries |\n| `features/next-app/hooks/apis/index.ts` | Barrel export for apis |\n| `features/next-app/hooks/index.ts` | Top-level barrel export for hooks |\n\n## Files modified\n\n| File | Change |\n|------|--------|\n| `features/next-app/lib/types.ts` | Added `Order`, `OrderItem`, and `OrderStatus` type definitions |\n\n## Generate scripts run\n\nNo `generate.mjs` scripts were run. The coding-rules scripts directory (`.claude/try-claude/references/coding-rules/scripts/`) does not exist in this workspace (init-try has not been run), so boilerplate was implemented manually per the skill guide fallback instructions.\n\n## Coding-rules references consulted\n\n- `.claude/try-claude/references/coding-rules/completion.md` -- file not found (init-try not run)\n- `.claude/try-claude/references/coding-rules/` -- directory not found\n- `.claude/try-claude/references/design/` -- directory not found\n- `.claude/try-claude/codemaps/frontend.md` -- file not found\n- `.claude/try-claude/references/domain.md` -- file not found\n\nSince no coding-rules references were available, implementation followed the skill guide's folder structure convention (`{hooksRoot}/apis/queries/`) and matched the existing project patterns observed in `contexts/TodoContext.tsx` and `lib/types.ts`.\n\n## Verification\n\n- TypeScript type check (`tsc --noEmit`): No errors in created/modified files. Pre-existing errors in Playwright test files are unrelated.\n\n## Usage example\n\n```tsx\nimport { useFetchOrder } from \"@/hooks/apis/queries/useFetchOrder\";\n\nfunction OrderDetail({ orderId }: { orderId: string }) {\n  const { data, isLoading, error, refetch } = useFetchOrder({ orderId });\n\n  if (isLoading) return <p>Loading...</p>;\n  if (error) return <p>Error: {error.message}</p>;\n  if (!data) return null;\n\n  return (\n    <div>\n      <h2>Order #{data.orderNumber}</h2>\n      <p>Status: {data.status}</p>\n      <p>Total: {data.totalAmount}</p>\n      <button onClick={refetch}>Refresh</button>\n    </div>\n  );\n}\n```\n"}], "api-hook-order-without_skill": [{"name": "summary.md", "type": "text", "content": "# useFetchOrder API Hook\n\n## What was done\n\nCreated a custom React hook `useFetchOrder` that fetches order data in a query-style pattern. The hook follows conventions observed in the existing Next.js 16 / React 19 project (TypeScript, `\"use client\"` directive, Korean error messages consistent with the app's locale).\n\n## Design decisions\n\n- **No external library**: The project does not use React Query or SWR, so the hook is built with native React hooks (`useState`, `useEffect`, `useCallback`).\n- **Query pattern**: Provides `data`, `isLoading`, `isError`, `error`, and `refetch` — matching the standard query-hook interface developers expect.\n- **`enabled` parameter**: Allows conditional fetching (e.g., wait until an `orderId` is available before firing the request).\n- **Type definitions**: Includes `Order` and `OrderItem` interfaces with a realistic status union type.\n- **API endpoint**: Targets `/api/orders/${orderId}`, consistent with the existing `/api/notifications` route pattern.\n\n## Files created\n\n| File | Description |\n|------|-------------|\n| `evals/frontend-dev-workspace/iteration-3/api-hook-order/without_skill/outputs/useFetchOrder.ts` | The `useFetchOrder` hook with Order/OrderItem types |\n| `evals/frontend-dev-workspace/iteration-3/api-hook-order/without_skill/outputs/summary.md` | This summary |\n\n## Final file paths\n\n- `C:\\Users\\sjw73\\Desktop\\dev\\try-claude-code\\evals\\frontend-dev-workspace\\iteration-3\\api-hook-order\\without_skill\\outputs\\useFetchOrder.ts`\n- `C:\\Users\\sjw73\\Desktop\\dev\\try-claude-code\\evals\\frontend-dev-workspace\\iteration-3\\api-hook-order\\without_skill\\outputs\\summary.md`\n"}, {"name": "useFetchOrder.ts", "type": "text", "content": "\"use client\";\n\nimport { useState, useEffect, useCallback } from \"react\";\n\nexport interface OrderItem {\n  id: string;\n  productName: string;\n  quantity: number;\n  price: number;\n}\n\nexport interface Order {\n  id: string;\n  orderNumber: string;\n  status: \"pending\" | \"confirmed\" | \"shipped\" | \"delivered\" | \"cancelled\";\n  items: OrderItem[];\n  totalAmount: number;\n  createdAt: string;\n  updatedAt: string;\n}\n\ninterface UseFetchOrderParams {\n  orderId: string | undefined;\n  enabled?: boolean;\n}\n\ninterface UseFetchOrderResult {\n  data: Order | null;\n  isLoading: boolean;\n  isError: boolean;\n  error: Error | null;\n  refetch: () => Promise<void>;\n}\n\n/**\n * 주문 데이터를 query 방식으로 가져오는 API 훅.\n *\n * @param params.orderId - 조회할 주문 ID\n * @param params.enabled - 자동 fetch 활성화 여부 (기본값: true)\n * @returns { data, isLoading, isError, error, refetch }\n *\n * @example\n * ```tsx\n * const { data: order, isLoading, isError, error, refetch } = useFetchOrder({\n *   orderId: \"order-123\",\n * });\n * ```\n */\nexport function useFetchOrder({\n  orderId,\n  enabled = true,\n}: UseFetchOrderParams): UseFetchOrderResult {\n  const [data, setData] = useState<Order | null>(null);\n  const [isLoading, setIsLoading] = useState<boolean>(false);\n  const [isError, setIsError] = useState<boolean>(false);\n  const [error, setError] = useState<Error | null>(null);\n\n  const fetchOrder = useCallback(async () => {\n    if (!orderId) return;\n\n    setIsLoading(true);\n    setIsError(false);\n    setError(null);\n\n    try {\n      const response = await fetch(`/api/orders/${orderId}`);\n\n      if (!response.ok) {\n        throw new Error(\n          `주문 조회에 실패했습니다 (status: ${response.status})`\n        );\n      }\n\n      const json = await response.json();\n      setData(json.order ?? json);\n    } catch (err) {\n      const fetchError =\n        err instanceof Error\n          ? err\n          : new Error(\"알 수 없는 오류가 발생했습니다\");\n      setError(fetchError);\n      setIsError(true);\n      setData(null);\n    } finally {\n      setIsLoading(false);\n    }\n  }, [orderId]);\n\n  useEffect(() => {\n    if (enabled && orderId) {\n      fetchOrder();\n    }\n  }, [enabled, orderId, fetchOrder]);\n\n  return {\n    data,\n    isLoading,\n    isError,\n    error,\n    refetch: fetchOrder,\n  };\n}\n"}], "login-hook-composition-with_skill": [{"name": "summary.md", "type": "text", "content": "# Login Hook Composition - Summary\n\n## Task\n\nRefactor the login page to extract logic into two custom hooks (`useLoginForm` and `useLogin`) and compose them in the page component.\n\n## What Was Done\n\n1. **Created `useLoginForm` custom hook** - Encapsulates form state management (email/password values, field-level validation errors, per-field and full-form validation, reset functionality).\n\n2. **Created `useLogin` API hook** - Wraps the AuthContext `login` call with error state management, loading state tracking, and navigation on success.\n\n3. **Refactored `LoginPage`** - Removed all inline state management and validation logic. The page now composes both hooks and focuses solely on rendering UI and wiring event handlers.\n\n## Files Created\n\n- `features/next-app/hooks/login/useLoginForm.ts` - Form state and validation hook\n- `features/next-app/hooks/apis/useLogin.ts` - Login API call hook\n\n## Files Modified\n\n- `features/next-app/app/login/page.tsx` - Refactored to use the two new hooks\n\n## Boilerplate Scripts\n\nNo `generate.mjs` scripts were run. The coding-rules scripts directory (`.claude/try-claude/references/coding-rules/scripts/`) was not found (init-try not run), so hooks were implemented manually following standard patterns.\n\n## Coding Rules References Consulted\n\n- No `.claude/try-claude/references/coding-rules/` directory was present in the repository.\n- No `.claude/try-claude/references/design/` directory was present.\n- No `.claude/try-claude/plans/` directory was present.\n- Hook structure follows the skill guide's folder structure convention: `hooks/apis/` for API hooks, `hooks/{feature}/` for page-specific hooks.\n\n## Architecture\n\n```\nhooks/\n  apis/\n    useLogin.ts          # API hook: login call, error state, loading, navigation\n  login/\n    useLoginForm.ts      # Form hook: values, errors, validation, reset\napp/login/\n  page.tsx               # Composes useLoginForm + useLogin\n```\n\n### Hook Responsibilities\n\n**useLoginForm:**\n- `values` (email, password)\n- `errors` (per-field validation errors)\n- `setEmail`, `setPassword` (controlled input handlers)\n- `validateField` (single field validation on blur)\n- `validateAll` (full form validation on submit, returns boolean)\n- `reset` (clear all state)\n\n**useLogin:**\n- `login(email, password)` (calls AuthContext login, navigates on success)\n- `error` (general login error from auth layer)\n- `isLoading` (loading state)\n- `reset` (clear error state)\n\n## Verification\n\n- TypeScript type checking passed for all new/modified files (pre-existing test file errors unrelated to this change).\n- All `data-testid` attributes preserved from the original implementation for E2E compatibility.\n"}], "login-hook-composition-without_skill": [{"name": "page.tsx", "type": "text", "content": "\"use client\";\n\nimport Link from \"next/link\";\nimport { useLoginForm } from \"./useLoginForm\";\nimport { useLogin } from \"./useLogin\";\n\nexport default function LoginPage() {\n  const {\n    email,\n    password,\n    errors,\n    generalError,\n    setEmail,\n    setPassword,\n    validateField,\n    validateAll,\n    setGeneralError,\n  } = useLoginForm();\n\n  const { login, isLoading } = useLogin();\n\n  const handleSubmit = (e: React.FormEvent) => {\n    e.preventDefault();\n    setGeneralError(null);\n\n    const errs = validateAll();\n    if (Object.keys(errs).length > 0) return;\n\n    const err = login(email, password);\n    if (err) {\n      setGeneralError(err);\n    }\n  };\n\n  return (\n    <div className=\"mx-auto mt-20 max-w-md\">\n      <h1 className=\"mb-8 text-2xl font-bold text-zinc-900 dark:text-zinc-50\">로그인</h1>\n\n      {generalError && (\n        <div\n          className=\"mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800\"\n          data-testid=\"login-error\"\n        >\n          {generalError}\n        </div>\n      )}\n\n      <form onSubmit={handleSubmit} className=\"space-y-4\">\n        <div>\n          <label\n            htmlFor=\"email\"\n            className=\"mb-1 block text-sm font-medium text-zinc-700 dark:text-zinc-300\"\n          >\n            이메일\n          </label>\n          <input\n            id=\"email\"\n            type=\"email\"\n            value={email}\n            onChange={(e) => setEmail(e.target.value)}\n            onBlur={() => validateField(\"email\")}\n            className=\"w-full rounded-lg border border-zinc-300 px-4 py-2 text-sm focus:border-blue-500 focus:outline-none dark:border-zinc-700 dark:bg-zinc-900 dark:text-zinc-50\"\n            data-testid=\"login-email\"\n          />\n          {errors.email && (\n            <p className=\"mt-1 text-xs text-red-600\" data-testid=\"email-error\">\n              {errors.email}\n            </p>\n          )}\n        </div>\n\n        <div>\n          <label\n            htmlFor=\"password\"\n            className=\"mb-1 block text-sm font-medium text-zinc-700 dark:text-zinc-300\"\n          >\n            비밀번호\n          </label>\n          <input\n            id=\"password\"\n            type=\"password\"\n            value={password}\n            onChange={(e) => setPassword(e.target.value)}\n            onBlur={() => validateField(\"password\")}\n            className=\"w-full rounded-lg border border-zinc-300 px-4 py-2 text-sm focus:border-blue-500 focus:outline-none dark:border-zinc-700 dark:bg-zinc-900 dark:text-zinc-50\"\n            data-testid=\"login-password\"\n          />\n          {errors.password && (\n            <p className=\"mt-1 text-xs text-red-600\" data-testid=\"password-error\">\n              {errors.password}\n            </p>\n          )}\n        </div>\n\n        <button\n          type=\"submit\"\n          disabled={isLoading}\n          className=\"w-full rounded-lg bg-blue-600 py-2 text-sm font-medium text-white hover:bg-blue-700 disabled:opacity-50\"\n          data-testid=\"login-submit\"\n        >\n          {isLoading ? \"로그인 중...\" : \"로그인\"}\n        </button>\n      </form>\n\n      <p className=\"mt-4 text-center text-sm text-zinc-500\">\n        계정이 없으신가요?{\" \"}\n        <Link href=\"/signup\" className=\"text-blue-600 hover:text-blue-800\">\n          회원가입\n        </Link>\n      </p>\n    </div>\n  );\n}\n"}, {"name": "summary.md", "type": "text", "content": "# Login Hook Composition - Summary\n\n## Task\n\n로그인 페이지의 로직을 `useLoginForm` 커스텀 훅과 `useLogin` API 훅으로 분리하고, 페이지 컴포넌트에서 두 훅을 조합하여 사용하도록 리팩터링.\n\n## What Was Done\n\n기존 `features/next-app/app/login/page.tsx`의 모놀리식 로그인 페이지를 분석한 뒤, 관심사 분리(Separation of Concerns) 원칙에 따라 두 개의 커스텀 훅을 추출하고 페이지에서 조합했다.\n\n### 1. `useLoginForm.ts` - 폼 상태 및 유효성 검사 훅\n\n- `email`, `password` 상태 관리\n- `errors` (필드별 에러), `generalError` (일반 에러) 상태 관리\n- `validateField`: 개별 필드 blur 시 유효성 검사 (기존 인라인 로직 추출)\n- `validateAll`: 폼 제출 시 전체 유효성 검사\n- `resetErrors`: 에러 초기화\n- 기존 `@/lib/validators`의 `validateEmail`, `validatePassword` 재사용\n\n### 2. `useLogin.ts` - 로그인 API 호출 훅\n\n- `AuthContext`의 `login` 함수를 래핑\n- 로그인 성공 시 `/dashboard`로 라우팅\n- `isLoading` 상태 제공 (향후 비동기 API 전환 대비)\n- 에러 메시지를 호출자에게 반환\n\n### 3. `page.tsx` - 리팩터링된 로그인 페이지\n\n- `useLoginForm`과 `useLogin`을 조합하여 사용\n- 기존과 동일한 UI/UX 유지 (data-testid, CSS 클래스, 에러 표시 등)\n- 로딩 중 버튼 비활성화 및 텍스트 변경 추가\n- 컴포넌트 자체는 순수한 뷰 레이어 역할만 수행\n\n## Created Files\n\n| File | Description |\n|------|-------------|\n| `outputs/useLoginForm.ts` | 폼 상태 관리 및 유효성 검사 커스텀 훅 |\n| `outputs/useLogin.ts` | 로그인 API 호출 및 라우팅 커스텀 훅 |\n| `outputs/page.tsx` | 두 훅을 조합한 리팩터링된 로그인 페이지 |\n| `outputs/summary.md` | 이 요약 문서 |\n\n## File Paths\n\n- `evals/frontend-dev-workspace/iteration-3/login-hook-composition/without_skill/outputs/useLoginForm.ts`\n- `evals/frontend-dev-workspace/iteration-3/login-hook-composition/without_skill/outputs/useLogin.ts`\n- `evals/frontend-dev-workspace/iteration-3/login-hook-composition/without_skill/outputs/page.tsx`\n- `evals/frontend-dev-workspace/iteration-3/login-hook-composition/without_skill/outputs/summary.md`\n"}, {"name": "useLogin.ts", "type": "text", "content": "\"use client\";\n\nimport { useState, useCallback } from \"react\";\nimport { useRouter } from \"next/navigation\";\nimport { useAuth } from \"@/contexts/AuthContext\";\n\ninterface UseLoginReturn {\n  login: (email: string, password: string) => string | null;\n  isLoading: boolean;\n}\n\nexport function useLogin(): UseLoginReturn {\n  const { login: authLogin } = useAuth();\n  const router = useRouter();\n  const [isLoading, setIsLoading] = useState(false);\n\n  const login = useCallback(\n    (email: string, password: string): string | null => {\n      setIsLoading(true);\n      try {\n        const err = authLogin(email, password);\n        if (!err) {\n          router.push(\"/dashboard\");\n        }\n        return err;\n      } finally {\n        setIsLoading(false);\n      }\n    },\n    [authLogin, router],\n  );\n\n  return { login, isLoading };\n}\n"}, {"name": "useLoginForm.ts", "type": "text", "content": "\"use client\";\n\nimport { useState, useCallback } from \"react\";\nimport { validateEmail, validatePassword } from \"@/lib/validators\";\n\ninterface UseLoginFormReturn {\n  email: string;\n  password: string;\n  errors: Record<string, string>;\n  setEmail: (value: string) => void;\n  setPassword: (value: string) => void;\n  validateField: (field: \"email\" | \"password\") => void;\n  validateAll: () => Record<string, string>;\n  resetErrors: () => void;\n  setGeneralError: (error: string | null) => void;\n  generalError: string | null;\n}\n\nexport function useLoginForm(): UseLoginFormReturn {\n  const [email, setEmail] = useState(\"\");\n  const [password, setPassword] = useState(\"\");\n  const [errors, setErrors] = useState<Record<string, string>>({});\n  const [generalError, setGeneralError] = useState<string | null>(null);\n\n  const validateField = useCallback(\n    (field: \"email\" | \"password\") => {\n      const value = field === \"email\" ? email : password;\n      const validator = field === \"email\" ? validateEmail : validatePassword;\n      const err = validator(value);\n\n      setErrors((prev) => {\n        if (err) return { ...prev, [field]: err };\n        const { [field]: _, ...rest } = prev;\n        return rest;\n      });\n    },\n    [email, password],\n  );\n\n  const validateAll = useCallback((): Record<string, string> => {\n    const errs: Record<string, string> = {};\n    const emailErr = validateEmail(email);\n    if (emailErr) errs.email = emailErr;\n    const pwErr = validatePassword(password);\n    if (pwErr) errs.password = pwErr;\n    setErrors(errs);\n    return errs;\n  }, [email, password]);\n\n  const resetErrors = useCallback(() => {\n    setErrors({});\n    setGeneralError(null);\n  }, []);\n\n  return {\n    email,\n    password,\n    errors,\n    setEmail,\n    setPassword,\n    validateField,\n    validateAll,\n    resetErrors,\n    setGeneralError,\n    generalError,\n  };\n}\n"}]}, "benchmark": {"metadata": {"skill_name": "frontend-dev", "skill_path": "plugin/skills/frontend-dev", "executor_model": "claude-opus-4-6", "analyzer_model": "claude-opus-4-6", "timestamp": "2026-03-14T10:00:00Z", "evals_run": ["notification-filter", "api-hook-order", "login-hook-composition"], "runs_per_configuration": 3}, "runs": [{"eval_id": 1, "eval_name": "notification-filter", "configuration": "with_skill", "run_number": 1, "result": {"pass_rate": 0.667, "passed": 6, "failed": 3, "total": 9, "time_seconds": 113.0, "tokens": 26918, "tool_calls": 19, "errors": 0}, "expectations": [{"text": "filter-all-unread", "passed": true, "evidence": "FilterMode type과 useState로 구현"}, {"text": "hook-extracted", "passed": false, "evidence": "fetch가 여전히 NotificationList.tsx에 인라인"}, {"text": "hook-name-pattern", "passed": false, "evidence": "훅 미추출로 평가 불가"}, {"text": "empty-state-rendered", "passed": true, "evidence": "data-testid='notifications-empty' 존재"}, {"text": "error-over-filter", "passe
