<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>평가 리뷰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #141413;
      --text-muted: #b0aea5;
      --accent: #d97757;
      --accent-hover: #c4613f;
      --green: #788c5d;
      --green-bg: #eef2e8;
      --red: #c44;
      --red-bg: #fceaea;
      --header-bg: #141413;
      --header-text: #faf9f5;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .header .instructions {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    .header .progress {
      font-size: 0.875rem;
      opacity: 0.8;
      text-align: right;
    }

    /* ---- Main content ---- */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ---- Sections ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .section-header {
      font-family: 'Poppins', sans-serif;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .section-body {
      padding: 1rem;
    }

    /* ---- Config badge ---- */
    .config-badge {
      display: inline-block;
      padding: 0.2rem 0.625rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-left: 0.75rem;
      vertical-align: middle;
    }
    .config-badge.config-primary {
      background: rgba(33, 150, 243, 0.12);
      color: #1976d2;
    }
    .config-badge.config-baseline {
      background: rgba(255, 193, 7, 0.15);
      color: #f57f17;
    }

    /* ---- Prompt ---- */
    .prompt-text {
      white-space: pre-wrap;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    /* ---- Outputs ---- */
    .output-file {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .output-file + .output-file {
      margin-top: 1rem;
    }
    .output-file-header {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .output-file-header .dl-btn {
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      opacity: 0.8;
    }
    .output-file-header .dl-btn:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .output-file-content {
      padding: 0.75rem;
      overflow-x: auto;
    }
    .output-file-content pre {
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .output-file-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .output-file-content iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    .output-file-content table {
      border-collapse: collapse;
      font-size: 0.8125rem;
      width: 100%;
    }
    .output-file-content table td,
    .output-file-content table th {
      border: 1px solid var(--border);
      padding: 0.375rem 0.5rem;
      text-align: left;
    }
    .output-file-content table th {
      background: var(--bg);
      font-weight: 600;
    }
    .output-file-content .download-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .output-file-content .download-link:hover {
      background: var(--border);
    }
    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      padding: 2rem;
      text-align: center;
    }

    /* ---- Feedback ---- */
    .prev-feedback {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.625rem 0.75rem;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .prev-feedback-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
      color: var(--text-muted);
    }
    .feedback-textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9375rem;
      line-height: 1.5;
      resize: vertical;
      color: var(--text);
    }
    .feedback-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .feedback-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      min-height: 1.1em;
    }

    /* ---- Grades (collapsible) ---- */
    .grades-toggle {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .grades-toggle:hover {
      color: var(--accent);
    }
    .grades-toggle .arrow {
      margin-right: 0.5rem;
      transition: transform 0.15s;
      font-size: 0.75rem;
    }
    .grades-toggle .arrow.open {
      transform: rotate(90deg);
    }
    .grades-content {
      display: none;
      margin-top: 0.75rem;
    }
    .grades-content.open {
      display: block;
    }
    .grades-summary {
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .grade-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .grade-pass { background: var(--green-bg); color: var(--green); }
    .grade-fail { background: var(--red-bg); color: var(--red); }
    .assertion-list {
      list-style: none;
    }
    .assertion-item {
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .assertion-item:last-child { border-bottom: none; }
    .assertion-status {
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .assertion-status.pass { color: var(--green); }
    .assertion-status.fail { color: var(--red); }
    .assertion-evidence {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      padding-left: 1.5rem;
    }

    /* ---- View tabs ---- */
    .view-tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-tab {
      font-family: 'Poppins', sans-serif;
      padding: 0.625rem 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .view-panel { display: none; }
    .view-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* ---- Benchmark view ---- */
    .benchmark-view {
      padding: 1.5rem 2rem;
      overflow-y: auto;
      flex: 1;
    }
    .benchmark-table {
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .benchmark-table th, .benchmark-table td {
      padding: 0.625rem 0.75rem;
      text-align: left;
      border: 1px solid var(--border);
    }
    .benchmark-table th {
      font-family: 'Poppins', sans-serif;
      background: var(--header-bg);
      color: var(--header-text);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .benchmark-table tr:hover { background: var(--bg); }
    .benchmark-table tr.benchmark-row-with { background: rgba(33, 150, 243, 0.06); }
    .benchmark-table tr.benchmark-row-without { background: rgba(255, 193, 7, 0.06); }
    .benchmark-table tr.benchmark-row-with:hover { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-without:hover { background: rgba(255, 193, 7, 0.12); }
    .benchmark-table tr.benchmark-row-avg { font-weight: 600; border-top: 2px solid var(--border); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-with { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-without { background: rgba(255, 193, 7, 0.12); }
    .benchmark-delta-positive { color: var(--green); font-weight: 600; }
    .benchmark-delta-negative { color: var(--red); font-weight: 600; }
    .benchmark-notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .benchmark-notes h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }
    .benchmark-notes ul {
      list-style: disc;
      padding-left: 1.25rem;
    }
    .benchmark-notes li {
      font-size: 0.8125rem;
      line-height: 1.6;
      margin-bottom: 0.375rem;
    }
    .benchmark-empty {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      padding: 3rem;
    }

    /* ---- Navigation ---- */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .nav-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      transition: all 0.15s;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .done-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .done-btn:hover {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .done-btn.ready {
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .done-btn.ready:hover {
      background: var(--accent-hover);
    }
    /* ---- Done overlay ---- */
    .done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .done-overlay.visible {
      display: flex;
    }
    .done-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
    }
    .done-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .done-card p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .done-card .btn-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .done-card button {
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
    }
    .done-card button:hover {
      background: var(--bg);
    }
    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--header-bg);
      color: var(--header-text);
      padding: 0.625rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app" style="height:100vh; display:flex; flex-direction:column;">
    <div class="header">
      <div>
        <h1>평가 리뷰: <span id="skill-name"></span></h1>
        <div class="instructions">각 출력을 검토하고 아래에 피드백을 남겨주세요. 화살표 키 또는 버튼으로 이동할 수 있습니다. 완료되면 피드백을 복사하여 Claude Code에 붙여넣으세요.</div>
      </div>
      <div class="progress" id="progress"></div>
    </div>

    <!-- View tabs (only shown when benchmark data exists) -->
    <div class="view-tabs" id="view-tabs" style="display:none;">
      <button class="view-tab active" onclick="switchView('outputs')">출력 결과</button>
      <button class="view-tab" onclick="switchView('benchmark')">벤치마크</button>
    </div>

    <!-- Outputs panel (qualitative review) -->
    <div class="view-panel active" id="panel-outputs">
    <div class="main">
      <!-- Prompt -->
      <div class="section">
        <div class="section-header">프롬프트 <span class="config-badge" id="config-badge" style="display:none;"></span></div>
        <div class="section-body">
          <div class="prompt-text" id="prompt-text"></div>
        </div>
      </div>

      <!-- Outputs -->
      <div class="section">
        <div class="section-header">출력</div>
        <div class="section-body" id="outputs-body">
          <div class="empty-state">출력 파일을 찾을 수 없습니다</div>
        </div>
      </div>

      <!-- Previous Output (collapsible) -->
      <div class="section" id="prev-outputs-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="togglePrevOutputs()">
            <span class="arrow" id="prev-outputs-arrow">&#9654;</span>
            이전 출력
          </div>
        </div>
        <div class="grades-content" id="prev-outputs-content"></div>
      </div>

      <!-- Grades (collapsible) -->
      <div class="section" id="grades-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="toggleGrades()">
            <span class="arrow" id="grades-arrow">&#9654;</span>
            평가 등급
          </div>
        </div>
        <div class="grades-content" id="grades-content"></div>
      </div>

      <!-- Feedback -->
      <div class="section">
        <div class="section-header">피드백</div>
        <div class="section-body">
          <textarea
            class="feedback-textarea"
            id="feedback"
            placeholder="이 출력에 대해 어떻게 생각하시나요? 문제점, 제안사항, 또는 잘된 점이 있나요?"
          ></textarea>
          <div class="feedback-status" id="feedback-status"></div>
          <div class="prev-feedback" id="prev-feedback" style="display:none;">
            <div class="prev-feedback-label">이전 피드백</div>
            <div id="prev-feedback-text"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="nav" id="outputs-nav">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&#8592; 이전</button>
      <button class="done-btn" id="done-btn" onclick="showDoneDialog()">모든 리뷰 제출</button>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">다음 &#8594;</button>
    </div>
    </div><!-- end panel-outputs -->

    <!-- Benchmark panel (quantitative stats) -->
    <div class="view-panel" id="panel-benchmark">
      <div class="benchmark-view" id="benchmark-content">
        <div class="benchmark-empty">벤치마크 데이터가 없습니다. 벤치마크를 실행하면 여기에 정량적 결과가 표시됩니다.</div>
      </div>
    </div>
  </div>

  <!-- Done overlay -->
  <div class="done-overlay" id="done-overlay">
    <div class="done-card">
      <h2>리뷰 완료</h2>
      <p>피드백이 저장되었습니다. Claude Code 세션으로 돌아가서 리뷰가 끝났다고 알려주세요.</p>
      <div class="btn-row">
        <button onclick="closeDoneDialog()">확인</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>

라미터\n * @param params.orderId - 조회할 주문 ID\n * @param params.enabled - 쿼리 활성화 여부 (기본값: true)\n * @returns 주문 데이터, 로딩 상태, 에러 정보\n */\nconst useFetchOrder = (params: UseFetchOrderParams = {}) => {\n  const { orderId, enabled = true } = params;\n\n  const query = useQuery<Order>({\n    queryKey: [\"order\", orderId],\n    queryFn: async () => {\n      const url = orderId ? `/api/orders/${orderId}` : \"/api/orders\";\n      const response = await fetch(url);\n\n      if (!response.ok) {\n        throw new Error(\"Failed to fetch order\");\n      }\n\n      return response.json();\n    },\n    enabled,\n  });\n\n  return {\n    data: query.data,\n    isLoading: query.isLoading,\n    isError: query.isError,\n    error: query.error,\n    refetch: query.refetch,\n  };\n};\n\nexport default useFetchOrder;\n"}], "grading": {"expectations": [{"text": "generate-output-exists", "passed": true, "evidence": "with_skill: useFetchOrder.ts follows generate.mjs conventions — proper interface definitions, structured hook with queryKey pattern, test file with createWrapper pattern"}, {"text": "hook-file-exists", "passed": true, "evidence": "useFetchOrder.ts exists in outputs/"}, {"text": "hook-in-queries", "passed": false, "evidence": "File is in outputs/ directory; no apis/queries/ path structure visible in the output files"}, {"text": "index-export", "passed": true, "evidence": "Test file imports from '../index' (line 4), implying an index.ts re-export pattern is used"}, {"text": "returns-loading", "passed": true, "evidence": "Hook returns isLoading (line 47: isLoading: query.isLoading)"}, {"text": "returns-error", "passed": true, "evidence": "Hook returns isError and error (lines 48-49: isError: query.isError, error: query.error)"}], "summary": {"passed": 5, "failed": 1, "total": 6, "pass_rate": 0.83}}}, {"id": "api-hook-order-without_skill", "prompt": "useFetchOrder라는 API 훅을 만들어줘. query 방식으로 주문 데이터를 가져오는 훅이야", "eval_id": 2, "outputs": [{"name": "useFetchOrder.test.ts", "type": "text", "content": "/**\n * @jest-environment jsdom\n */\nimport { renderHook, waitFor, act } from \"@testing-library/react\";\nimport { useFetchOrder } from \"./useFetchOrder\";\n\n// ---------------------------------------------------------------------------\n// Mocks\n// ---------------------------------------------------------------------------\n\nconst MOCK_ORDER = {\n  id: \"order-1\",\n  status: \"confirmed\" as const,\n  items: [\n    {\n      id: \"item-1\",\n      productId: \"prod-1\",\n      productName: \"Widget\",\n      quantity: 2,\n      unitPrice: 1500,\n    },\n  ],\n  totalAmount: 3000,\n  createdAt: \"2026-01-01T00:00:00Z\",\n  updatedAt: \"2026-01-02T00:00:00Z\",\n};\n\nfunction mockFetchSuccess(data: unknown = MOCK_ORDER) {\n  global.fetch = jest.fn().mockResolvedValue({\n    ok: true,\n    json: () => Promise.resolve(data),\n  }) as jest.Mock;\n}\n\nfunction mockFetchFailure(status = 500, statusText = \"Internal Server Error\") {\n  global.fetch = jest.fn().mockResolvedValue({\n    ok: false,\n    status,\n    statusText,\n    json: () => Promise.resolve({}),\n  }) as jest.Mock;\n}\n\nafterEach(() => {\n  jest.restoreAllMocks();\n});\n\n// ---------------------------------------------------------------------------\n// Tests\n// ---------------------------------------------------------------------------\n\ndescribe(\"useFetchOrder\", () => {\n  it(\"fetches order data successfully\", async () => {\n    mockFetchSuccess();\n\n    const { result } = renderHook(() =>\n      useFetchOrder({ orderId: \"order-1\" }),\n    );\n\n    // Initially loading\n    expect(result.current.isLoading).toBe(true);\n    expect(result.current.isFetching).toBe(true);\n\n    await waitFor(() => {\n      expect(result.current.isLoading).toBe(false);\n    });\n\n    expect(result.current.data).toEqual(MOCK_ORDER);\n    expect(result.current.error).toBeNull();\n    expect(result.current.isFetching).toBe(false);\n    expect(global.fetch).toHaveBeenCalledWith(\"/api/orders/order-1\");\n  });\n\n  it(\"handles fetch errors\", async () => {\n    mockFetchFailure(404, \"Not Found\");\n\n    const { result } = renderHook(() =>\n      useFetchOrder({ orderId: \"order-999\" }),\n    );\n\n    await waitFor(() => {\n      expect(result.current.isLoading).toBe(false);\n    });\n\n    expect(result.current.data).toBeNull();\n    expect(result.current.error).toBeInstanceOf(Error);\n    expect(result.current.error?.message).toContain(\"404\");\n  });\n\n  it(\"does not fetch when orderId is undefined\", () => {\n    mockFetchSuccess();\n\n    const { result } = renderHook(() =>\n      useFetchOrder({ orderId: undefined }),\n    );\n\n    expect(result.current.isLoading).toBe(false);\n    expect(result.current.isFetching).toBe(false);\n    expect(global.fetch).not.toHaveBeenCalled();\n  });\n\n  it(\"does not fetch when enabled is false\", () => {\n    mockFetchSuccess();\n\n    const { result } = renderHook(() =>\n      useFetchOrder({ orderId: \"order-1\", enabled: false }),\n    );\n\n    expect(result.current.isLoading).toBe(false);\n    expect(global.fetch).not.toHaveBeenCalled();\n  });\n\n  it(\"refetches when refetch is called\", async () => {\n    mockFetchSuccess();\n\n    const { result } = renderHook(() =>\n      useFetchOrder({ orderId: \"order-1\" }),\n    );\n\n    await waitFor(() => {\n      expect(result.current.isLoading).toBe(false);\n    });\n\n    // Mutate mock data for refetch\n    const updatedOrder = { ...MOCK_ORDER, status: \"shipped\" as const };\n    mockFetchSuccess(updatedOrder);\n\n    await act(async () => {\n      await result.current.refetch();\n    });\n\n    expect(result.current.data).toEqual(updatedOrder);\n    expect(global.fetch).toHaveBeenCalledTimes(2);\n  });\n\n  it(\"refetches when orderId changes\", async () => {\n    mockFetchSuccess();\n\n    const { result, rerender } = renderHook(\n      ({ orderId }: { orderId: string }) => useFetchOrder({ orderId }),\n      { initialProps: { orderId: \"order-1\" } },\n    );\n\n    await waitFor(() => {\n      expect(result.current.isLoading).toBe(false);\n    });\n\n    const secondOrder = { ...MOCK_ORDER, id: \"order-2\" };\n    mockFetchSuccess(secondOrder);\n\n    rerender({ orderId: \"order-2\" });\n\n    await waitFor(() => {\n      expect(result.current.data).toEqual(secondOrder);\n    });\n\n    expect(global.fetch).toHaveBeenCalledWith(\"/api/orders/order-2\");\n  });\n});\n"}, {"name": "useFetchOrder.ts", "type": "text", "content": "\"use client\";\n\nimport { useCallback, useEffect, useRef, useState } from \"react\";\n\n// -----------------------------------------------------------------------------\n// Types\n// -----------------------------------------------------------------------------\n\nexport interface Order {\n  id: string;\n  status: \"pending\" | \"confirmed\" | \"shipped\" | \"delivered\" | \"cancelled\";\n  items: OrderItem[];\n  totalAmount: number;\n  createdAt: string;\n  updatedAt: string;\n}\n\nexport interface OrderItem {\n  id: string;\n  productId: string;\n  productName: string;\n  quantity: number;\n  unitPrice: number;\n}\n\nexport interface UseFetchOrderOptions {\n  /** Order ID to fetch. Hook is disabled when this is undefined/empty. */\n  orderId: string | undefined;\n  /** If true the query will not run automatically. Call `refetch` manually. */\n  enabled?: boolean;\n}\n\nexport interface UseFetchOrderResult {\n  /** The fetched order data, or null while loading / on error. */\n  data: Order | null;\n  /** True while the initial fetch is in-flight. */\n  isLoading: boolean;\n  /** True while any fetch (initial or refetch) is in-flight. */\n  isFetching: boolean;\n  /** Error object if the last fetch failed. */\n  error: Error | null;\n  /** Manually re-trigger the query. */\n  refetch: () => Promise<void>;\n}\n\n// -----------------------------------------------------------------------------\n// Fetcher\n// -----------------------------------------------------------------------------\n\nasync function fetchOrder(orderId: string): Promise<Order> {\n  const res = await fetch(`/api/orders/${orderId}`);\n\n  if (!res.ok) {\n    throw new Error(`Failed to fetch order: ${res.status} ${res.statusText}`);\n  }\n\n  return res.json() as Promise<Order>;\n}\n\n// -----------------------------------------------------------------------------\n// Hook\n// -----------------------------------------------------------------------------\n\n/**\n * Query-style hook that fetches a single order by ID.\n *\n * Features:\n * - Automatic fetching when `orderId` changes\n * - Loading / fetching / error states\n * - `enabled` flag to defer execution\n * - `refetch` function for manual re-query\n * - Stale-closure & race-condition safe via AbortController\n *\n * @example\n * ```tsx\n * const { data, isLoading, error, refetch } = useFetchOrder({ orderId: \"abc-123\" });\n * ```\n */\nexport function useFetchOrder({\n  orderId,\n  enabled = true,\n}: UseFetchOrderOptions): UseFetchOrderResult {\n  const [data, setData] = useState<Order | null>(null);\n  const [error, setError] = useState<Error | null>(null);\n  const [isLoading, setIsLoading] = useState<boolean>(false);\n  const [isFetching, setIsFetching] = useState<boolean>(false);\n\n  // Track whether we've completed at least one successful fetch so we can\n  // distinguish \"initial load\" from \"background refetch\".\n  const hasFetchedRef = useRef(false);\n  const abortControllerRef = useRef<AbortController | null>(null);\n\n  const execute = useCallback(async () => {\n    if (!orderId) return;\n\n    // Cancel any in-flight request to avoid race conditions.\n    abortControllerRef.current?.abort();\n    const controller = new AbortController();\n    abortControllerRef.current = controller;\n\n    if (!hasFetchedRef.current) {\n      setIsLoading(true);\n    }\n    setIsFetching(true);\n    setError(null);\n\n    try {\n      const order = await fetchOrder(orderId);\n\n      // Only update state if this request was not \ninterface UseLoginReturn {\n  login: (email: string, password: string) => void;\n  error: string | null;\n  isLoading: boolean;\n  clearError: () => void;\n}\n\nexport function useLogin(): UseLoginReturn {\n  const { login: authLogin } = useAuth();\n  const router = useRouter();\n  const [error, setError] = useState<string | null>(null);\n  const [isLoading, setIsLoading] = useState(false);\n\n  const clearError = useCallback(() => {\n    setError(null);\n  }, []);\n\n  const login = useCallback(\n    (email: string, password: string) => {\n      setError(null);\n      setIsLoading(true);\n\n      try {\n        const err = authLogin(email, password);\n        if (err) {\n          setError(err);\n        } else {\n          router.push(\"/dashboard\");\n        }\n      } finally {\n        setIsLoading(false);\n      }\n    },\n    [authLogin, router],\n  );\n\n  return {\n    login,\n    error,\n    isLoading,\n    clearError,\n  };\n}\n"}, {"name": "useLoginForm.ts", "type": "text", "content": "\"use client\";\n\nimport { useState, useCallback } from \"react\";\nimport { validateEmail, validatePassword } from \"@/lib/validators\";\n\ninterface UseLoginFormReturn {\n  email: string;\n  password: string;\n  errors: Record<string, string>;\n  setEmail: (value: string) => void;\n  setPassword: (value: string) => void;\n  validateField: (field: \"email\" | \"password\") => void;\n  validateAll: () => Record<string, string>;\n  resetForm: () => void;\n  isValid: boolean;\n}\n\nexport function useLoginForm(): UseLoginFormReturn {\n  const [email, setEmail] = useState(\"\");\n  const [password, setPassword] = useState(\"\");\n  const [errors, setErrors] = useState<Record<string, string>>({});\n\n  const validateField = useCallback(\n    (field: \"email\" | \"password\") => {\n      const validator = field === \"email\" ? validateEmail : validatePassword;\n      const value = field === \"email\" ? email : password;\n      const err = validator(value);\n\n      setError n      }),\n    });\n  });\n}\n\ntest.describe(\"대시보드 알림 필터\", () => {\n  test.beforeEach(async ({ page }) => {\n    await page.addInitScript(() => {\n      localStorage.setItem(\"cookie-consent\", \"true\");\n    });\n\n    await loginAsTestUser(page);\n  });\n\n  test(\"[C-NOTI-001] 기본 진입 시 전체 알림이 노출된다\", async ({ page }) => {\n    // Arrange\n    await stubNotifications(page, [\n      { id: \"1\", message: \"새 알림\", time: new Date().toISOString(), read: false },\n      { id: \"2\", message: \"읽은 알림\", time: new Date().toISOString(), read: true },\n    ]);\n    const section = new DashboardNotificationsSection(page);\n\n    // Act\n    await page.goto(\"/dashboard\");\n\n    // Assert\n    await expect(section.list()).toBeVisible();\n    await expect(section.allFilter()).toBeVisible();\n    await expect(section.unreadFilter()).toBeVisible();\n    await expect(section.item(\"1\")).toBeVisible();\n    await expect(section.item(\"2\")).toBeVisible();\n  });\n\n  test(\"[C-NOTI-002][C-NOTI-003] unread filter는 읽지 않은 알림만 남기고 비면 empty state를 노출한다\", async ({\n    page,\n  }) => {\n    // Arrange\n    await stubNotifications(page, [\n      { id: \"2\", message: \"읽은 알림\", time: new Date().toISOString(), read: true },\n    ]);\n    const section = new DashboardNotificationsSection(page);\n    await page.goto(\"/dashboard\");\n\n    // Act\n    await section.unreadFilter().click();\n\n    // Assert\n    await expect(section.item(\"2\")).not.toBeVisible();\n    await expect(section.empty()).toBeVisible();\n  });\n\n  test(\"[C-NOTI-004] API 오류면 오류 상태가 필터 UI보다 우선한다\", async ({ page }) => {\n    // Arrange\n    await stubNotifications(page, \"error\");\n    const section = new DashboardNotificationsSection(page);\n\n    // Act\n    await page.goto(\"/dashboard\");\n\n    // Assert\n    await expect(section.error()).toBeVisible();\n    await expect(section.allFilter()).not.toBeVisible();\n    await expect(section.unreadFilter()).not.toBeVisible();\n  });\n});\n"}, {"name": "NotificationList.tsx", "type": "text", "content": "\"use client\";\n\nimport { useState } from \"react\";\nimport { useGetNotifications } from \"@/hooks/apis/queries/useGetNotifications\";\n\ntype FilterType = \"all\" | \"unread\";\n\nexport default function NotificationList() {\n  const { notifications, loading, error } = useGetNotifications();\n  const [filter, setFilter] = useState<FilterType>(\"all\");\n\n  const handleFilterChange = (nextFilter: FilterType) => {\n    setFilter(nextFilter);\n  };\n\n  if (loading) {\n    return (\n      <div data-testid=\"notifications-loading\" className=\"animate-pulse space-y-2\">\n        {[1, 2, 3].map((i) => (\n          <div key={i} className=\"h-12 rounded bg-zinc-200 dark:bg-zinc-700\" />\n        ))}\n      </div>\n    );\n  }\n\n  if (error) {\n    return (\n      <p data-testid=\"notifications-error\" className=\"text-sm text-red-500\">\n        {error}\n      </p>\n    );\n  }\n\n  const filtered =\n    filter === \"unread\"\n      ? notifications.filter((n) => !n.read)\n      : notifications;\n\n  return (\n    <div>\n      <div className=\"mb-4 flex gap-2\">\n        <button\n          data-testid=\"notifications-filter-all\"\n          onClick={() => handleFilterChange(\"all\")}\n          className={`rounded-md px-3 py-1.5 text-sm font-medium transition-colors ${\n            filter === \"all\"\n              ? \"bg-zinc-900 text-white dark:bg-zinc-100 dark:text-zinc-900\"\n              : \"bg-zinc-100 text-zinc-600 hover:bg-zinc-200 dark:bg-zinc-800 dark:text-zinc-400 dark:hover:bg-zinc-700\"\n          }`}\n        >\n          전체\n        </button>\n        <button\n          data-testid=\"notifications-filter-unread\"\n          onClick={() => handleFilterChange(\"unread\")}\n          className={`rounded-md px-3 py-1.5 text-sm font-medium transition-colors ${\n            filter === \"unread\"\n              ? \"bg-zinc-900 text-white dark:bg-zinc-100 dark:text-zinc-900\"\n              : \"bg-zinc-100 text-zinc-600 hover:bg-zinc-200 dark:bg-zinc-800 dark:text-zinc-400 dark:hover:bg-zinc-700\"\n          }`}\n        >\n          읽지 않음\n        </button>\n      </div>\n\n      {filtered.length === 0 ? (\n        <p\n          data-testid=\"notifications-empty\"\n          className=\"py-6 text-center text-sm text-zinc-400\"\n        >\n          읽지 않은 알림이 없습니다\n        </p>\n      ) : (\n        <ul data-testid=\"notifications-list\" className=\"space-y-2\">\n          {filtered.map((n) => (\n            <li\n              key={n.id}\n              data-testid={`notification-${n.id}`}\n              className={`rounded border p-3 text-sm ${\n                n.read\n                  ? \"border-zinc-200 bg-white dark:border-zinc-700 dark:bg-zinc-800\"\n                  : \"border-blue-200 bg-blue-50 dark:border-blue-800 dark:bg-blue-900/20\"\n              }`}\n            >\n              <p className=\"text-zinc-800 dark:text-zinc-200\">{n.message}</p>\n              <time\n                data-testid={`notification-time-${n.id}`}\n                className=\"mt-1 block text-xs text-zinc-400\"\n              >\n                {new Date(n.time).toLocaleString(\"ko-KR\")}\n              </time>\n            </li>\n          ))}\n        </ul>\n      )}\n    </div>\n  );\n}\n"}, {"name": "page.tsx", "type": "text", "content": "\"use client\";\n\nimport { useEffect } from \"react\";\nimport { useRouter } from \"next/navigation\";\nimport Link from \"next/link\";\nimport { useAuth } from \"@/contexts/AuthContext\";\nimport { useTodos } from \"@/contexts/TodoContext\";\nimport StatsCard from \"@/components/StatsCard\";\nimport TodoForm from \"@/components/TodoForm\";\nimport NotificationList from \"@/components/NotificationList\";\n\nexport default function DashboardPage() {\n  const { user, isAuthenticated, mounted } = useAuth();\n  const { todos, addTodo } = useTodos();\n  const router = useRouter();\n\n  useEffect(() => {\n    if (mounted && !isAuthenticated) router.push(\"/login\");\n  }, [mounted, isAuthenticated, router]);\n\n  if (!mounted || !isAuthenticated) return null;\n\n  const completed = todos.filter((t) => t.completed).length;\n  const pending = todos.length - completed;\n\n  return (\n    <div>\n      <h1 className=\"text-2xl font-bold text-zinc-900 dark:text-zinc-50\" data-testid=\"greeting\">\n        안녕하세요, {user?.name}님\n      </h1>\n      <p className=\"mt-1 text-sm text-zinc-500\">오늘도 좋은 하루 되세요!</p>\n      <p className=\"mt-1 text-xs text-zinc-400\" data-testid=\"current-date\">\n        {new Date().toLocaleDateString(\"ko-KR\")}\n      </p>\n\n      <div className=\"mt-8 grid grid-cols-1 gap-4 sm:grid-cols-3\">\n        <StatsCard label=\"전체 할 일\" value={todos.length} testId=\"stat-total\" />\n        <StatsCard label=\"완료\" value={completed} testId=\"stat-completed\" />\n        <StatsCard label=\"진행중\" value={pending} testId=\"stat-pending\" />\n      </div>\n\n      <div className=\"mt-8\">\n        <h2 className=\"mb-4 text-lg font-semibold text-zinc-900 dark:text-zinc-50\">빠른 추가</h2>\n        <TodoForm onSubmit={addTodo} />\n      </div>\n\n      <div className=\"mt-8\">\n        <h2 className=\"mb-4 text-lg font-semibold text-zinc-900 dark:text-zinc-50\">알림</h2>\n        <NotificationList />\n      </div>\n\n      <div className=\"mt-6\">\n        <Link\n          href=\"/todos\"\n          className=\"text-sm text-blue-600 hover:text-blue-800\"\n          data-testid=\"go-to-todos\"\n        >\n          전체 할 일 목록 보기 &rarr;\n        </Link>\n      </div>\n    </div>\n  );\n}\n"}, {"name": "useGetNotifications.ts", "type": "text", "content": "\"use client\";\n\nimport { useEffect, useState } from \"react\";\n\nexport interface Notification {\n  id: string;\n  message: string;\n  time: string;\n  read: boolean;\n}\n\ninterface UseGetNotificationsResult {\n  notifications: Notification[];\n  loading: boolean;\n  error: string | null;\n}\n\nexport function useGetNotifications(): UseGetNotificationsResult {\n  const [notifications, setNotifications] = useState<Notification[]>([]);\n  const [loading, setLoading] = useState(true);\n  const [error, setError] = useState<string | null>(null);\n\n  useEffect(() => {\n    fetch(\"/api/notifications\")\n      .then((res) => {\n        if (!res.ok) throw new Error(\"알림을 불러올 수 없습니다\");\n        return res.json();\n      })\n      .then((data) => {\n        setNotifications(data.notifications);\n        setLoading(false);\n      })\n      .catch((err) => {\n        setError(err.message);\n        setLoading(false);\n      });\n  }, []);\n\n  return { notifications, loading, error };\n}\n"}], "notification-filter-without_skill": [{"name": "dashboard-notification-filter.spec.ts", "type": "text", "content": "import { test, expect, type Page } from \"@playwright/test\";\n\ntype Notification = {\n  id: string;\n  message: string;\n  time: string;\n  read: boolean;\n};\n\nclass DashboardNotificationsSection {\n  constructor(private readonly page: Page) {}\n\n  allFilter() {\n    return this.page.getByTestId(\"notifications-filter-all\");\n  }\n\n  unreadFilter() {\n    return this.page.getByTestId(\"notifications-filter-unread\");\n  }\n\n  list() {\n    return this.page.getByTestId(\"notifications-list\");\n  }\n\n  empty() {\n    return this.page.getByTestId(\"notifications-empty\");\n  }\n\n  error() {\n    return this.page.getByTestId(\"notifications-error\");\n  }\n\n  item(id: string) {\n    return this.page.getByTestId(`notification-${id}`);\n  }\n}\n\nasync function loginAsTestUser(page: Page) {\n  await page.goto(\"/signup\");\n  await page.getByTestId(\"signup-name\").fill(\"테스트유저\");\n  await page.getByTestId(\"signup-email\").fill(`notification-${Date.now()}@example.com`);\n  await page.getByTestId(\"signup-password\").fill(\"password123\");\n  await page.getByTestId(\"signup-confirm-password\").fill(\"password123\");\n  await page.getByTestId(\"signup-submit\").click();\n  await page.waitForURL(\"**/dashboard\");\n}\n\nasync function stubNotifications(page: Page, notifications: Notification[] | \"error\") {\n  await page.route(\"**/api/notifications\", async (route) => {\n    if (notifications === \"error\") {\n      await route.fulfill({\n        status: 500,\n        contentType: \"application/json\",\n        body: JSON.stringify({ message: \"알림을 불러올 수 없습니다\" }),\n      });\n      return;\n    }\n\n    await route.fulfill({\n      status: 200,\n      contentType: \"application/json\",\n      body: JSON.stringify({\n        notifications,\n        total: notifications.length,\n      }),\n    });\n  });\n}\n\ntest.describe(\"대시보드 알림 필터\", () => {\n  test.beforeEach(async ({ page }) => {\n    await page.addInitScript(() => {\n      localStorage.setItem(\"cookie-consent\", \"true\");\n    });\n\n    await loginAsTestUser(page);\n  });\n\n  test(\"[C-NOTI-001] 기본 진입 시 전체 알림이 노출된다\", async ({ page }) => {\n    // Arrange\n    await stubNotifications(page, [\n      { id: \"1\", message: \"새 알림\", time: new Date().toISOString(), read: false },\n      { id: \"2\", message: \"읽은 알림\", time: new Date().toISOString(), read: true },\n    ]);\n    const section = new DashboardNotificationsSection(page);\n\n    // Act\n    await page.goto(\"/dashboard\");\n\n    // Assert\n    await expect(section.list()).toBeVisible();\n    await expect(section.allFilter()).toBeVisible();\n    await expect(section.unreadFilter()).toBeVisible();\n    await expect(section.item(\"1\")).toBeVisible();\n    await expect(section.item(\"2\")).toBeVisible();\n  });\n\n  test(\"[C-NOTI-002][C-NOTI-003] unread filter는 읽지 않은 알림만 남기고 비면 empty state를 노출한다\", async ({\n    page,\n  }) => {\n    // Arrange\n    await stubNotifications(page, [\n      { id: \"2\", message: \"읽은 알림\", time: new Date().toISOString(), read: true },\n    ]);\n    const section = new DashboardNotificationsSection(page);\n    await page.goto(\"/dashboard\");\n\n    // Act\n    await section.unreadFilter().click();\n\n    // Assert\n    await expect(section.item(\"2\")).not.toBeVisible();\n    await expect(section.empty()).toBeVisible();\n  });\n\n  test(\"[C-NOTI-004] API 오류면 오류 상태가 필터 UI보다 우선한다\", async ({ page }) => {\n    // Arrange\n    await stubNotifications(page, \"error\");\n    const section = new DashboardNotificationsSection(page);\n\n    // Act\n    await page.goto(\"/dashboard\");\n\n    // Assert\n    await expect(section.error()).toBeVisible();\n    await expect(section.allFilter()).not.toBeVisible();\n    await expect(section.unreadFilter()).not.toBeVisible();\n  });\n});\n"}, {"name": "NotificationList.tsx", "type": "text", "content": "\"use client\";\n\nimport { useState } from \"react\";\nimport useGetNotifications from \"@/hooks/apis/queries/useGetNotifications\";\n\ntype FilterType = \"all\" | \"unread\";\n\nexport default function NotificationList() {\n  const { notifications, isLoading, error } = useGetNotifications();\n  const [filter, setFilter] = useState<FilterType>(\"all\");\n\n  const handleFilterAll = () => setFilter(\"all\");\n  const handleFilterUnread = () => setFilter(\"unread\");\n\n  if (isLoading) {\n    return (\n      <div data-testid=\"notifications-loading\" className=\"animate-pulse space-y-2\">\n        {[1, 2, 3].map((i) => (\n          <div key={i} className=\"h-12 rounded bg-zinc-200 dark:bg-zinc-700\" />\n        ))}\n      </div>\n    );\n  }\n\n  if (error) {\n    return (\n      <p data-testid=\"notifications-error\" className=\"text-sm text-red-500\">\n        {error}\n      </p>\n    );\n  }\n\n  const filteredNotifications =\n    filter === \"unread\"\n      ? notifications.filter((n) => !n.read)\n      : notifications;\n\n  return (\n    <div>\n      <div className=\"mb-4 flex gap-2\">\n        <button\n          data-testid=\"notifications-filter-all\"\n          onClick={handleFilterAll}\n          className={`rounded px-3 py-1 text-sm font-medium transition-colors ${\n            filter === \"all\"\n              ? \"bg-blue-600 text-white\"\n              : \"bg-zinc-100 text-zinc-700 hover:bg-zinc-200 dark:bg-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-600\"\n          }`}\n        >\n          전체\n        </button>\n        <button\n          data-testid=\"notifications-filter-unread\"\n          onClick={handleFilterUnread}\n          className={`rounded px-3 py-1 text-sm font-medium transition-colors ${\n            filter === \"unread\"\n              ? \"bg-blue-600 text-white\"\n              : \"bg-zinc-100 text-zinc-700 hover:bg-zinc-200 dark:bg-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-600\"\n          }`}\n        >\n          읽지 않음\n        </button>\n      </div>\n\n      {filteredNotifications.length === 0 ? (\n        <p\n          data-testid=\"notifications-empty\"\n          className=\"py-8 text-center text-sm text-zinc-400\"\n        >\n          알림이 없습니다\n        </p>\n      ) : (\n        <ul data-testid=\"notifications-list\" className=\"space-y-2\">\n          {filteredNotifications.map((n) => (\n            <li\n              key={n.id}\n              data-testid={`notification-${n.id}`}\n              className={`rounded border p-3 text-sm ${\n                n.read\n                  ? \"border-zinc-200 bg-white dark:border-zinc-700 dark:bg-zinc-800\"\n                  : \"border-blue-200 bg-blue-50 dark:border-blue-800 dark:bg-blue-900/20\"\n              }`}\n            >\n              <p className=\"text-zinc-800 dark:text-zinc-200\">{n.message}</p>\n              <time\n                data-testid={`notification-time-${n.id}`}\n                className=\"mt-1 block text-xs text-zinc-400\"\n              >\n                {new Date(n.time).toLocaleString(\"ko-KR\")}\n              </time>\n            </li>\n          ))}\n        </ul>\n      )}\n    </div>\n  );\n}\n"}, {"name": "page.tsx", "type": "text", "content": "\"use client\";\n\nimport { useEffect } from \"react\";\nimport { useRouter } from \"next/navigation\";\nimport Link from \"next/link\";\nimport { useAuth } from \"@/contexts/AuthContext\";\nimport { useTodos } from \"@/contexts/TodoContext\";\nimport StatsCard from \"@/components/StatsCard\";\nimport TodoForm from \"@/components/TodoForm\";\nimport NotificationList from \"@/components/NotificationList\";\n\nexport default function DashboardPage() {\n  const { user, isAuthenticated, mounted } = useAuth();\n  const { todos, addTodo } = useTodos();\n  const router = useRouter();\n\n  useEffect(() => {\n    if (mounted && !isAuthenticated) router.push(\"/login\");\n  }, [mounted, isAuthenticated, router]);\n\n  if (!mounted || !isAuthenticated) return null;\n\n  const completed = todos.filter((t) => t.completed).length;\n  const pending = todos.length - completed;\n\n  return (\n    <div>\n      <h1 className=\"text-2xl font-bold text-zinc-900 dark:text-zinc-50\" data-testid=\"greeting\">\n        안녕하세요, {user?.name}님\n      </h1>\n      <p className=\"mt-1 text-sm text-zinc-500\">오늘도 좋은 하루 되세요!</p>\n      <p className=\"mt-1 text-xs text-zinc-400\" data-testid=\"current-date\">\n        {new Date().toLocaleDateString(\"ko-KR\")}\n      </p>\n\n      <div className=\"mt-8 grid grid-cols-1 gap-4 sm:grid-cols-3\">\n        <StatsCard label=\"전체 할 일\" value={todos.length} testId=\"stat-total\" />\n        <StatsCard label=\"완료\" value={completed} testId=\"stat-completed\" />\n        <StatsCard label=\"진행중\" value={pending} testId=\"stat-pending\" />\n      </div>\n\n      <div className=\"mt-8\">\n        <h2 className=\"mb-4 text-lg font-semibold text-zinc-900 dark:text-zinc-50\">빠른 추가</h2>\n        <TodoForm onSubmit={addTodo} />\n      </div>\n\n      <div className=\"mt-8\">\n        <h2 className=\"mb-4 text-lg font-semibold text-zinc-900 dark:text-zinc-50\">알림</h2>\n        <NotificationList />\n      </div>\n\n      <div className=\"mt-6\">\n        <Link\n          href=\"/todos\"\n          className=\"text-sm text-blue-600 hover:text-blue-800\"\n          data-testid=\"go-to-todos\"\n        >\n          전체 할 일 목록 보기 &rarr;\n        </Link>\n      </div>\n    </div>\n  );\n}\n"}], "api-hook-order-with_skill": [{"name": "types.ts", "type": "text", "content": "export interface OrderItem {\n  id: string;\n  productName: string;\n  quantity: number;\n  unitPrice: number;\n}\n\nexport interface Order {\n  id: string;\n  orderNumber: string;\n  status: \"pending\" | \"confirmed\" | \"shipped\" | \"delivered\" | \"cancelled\";\n  items: OrderItem[];\n  totalAmount: number;\n  createdAt: string;\n  updatedAt: string;\n}\n\nexport interface UseFetchOrderParams {\n  orderId: string | undefined;\n}\n\nexport interface UseFetchOrderReturn {\n  data: Order | null;\n  isLoading: boolean;\n  isError: boolean;\n  error: Error | null;\n  refetch: () => void;\n}\n"}, {"name": "useFetchOrder.test.ts", "type": "text", "content": "import { renderHook, waitFor, act } from \"@testing-library/react\";\nimport { useFetchOrder } from \"./useFetchOrder\";\n\nconst mockOrder = {\n  id: \"order-1\",\n  orderNumber: \"ORD-2026-001\",\n  status: \"confirmed\" as const,\n  items: [\n    {\n      id: \"item-1\",\n      productName: \"Widget\",\n      quantity: 2,\n      unitPrice: 1500,\n    },\n  ],\n  totalAmount: 3000,\n  createdAt: \"2026-03-15T00:00:00Z\",\n  updatedAt: \"2026-03-15T00:00:00Z\",\n};\n\nbeforeEach(() => {\n  global.fetch = jest.fn();\n});\n\nafterEach(() => {\n  jest.restoreAllMocks();\n});\n\ndescribe(\"useFetchOrder\", () => {\n  it(\"should return initial state when orderId is undefined\", () => {\n    const { result } = renderHook(() =>\n      useFetchOrder({ orderId: undefined })\n    );\n\n    expect(result.current.data).toBeNull();\n    expect(result.current.isLoading).toBe(false);\n    expect(result.current.isError).toBe(false);\n    expect(result.current.error).toBeNull();\n  });\n\n  it(\"should fetch order data successfully\", async () => {\n    (global.fetch as jest.Mock).mockResolvedValueOnce({\n      ok: true,\n      json: async () => mockOrder,\n    });\n\n    const { result } = renderHook(() =>\n      useFetchOrder({ orderId: \"order-1\" })\n    );\n\n    expect(result.current.isLoading).toBe(true);\n\n    await waitFor(() => {\n      expect(result.current.isLoading).toBe(false);\n    });\n\n    expect(result.current.data).toEqual(mockOrder);\n    expect(result.current.isError).toBe(false);\n    expect(result.current.error).toBeNull();\n    expect(global.fetch).toHaveBeenCalledWith(\n      \"/api/orders/order-1\",\n      expect.objectContaining({ signal: expect.any(AbortSignal) })\n    );\n  });\n\n  it(\"should handle fetch error\", async () => {\n    (global.fetch as jest.Mock).mockResolvedValueOnce({\n      ok: false,\n      status: 404,\n    });\n\n    const { result } = renderHook(() =>\n      useFetchOrder({ orderId: \"order-999\" })\n    );\n\n    await waitFor(() => {\n      expect(result.current.isLoading).toBe(false);\n    });\n\n    expect(result.current.data).toBeNull();\n    expect(result.current.isError).toBe(true);\n    expect(result.current.error?.message).toBe(\n      \"Failed to fetch order: 404\"\n    );\n  });\n\n  it(\"should handle network error\", async () => {\n    (global.fetch as jest.Mock).mockRejectedValueOnce(\n      new Error(\"Network error\")\n    );\n\n    const { result } = renderHook(() =>\n      useFetchOrder({ orderId: \"order-1\" })\n    );\n\n    await waitFor(() => {\n      expect(result.current.isLoading).toBe(false);\n    });\n\n    expect(result.current.isError).toBe(true);\n    expect(result.current.error?.message).toBe(\"Network error\");\n  });\n\n  it(\"should refetch when refetch is called\", async () => {\n    (global.fetch as jest.Mock)\n      .mockResolvedValueOnce({\n        ok: true,\n        json: async () => mockOrder,\n      })\n      .mockResolvedValueOnce({\n        ok: true,\n        json: async () => ({ ...mockOrder, status: \"shipped\" }),\n      });\n\n    const { result } = renderHook(() =>\n      useFetchOrder({ orderId: \"order-1\" })\n    );\n\n    await waitFor(() => {\n      expect(result.current.isLoading).toBe(false);\n    });\n\n    expect(result.current.data?.status).toBe(\"confirmed\");\n\n    act(() => {\n      result.current.refetch();\n    });\n\n    await waitFor(() => {\n      expect(result.current.data?.status).toBe(\"shipped\");\n    });\n\n    expect(global.fetch).toHaveBeenCalledTimes(2);\n  });\n\n  it(\"should refetch when orderId changes\", async () => {\n    (global.fetch as jest.Mock)\n      .mockResolvedValueOnce({\n        ok: true,\n        json: async () => mockOrder,\n      })\n      .mockResolvedValueOnce({\n        ok: true,\n        json: async () => ({ ...mockOrder, id: \"order-2\" }),\n      });\n\n    const { result, rerender } = renderHook(\n      ({ orderId }) => useFetchOrder({ orderId }),\n      { initialProps: { orderId: \"order-1\" as string | undefined } }\n    );\n\n    await waitFor(() => {\n      expect(result.current.data?.id).toBe(\"order-1\");\n    });\n\n    rerender({ orderId: \"order-2\" });\n\n    await waitFor(() => {\n      expect(result.current.data?.id).toBe(\"order-2\");\n    });\n\n    expect(global.fetch).toHaveBeenCalledTimes(2);\n  });\n});\n"}, {"name": "useFetchOrder.ts", "type": "text", "content": "\"use client\";\n\nimport { useState, useEffect, useCallback, useRef } from \"react\";\nimport type {\n  Order,\n  UseFetchOrderParams,\n  UseFetchOrderReturn,\n} from \"./types\";\n\nexport function useFetchOrder({\n  orderId,\n}: UseFetchOrderParams): UseFetchOrderReturn {\n  const [data, setData] = useState<Order | null>(null);\n  const [isLoading, setIsLoading] = useState(false);\n  const [isError, setIsError] = useState(false);\n  const [error, setError] = useState<Error | null>(null);\n  const abortControllerRef = useRef<AbortController | null>(null);\n\n  const fetchOrder = useCallback(async () => {\n    if (!orderId) return;\n\n    abortControllerRef.current?.abort();\n    const controller = new AbortController();\n    abortControllerRef.current = controller;\n\n     // ---- State ----

          const resp = await fetch("/api/feedback");

    // ---- XLSX rendering via SheetJS ----
    function renderXlsx(container, b64Data) {
      try {
        const raw = Uint8Array.from(atob(b64Data), c => c.charCodeAt(0));
        const wb = XLSX.read(raw, { type: "array" });

        for (let i = 0; i < wb.SheetNames.length; i++) {
          const sheetName = wb.SheetNames[i];
          const ws = wb.Sheets[sheetName];

          if (wb.SheetNames.length > 1) {
            const sheetLabel = document.createElement("div");
            sheetLabel.style.cssText =
              "font-weight:600; font-size:0.8rem; color:#b0aea5; margin-top:0.5rem; margin-bottom:0.25rem;";
            sheetLabel.textContent = "시트: " + sheetName;
            container.appendChild(sheetLabel);
          }

          const htmlStr = XLSX.utils.sheet_to_html(ws, { editable: false });
          const wrapper = document.createElement("div");
          wrapper.innerHTML = htmlStr;
          container.appendChild(wrapper);
        }
      } catch (err) {
        container.textContent = "스프레드시트 렌더링 오류: " + err.message;
      }
    }

      html += '</div>';

      // Assertions list
      html += '<ul class="assertion-list">';
      for (const exp of expectations) {

        html += '<li class="assertion-item">';

        if (exp.evidence) {
          html += '<div class="assertion-evidence">' + escapeHtml(exp.evidence) + '</div>';

      }
      html += '</ul>';

    // ---- Feedback (saved to server -> feedback.json) ----
    function saveCurrentFeedback() {
      const run = EMBEDDED_DATA.runs[currentIndex];
      const text = document.getElementById("feedback").value;

      if (text.trim() === "") {
        delete feedbackMap[run.id];
      } else {
        feedbackMap[run.id] = text;
      }

      // Build reviews array from map
      const reviews = [];
      for (const [run_id, feedback] of Object.entries(feedbackMap)) {
        if (feedback.trim()) {
          reviews.push({ run_id, feedback, timestamp: new Date().toISOString() });
        }
      }

      fetch("/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ reviews, status: "in_progress" }),
      }).then(() => {
        document.getElementById("feedback-status").textContent = "저장됨";
      }).catch(() => {
        // Static mode or server unavailable — no-op on auto-save,
        // feedback will be downloaded on final submit
        document.getElementById("feedback-status").textContent = "제출 시 다운로드됩니다";
      });
    }

    function showDoneDialog() {
      // Save current textarea to feedbackMap (but don't POST yet)
      const run = EMBEDDED_DATA.runs[currentIndex];
      const text = document.getElementById("feedback").value;
      if (text.trim() === "") {
        delete feedbackMap[run.id];
      } else {
        feedbackMap[run.id] = text;
      }

      // POST once with status: complete — include ALL runs so the model
      // can distinguish "no feedback" (looks good) from "not reviewed"
      const reviews = [];
      const ts = new Date().toISOString();
      for (const r of EMBEDDED_DATA.runs) {
        reviews.push({ run_id: r.id, feedback: feedbackMap[r.id] || "", timestamp: ts });
      }
      const payload = JSON.stringify({ reviews, status: "complete" }, null, 2);
      fetch("/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: payload,
      }).then(() => {
        document.getElementById("done-overlay").classList.add("visible");
      }).catch(() => {
        // Server not available (static mode) — download as file
        const blob = new Blob([payload], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "feedback.json";
        a.click();
        URL.revokeObjectURL(url);
        document.getElementById("done-overlay").classList.add("visible");
      });

      html += '<table class="benchmark-table">';

        if (!stat) return "—";
        const suffix = pct ? "%" : "";
        const m = pct ? (stat.mean * 100).toFixed(0) : stat.mean.toFixed(1);
        const s = pct ? (stat.stddev * 100).toFixed(0) : stat.stddev.toFixed(1);
        return m + suffix + " ± " + s + suffix;
      }

      function deltaClass(val) {
        if (!val) return "";
        const n = parseFloat(val);
        if (n > 0) return "benchmark-delta-positive";
        if (n < 0) return "benchmark-delta-negative";
        return "";
      }

      // Discover config names dynamically (everything except "delta")
      const configs = Object.keys(summary).filter(k => k !== "delta");
      const configA = configs[0] || "config_a";
      const configB = configs[1] || "config_b";
      const labelA = configA.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      const labelB = configB.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      const a = summary[configA] || {};

      const delta = summary.delta || {};

      html += "<thead><tr><th>지표</th><th>" + escapeHtml(labelA) + "</th><th>" + escapeHtml(labelB) + "</th><th>차이</th></tr></thead>";

        html += "<td>" + fmtStat(b.time_seconds, false) + "</td>";

      }

      // Per-eval breakdown (if runs data available)
      const runs = data.runs || [];
      if (runs.length > 0) {

        const hasTime = runs.some(r => r.result && r.result.time_seconds != null);
        const hasErrors = runs.some(r => r.result && r.result.errors > 0);

        for (const evalId of evalIds) {
          const evalRuns = runs.filter(r => r.eval_id === evalId);
          const evalName = evalRuns[0] && evalRuns[0].eval_name ? evalRuns[0].eval_name : "평가 " + evalId;

          html += "<h4 style='font-family: Poppins, sans-serif; margin: 1rem 0 0.5rem; color: var(--text);'>" + escapeHtml(evalName) + "</h4>";
          html += '<table class="benchmark-table">';
          html += "<thead><tr><th>설정</th><th>실행</th><th>통과율</th>";
          if (hasTime) html += "<th>소요 시간 (초)</th>";
          if (hasErrors) html += "<th>실행 중 오류</th>";
          html += "</tr></thead>";
          html += "<tbody>";

          // Group by config and render with average rows
          const configGroups = [...new Set(evalRuns.map(r => r.configuration))];
          for (let ci = 0; ci < configGroups.length; ci++) {
            const config = configGroups[ci];
            const configRuns = evalRuns.filter(r => r.configuration === config);
            if (configRuns.length === 0) continue;

            const rowClass = ci === 0 ? "benchmark-row-with" : "benchmark-row-without";
            const configLabel = config.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());

            for (const run of configRuns) {
              const r = run.result || {};
              const prClass = r.pass_rate >= 0.8 ? "benchmark-delta-positive" : r.pass_rate < 0.5 ? "benchmark-delta-negative" : "";
              html += '<tr class="' + rowClass + '">';
              html += "<td>" + configLabel + "</td>";
              html += "<td>" + run.run_number + "</td>";
              html += '<td class="' + prClass + '">' + ((r.pass_rate || 0) * 100).toFixed(0) + "% (" + (r.passed || 0) + "/" + (r.total || 0) + ")</td>";
              if (hasTime) html += "<td>" + (r.time_seconds != null ? r.time_seconds.toFixed(1) : "—") + "</td>";
              if (hasErrors) html += "<td>" + (r.errors || 0) + "</td>";
              html += "</tr>";
            }

            // Average row
            const rates = configRuns.map(r => (r.result || {}).pass_rate || 0);
            const avgRate = rates.reduce((a, b) => a + b, 0) / rates.length;
            const avgPrClass = avgRate >= 0.8 ? "benchmark-delta-positive" : avgRate < 0.5 ? "benchmark-delta-negative" : "";
            html += '<tr class="benchmark-row-avg ' + rowClass + '">';
            html += "<td>" + configLabel + "</td>";
            html += "<td>평균</td>";
            html += '<td class="' + avgPrClass + '">' + (avgRate * 100).toFixed(0) + "%</td>";
            if (hasTime) {
              const times = configRuns.map(r => (r.result || {}).time_seconds).filter(t => t != null);
              html += "<td>" + (times.length ? (times.reduce((a, b) => a + b, 0) / times.length).toFixed(1) : "—") + "</td>";
            }
            if (hasErrors) html += "<td></td>";
            html += "</tr>";
          }
          html += "</tbody></table>";

          // Per-assertion detail for this eval
          const runsWithExpectations = {};
          for (const config of configGroups) {
            runsWithExpectations[config] = evalRuns.filter(r => r.configuration === config && r.expectations && r.expectations.length > 0);
          }
          const hasAnyExpectations = Object.values(runsWithExpectations).some(runs => runs.length > 0);
          if (hasAnyExpectations) {
            // Collect all unique assertion texts across all configs
            const allAssertions = [];
            const seen = new Set();
            for (const config of configGroups) {
              for (const run of runsWithExpectations[config]) {
                for (const exp of (run.expectations || [])) {
                  if (!seen.has(exp.text)) {
                    seen.add(exp.text);
                    allAssertions.push(exp.text);
                  }
                }
              }
            }

            html += '<table class="benchmark-table" style="margin-top: 0.5rem;">';
            html += "<thead><tr><th>검증 항목</th>";
            for (const config of configGroups) {
              const label = config.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
              html += "<th>" + escapeHtml(label) + "</th>";
            }
            html += "</tr></thead><tbody>";

            for (const assertionText of allAssertions) {
              html += "<tr><td>" + escapeHtml(assertionText) + "</td>";

              for (const config of configGroups) {
                html += "<td>";
                for (const run of runsWithExpectations[config]) {
                  const exp = (run.expectations || []).find(e => e.text === assertionText);
                  if (exp) {
                    const cls = exp.passed ? "benchmark-delta-positive" : "benchmark-delta-negative";
                    const icon = exp.passed ? "\u2713" : "\u2717";
                    html += '<span class="' + cls + '" title="Run ' + run.run_number + ': ' + escapeHtml(exp.evidence || "") + '">' + icon + "</span> ";
                  } else {
                    html += "— ";
                  }
                }
                html += "</td>";
              }
              html += "</tr>";
            }
            html += "</tbody></table>";
          }
        }
      }

      // Notes
      if (notes.length > 0) {
        html += '<div class="benchmark-notes">';
        html += "<h3>분석 노트</h3>";
        html += "<ul>";
        for (const note of notes) {
          html += "<li>" + escapeHtml(note) + "</li>";
        }
        html += "</ul></div>";
      }

      container.innerHTML = html;
    }

    // ---- Start ----
    init();
    renderBenchmark();
  </script>
</body>
</html>
