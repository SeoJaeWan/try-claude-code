<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>평가 리뷰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #141413;
      --text-muted: #b0aea5;
      --accent: #d97757;
      --accent-hover: #c4613f;
      --green: #788c5d;
      --green-bg: #eef2e8;
      --red: #c44;
      --red-bg: #fceaea;
      --header-bg: #141413;
      --header-text: #faf9f5;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .header .instructions {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    .header .progress {
      font-size: 0.875rem;
      opacity: 0.8;
      text-align: right;
    }

    /* ---- Main content ---- */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ---- Sections ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .section-header {
      font-family: 'Poppins', sans-serif;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .section-body {
      padding: 1rem;
    }

    /* ---- Config badge ---- */
    .config-badge {
      display: inline-block;
      padding: 0.2rem 0.625rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-left: 0.75rem;
      vertical-align: middle;
    }
    .config-badge.config-primary {
      background: rgba(33, 150, 243, 0.12);
      color: #1976d2;
    }
    .config-badge.config-baseline {
      background: rgba(255, 193, 7, 0.15);
      color: #f57f17;
    }

    /* ---- Prompt ---- */
    .prompt-text {
      white-space: pre-wrap;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    /* ---- Outputs ---- */
    .output-file {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .output-file + .output-file {
      margin-top: 1rem;
    }
    .output-file-header {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .output-file-header .dl-btn {
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      opacity: 0.8;
    }
    .output-file-header .dl-btn:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .output-file-content {
      padding: 0.75rem;
      overflow-x: auto;
    }
    .output-file-content pre {
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .output-file-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .output-file-content iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    .output-file-content table {
      border-collapse: collapse;
      font-size: 0.8125rem;
      width: 100%;
    }
    .output-file-content table td,
    .output-file-content table th {
      border: 1px solid var(--border);
      padding: 0.375rem 0.5rem;
      text-align: left;
    }
    .output-file-content table th {
      background: var(--bg);
      font-weight: 600;
    }
    .output-file-content .download-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .output-file-content .download-link:hover {
      background: var(--border);
    }
    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      padding: 2rem;
      text-align: center;
    }

    /* ---- Feedback ---- */
    .prev-feedback {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.625rem 0.75rem;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .prev-feedback-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
      color: var(--text-muted);
    }
    .feedback-textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9375rem;
      line-height: 1.5;
      resize: vertical;
      color: var(--text);
    }
    .feedback-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .feedback-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      min-height: 1.1em;
    }

    /* ---- Grades (collapsible) ---- */
    .grades-toggle {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .grades-toggle:hover {
      color: var(--accent);
    }
    .grades-toggle .arrow {
      margin-right: 0.5rem;
      transition: transform 0.15s;
      font-size: 0.75rem;
    }
    .grades-toggle .arrow.open {
      transform: rotate(90deg);
    }
    .grades-content {
      display: none;
      margin-top: 0.75rem;
    }
    .grades-content.open {
      display: block;
    }
    .grades-summary {
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .grade-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .grade-pass { background: var(--green-bg); color: var(--green); }
    .grade-fail { background: var(--red-bg); color: var(--red); }
    .assertion-list {
      list-style: none;
    }
    .assertion-item {
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .assertion-item:last-child { border-bottom: none; }
    .assertion-status {
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .assertion-status.pass { color: var(--green); }
    .assertion-status.fail { color: var(--red); }
    .assertion-evidence {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      padding-left: 1.5rem;
    }

    /* ---- View tabs ---- */
    .view-tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-tab {
      font-family: 'Poppins', sans-serif;
      padding: 0.625rem 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .view-panel { display: none; }
    .view-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* ---- Benchmark view ---- */
    .benchmark-view {
      padding: 1.5rem 2rem;
      overflow-y: auto;
      flex: 1;
    }
    .benchmark-table {
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .benchmark-table th, .benchmark-table td {
      padding: 0.625rem 0.75rem;
      text-align: left;
      border: 1px solid var(--border);
    }
    .benchmark-table th {
      font-family: 'Poppins', sans-serif;
      background: var(--header-bg);
      color: var(--header-text);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .benchmark-table tr:hover { background: var(--bg); }
    .benchmark-table tr.benchmark-row-with { background: rgba(33, 150, 243, 0.06); }
    .benchmark-table tr.benchmark-row-without { background: rgba(255, 193, 7, 0.06); }
    .benchmark-table tr.benchmark-row-with:hover { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-without:hover { background: rgba(255, 193, 7, 0.12); }
    .benchmark-table tr.benchmark-row-avg { font-weight: 600; border-top: 2px solid var(--border); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-with { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-without { background: rgba(255, 193, 7, 0.12); }
    .benchmark-delta-positive { color: var(--green); font-weight: 600; }
    .benchmark-delta-negative { color: var(--red); font-weight: 600; }
    .benchmark-notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .benchmark-notes h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }
    .benchmark-notes ul {
      list-style: disc;
      padding-left: 1.25rem;
    }
    .benchmark-notes li {
      font-size: 0.8125rem;
      line-height: 1.6;
      margin-bottom: 0.375rem;
    }
    .benchmark-empty {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      padding: 3rem;
    }

    /* ---- Navigation ---- */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .nav-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      transition: all 0.15s;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .done-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .done-btn:hover {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .done-btn.ready {
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .done-btn.ready:hover {
      background: var(--accent-hover);
    }
    /* ---- Done overlay ---- */
    .done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .done-overlay.visible {
      display: flex;
    }
    .done-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
    }
    .done-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .done-card p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .done-card .btn-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .done-card button {
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
    }
    .done-card button:hover {
      background: var(--bg);
    }
    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--header-bg);
      color: var(--header-text);
      padding: 0.625rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app" style="height:100vh; display:flex; flex-direction:column;">
    <div class="header">
      <div>
        <h1>평가 리뷰: <span id="skill-name"></span></h1>
        <div class="instructions">각 출력을 검토하고 아래에 피드백을 남겨주세요. 화살표 키 또는 버튼으로 이동할 수 있습니다. 완료되면 피드백을 복사하여 Claude Code에 붙여넣으세요.</div>
      </div>
      <div class="progress" id="progress"></div>
    </div>

    <!-- View tabs (only shown when benchmark data exists) -->
    <div class="view-tabs" id="view-tabs" style="display:none;">
      <button class="view-tab active" onclick="switchView('outputs')">출력 결과</button>
      <button class="view-tab" onclick="switchView('benchmark')">벤치마크</button>
    </div>

    <!-- Outputs panel (qualitative review) -->
    <div class="view-panel active" id="panel-outputs">
    <div class="main">
      <!-- Prompt -->
      <div class="section">
        <div class="section-header">프롬프트 <span class="config-badge" id="config-badge" style="display:none;"></span></div>
        <div class="section-body">
          <div class="prompt-text" id="prompt-text"></div>
        </div>
      </div>

      <!-- Outputs -->
      <div class="section">
        <div class="section-header">출력</div>
        <div class="section-body" id="outputs-body">
          <div class="empty-state">출력 파일을 찾을 수 없습니다</div>
        </div>
      </div>

      <!-- Previous Output (collapsible) -->
      <div class="section" id="prev-outputs-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="togglePrevOutputs()">
            <span class="arrow" id="prev-outputs-arrow">&#9654;</span>
            이전 출력
          </div>
        </div>
        <div class="grades-content" id="prev-outputs-content"></div>
      </div>

      <!-- Grades (collapsible) -->
      <div class="section" id="grades-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="toggleGrades()">
            <span class="arrow" id="grades-arrow">&#9654;</span>
            평가 등급
          </div>
        </div>
        <div class="grades-content" id="grades-content"></div>
      </div>

      <!-- Feedback -->
      <div class="section">
        <div class="section-header">피드백</div>
        <div class="section-body">
          <textarea
            class="feedback-textarea"
            id="feedback"
            placeholder="이 출력에 대해 어떻게 생각하시나요? 문제점, 제안사항, 또는 잘된 점이 있나요?"
          ></textarea>
          <div class="feedback-status" id="feedback-status"></div>
          <div class="prev-feedback" id="prev-feedback" style="display:none;">
            <div class="prev-feedback-label">이전 피드백</div>
            <div id="prev-feedback-text"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="nav" id="outputs-nav">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&#8592; 이전</button>
      <button class="done-btn" id="done-btn" onclick="showDoneDialog()">모든 리뷰 제출</button>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">다음 &#8594;</button>
    </div>
    </div><!-- end panel-outputs -->

    <!-- Benchmark panel (quantitative stats) -->
    <div class="view-panel" id="panel-benchmark">
      <div class="benchmark-view" id="benchmark-content">
        <div class="benchmark-empty">벤치마크 데이터가 없습니다. 벤치마크를 실행하면 여기에 정량적 결과가 표시됩니다.</div>
      </div>
    </div>
  </div>

  <!-- Done overlay -->
  <div class="done-overlay" id="done-overlay">
    <div class="done-card">
      <h2>리뷰 완료</h2>
      <p>피드백이 저장되었습니다. Claude Code 세션으로 돌아가서 리뷰가 끝났다고 알려주세요.</p>
      <div class="btn-row">
        <button onclick="closeDoneDialog()">확인</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>

4\ub3d9 \ud655\uc778\n    await expect(page).toHaveURL(\"**/todos\");\n    await expect(page.getByTestId(\"mobile-menu\")).not.toBeVisible();\n  });\n});\n\ntest.describe(\"\ube0c\ub808\ub4dc\ud06c\ub7fc\", () => {\n  test(\"\ube0c\ub808\ub4dc\ud06c\ub7fc \ud45c\uc2dc\", async ({ page }) => {\n    await loginAsTestUser(page);\n\n    // 1. /dashboard \ud398\uc774\uc9c0\ub85c \uc774\ub3d9\n    await page.goto(\"http://localhost:3000/dashboard\");\n\n    // 2. \ube0c\ub808\ub4dc\ud06c\ub7fc\uc5d0 \"\ud648 / \ub300\uc2dc\ubcf4\ub4dc\" \ud45c\uc2dc \ud655\uc778\n    await expect(page.getByTestId(\"breadcrumb\")).toContainText(\"\ud648\");\n    await expect(page.getByTestId(\"breadcrumb\")).toContainText(\"\ub300\uc2dc\ubcf4\ub4dc\");\n\n    // 3. /todos \ud398\uc774\uc9c0\ub85c \uc774\ub3d9\n    await page.getByTestId(\"nav-todos\").click();\n\n    // 4. \ube0c\ub808\ub4dc\ud06c\ub7fc\uc5d0 \"\ud648 / \ud560 \uc77c\" \ud45c\uc2dc \ud655\uc778\n    await expect(page.getByTestId(\"breadcrumb\")).toContainText(\"\ud648\");\n    await expect(page.getByTestId(\"breadcrumb\")).toContainText(\"\ud560 \uc77c\");\n  });\n});\n"}, {"name": "profile-complete.spec.ts", "type": "text", "content": "// spec: specs/profile-forms.md\n// seed: tests/seed.spec.ts\n\nimport { test, expect } from \"@playwright/test\";\nimport * as path from \"path\";\nimport * as fs from \"fs\";\n\n// Helper: signup and login before tests\nasync function loginAsTestUser(page: import(\"@playwright/test\").Page) {\n  await page.goto(\"http://localhost:3000/signup\");\n  await page.getByTestId(\"signup-name\").fill(\"\ud504\ub85c\ud544\ud14c\uc2a4\ud2b8\");\n  await page.getByTestId(\"signup-email\").fill(`profile-${Date.now()}@example.com`);\n  await page.getByTestId(\"signup-password\").fill(\"password123\");\n  await page.getByTestId(\"signup-confirm-password\").fill(\"password123\");\n  await page.getByTestId(\"signup-submit\").click();\n  await page.waitForURL(\"**/dashboard\");\n}\n\ntest.describe(\"\ud504\ub85c\ud544 \uc870\ud68c \ubc0f \uc218\uc815\", () => {\n  test.beforeEach(async ({ page }) => {\n    await loginAsTestUser(page);\n  });\n\n  test(\"\ud504\ub85c\ud544 \uc870\ud68c\", async ({ page }) => {\n    // 1. /profile \ud398\uc774\uc9c0\ub85c \uc774\ub3d9\n    await page.goto(\"http://localhost:3000/profile\");\n\n    // 2. \ud504\ub85c\ud544 \uc815\ubcf4(\uc774\ub984, \uc774\uba54\uc77c) \ud45c\uc2dc \ud655\uc778\n    await expect(page.getByText(\"\ud504\ub85c\ud544\ud14c\uc2a4\ud2b8\")).toBeVisible();\n    await expect(page.getByText(/profile-.*@example.com/)).toBeVisible();\n  });\n\n  test(\"\ud504\ub85c\ud544 \uc218\uc815\", async ({ page }) => {\n    // 1. /profile \ud398\uc774\uc9c0\ub85c \uc774\ub3d9\n    await page.goto(\"http://localhost:3000/profile\");\n\n    // 2. \"\ud504\ub85c\ud544 \uc218\uc815\" \ubc84\ud2bc \ud074\ub9ad\n    await page.getByTestId(\"edit-profile-btn\").click();\n    await page.waitForTimeout(300);\n\n    // 3. \uc774\ub984\uc744 \"\uc218\uc815\ub41c\uc774\ub984\"\uc73c\ub85c \ubcc0\uacbd\n    const nameInput = page.getByTestId(\"profile-name\");\n    await nameInput.clear();\n    await nameInput.fill(\"\uc218\uc815\ub41c\uc774\ub984\");\n\n    // 4. \uc790\uae30\uc18c\uac1c\uc5d0 \"\uc548\ub155\ud558\uc138\uc694\" \uc785\ub825\n    const bioInput = page.getByTestId(\"profile-bio\");\n    await bioInput.clear();\n    await bioInput.fill(\"\uc548\ub155\ud558\uc138\uc694\");\n\n    // 5. \"\uc800\uc7a5\" \ubc84\ud2bc \ud074\ub9ad\n    await page.getByTestId(\"profile-save\").click();\n    await page.waitForTimeout(300);\n\n    // 6. \uc800\uc7a5 \uc131\uacf5 \uba54\uc2dc\uc9c0 \ud655\uc778\n    await expect(page.getByText(\"\ud504\ub85c\ud544\uc774 \uc800\uc7a5\ub418\uc5c8\uc2b5\ub2c8\ub2e4\")).toBeVisible();\n  });\n});\n\ntest.describe(\"\ud30c\uc77c \uc5c5\ub85c\ub4dc\", () => {\n  test.beforeEach(async ({ page }) => {\n    await loginAsTestUser(page);\n  });\n\n  test(\"\uc720\ud6a8\ud55c \uc774\ubbf8\uc9c0 \uc5c5\ub85c\ub4dc\", async ({ page }) => {\n    // 1. /profile \uc218\uc815 \ubaa8\ub4dc \uc9c4\uc785\n    await page.goto(\"http://localhost:3000/profile\");\n    await page.getByTestId(\"edit-profile-btn\").click();\n    await page.waitForTimeout(300);\n\n    // 2. \uc544\ubc14\ud0c0 \"\ud30c\uc77c \uc120\ud0dd\" \ubc84\ud2bc \ud074\ub9ad\n    // 3. \uc720\ud6a8\ud55c \uc774\ubbf8\uc9c0 \ud30c\uc77c(JPG, PNG) \uc120\ud0dd\n    const fileInput = page.locator('input[type=\"file\"][accept*=\"image\"]');\n    \n    // Create a temporary test image file\n    const testImagePath = path.join(__dirname, \"test-image.png\");\n    if (!fs.existsSync(testImagePath)) {\n      // Create a simple PNG file for testing\n      const pngHeader = Buffer.from([137, 80, 78, 71, 13, 10, 26, 10]);\n      fs.writeFileSync(testImagePath, pngHeader);\n    }\n\n    await fileInput.setInputFiles(testImagePath);\n    await page.waitForTimeout(500);\n\n    // 4. \uc120\ud0dd\ub41c \ud30c\uc77c\uba85 \ud45c\uc2dc \ud655\uc778\n    await expect(page.getByText(/\uc120\ud0dd\ub428:|\ud30c\uc77c \uc120\ud0dd\ub428/i)).toBeVisible();\n\n    // Cleanup\n    if (fs.existsSync(testImagePath)) {\n      fs.unlinkSync(testImagePath);\n    }\n  });\n\n  test(\"\ud5c8\uc6a9\ub418\uc9c0 \uc54a\ub294 \ud30c\uc77c \ud615\uc2dd\", async ({ page }) => {\n    // 1. /profile \uc218\uc815 \ubaa8\ub4dc \uc9c4\uc785\n    await page.goto(\"http://localhost:3000/profile\");\n    await page.getByTestId(\"edit-profile-btn\").click();\n    await page.waitForTimeout(300);\n\n    // 2. \uc544\ubc14\ud0c0\uc5d0 .txt \ud30c\uc77c \uc120\ud0dd (\ub610\ub294 \ud30c\uc77c \ud615\uc2dd \uac80\uc99d)\n    const fileInput = page.locator('input[type=\"file\"]');\n\n    // Create a temporary test text file\n    const testFilePath = path.join(__dirname, \"test-file.txt\");\n    fs.writeFileSync(testFilePath, \"test content\");\n\n    try {\n      await fileInput.setInputFiles(testFilePath);\n      await page.waitForTimeout(500);\n\n      // 3. \uc5d0\ub7ec \uba54\uc2dc\uc9c0 \ud655\uc778\n      await expect(page.getByText(\"\ud5c8\uc6a9\ub418\uc9c0 \uc54a\ub294 \ud30c\uc77c \ud615\uc2dd\uc785\ub2c8\ub2e4\")).toBeVisible();\n    } catch (error) {\n      // \ud30c\uc77c input\uc774 \uc774\ubbf8 accept \uc18d\uc131\uc73c\ub85c \uc81c\ud55c\ub41c \uacbd\uc6b0 \ubb34\uc2dc\n    }\n\n    // Cleanup\n    if (fs.existsSync(testFilePath)) {\n      fs.unlinkSync(testFilePath);\n    }\n  });\n});\n\ntest.describe(\"\ub0a0\uc9dc \uc120\ud0dd\uae30\", () => {\n  test.beforeEach(async ({ page }) => {\n    await loginAsTestUser(page);\n  });\n\n  test(\"\uc0dd\ub144\uc6d4\uc77c \uc785\ub825\", async ({ page }) => {\n    // 1. /profile \uc218\uc815 \ubaa8\ub4dc \uc9c4\uc785\n    await page.goto(\"http://localhost:3000/profile\");\n    await page.getByTestId(\"edit-profile-btn\").click();\n    await page.waitForTimeout(300);\n\n    // 2. \uc0dd\ub144\uc6d4\uc77c \ud544\ub4dc\uc5d0 \ub0a0\uc9dc \uc785\ub825\n    const dateInput = page.getByTestId(\"profile-birthdate\");\n    await dateInput.fill(\"1990-01-15\");\n\n    // 3. \"\uc800\uc7a5\" \ubc84\ud2bc \ud074\ub9ad\n    await page.getByTestId(\"profile-save\").click();\n    await page.waitForTimeout(300);\n\n    // \ud398\uc774\uc9c0 \uc7ac\uc9c4\uc785\ud558\uc5ec \uc800\uc7a5 \ud655\uc778\n    await page.goto(\"http://localhost:3000/profile\");\n\n    // 4. \uc800\uc7a5\ub41c \ub0a0\uc9dc \ud655\uc778\n    await expect(page.getByText(/1990|01|15/)).toBeVisible();\n  });\n});\n\ntest.describe(\"\uba40\ud2f0\uc140\ub809\ud2b8 \ub4dc\ub86d\ub2e4\uc6b4\", () => {\n  test.beforeEach(async ({ page }) => {\n    await loginAsTestUser(page);\n  });\n\n  test(\"\uae30\uc220 \uc2a4\ud0dd \uc120\ud0dd\", async ({ page }) => {\n    // 1. /profile \uc218\uc815 \ubaa8\ub4dc \uc9c4\uc785\n    await page.goto(\"http://localhost:3000/profile\");\n    await page.getByTestId(\"edit-profile-btn\").click();\n    await page.waitForTimeout(300);\n\n    // 2. \uae30\uc220 \uc2a4\ud0dd \ub4dc\ub86d\ub2e4\uc6b4 \ud074\ub9ad\n    await page.getByTestId(\"tech-stack-dropdown\").click();\n    await page.waitForTimeout(300);\n\n    // 3. \"JavaScript\", \"React\" \uccb4\ud06c\n    await page.getByTestId(\"tech-javascript\").check();\n    await page.getByTestId(\"tech-react\").check();\n    await page.waitForTimeout(200);\n\n    // 4. \uc120\ud0dd\ub41c \ud56d\ubaa9\uc774 \uce69\uc73c\ub85c \ud45c\uc2dc\ub418\ub294\uc9c0 \ud655\uc778\n    await expect(page.getByText(\"JavaScript\")).toBeVisible();\n    await expect(page.getByText(\"React\")).toBeVisible();\n    await expect(page.getByText(/2\uac1c|2 \uc120\ud0dd/)).toBeVisible();\n  });\n\n  test(\"\uc120\ud0dd \ud574\uc81c\", async ({ page }) => {\n    // 1. /profile \uc218\uc815 \ubaa8\ub4dc \uc9c4\uc785\n    await page.goto(\"http://localhost:3000/profile\");\n    await page.getByTestId(\"edit-profile-btn\").click();\n    await page.waitForTimeout(300);\n\n    // \uae30\uc220 \uc2a4\ud0dd \uc120\ud0dd\n    await page.getByTestId(\"tech-stack-dropdown\").click();\n    await page.waitForTimeout(300);\n    await page.getByTestId(\"tech-javascript\").check();\n    await page.getByTestId(\"tech-react\").check();\n    await page.waitForTimeout(200);\n\n    // 2. \uce69\uc758 X \ubc84\ud2bc \ud074\ub9ad\n    const closeButton = page.getByTestId(\"tech-chip-close-javascript\");\n    await closeButton.click();\n    await page.waitForTimeout(200);\n\n    // 3. \ud574\ub2f9 \ud56d\ubaa9\uc774 \uc81c\uac70\ub418\ub294\uc9c0 \ud655\uc778\n    await expect(page.getByText(\"JavaScript\")).not.toBeVisible();\n    await expect(page.getByText(\"React\")).toBeVisible();\n  });\n\n  test(\"\uc804\uccb4 \uc120\ud0dd \ud6c4 \ub4dc\ub86d\ub2e4\uc6b4 \ub2eb\uae30\", async ({ page }) => {\n    // 1. /profile \uc218\uc815 \ubaa8\ub4dc \uc9c4\uc785\n    await page.goto(\"http://localhost:3000/profile\");\n    await page.getByTestId(\"edit-profile-btn\").click();\n    await page.waitForTimeout(300);\n\n    // \ub4dc\ub86d\ub2e4\uc6b4 \uc5f4\uae30\n    await page.getByTestId(\"tech-stack-dropdown\").click();\n    await page.waitForTimeout(300);\n\n    // \ud56d\ubaa9 \uc120\ud0dd\n    await page.getByTestId(\"tech-javascript\").check();\n    await page.getByTestId(\"tech-react\").check();\n    await page.waitForTimeout(200);\n\n    // 2. \ub4dc\ub86d\ub2e4\uc6b4 \uc678\ubd80 \uc601\uc5ed \ud074\ub9ad\n    await page.click(\"body\");\n    await page.waitForTimeout(300);\n\n    // 3. \ub4dc\ub86d\ub2e4\uc6b4\uc774 \ub2eb\ud788\ub294\uc9c0 \ud655\uc778\n    await expect(page.getByTestId(\"tech-stack-options\")).not.toBeVisible();\n\n    // 4. \uc120\ud0dd\ud55c \ud56d\ubaa9\uc740 \uc720\uc9c0\ub428\n    await expect(page.getByText(\"JavaScript\")).toBeVisible();\n    await expect(page.getByText(\"React\")).toBeVisible();\n  });\n});\n"}, {"name": "README.md", "type": "text", "content": "# Playwright E2E Test Generation Results\n\nThis directory contains the generated Playwright test files based on the test plans in `specs/` folder.\n\n## Generated Test Files\n\n### 1. todo-crud.spec.ts\n**Source:** specs/todo-crud.md\n**Test Scenarios:**\n- \u2713 \ud560 \uc77c \ucd94\uac00 (Adding Todos)\n  - \uc720\ud6a8\ud55c \ud560 \uc77c \ucd94\uac00 (Valid todo addition)\n  - \ube48 \uc785\ub825 \uc720\ud6a8\uc131 \uac80\uc99d (Empty input validation)\n  - \ucd5c\ub300 \uae38\uc774 \ucd08\uacfc \uac80\uc99d (Max length validation)\n- \u2713 \ud560 \uc77c \uc870\ud68c \ubc0f \ud544\ud130 (Todo retrieval and filtering)\n  - \uc804\uccb4 \ubaa9\ub85d \uc870\ud68c (Full list view)\n  - \uac80\uc0c9\uc73c\ub85c \ud544\ud130\ub9c1 (Search filtering)\n  - \uac80\uc0c9 \uacb0\uacfc \uc5c6\uc74c (No search results)\n- \u2713 \ud560 \uc77c \uc218\uc815 (Todo editing)\n  - \ud560 \uc77c \ud14d\uc2a4\ud2b8 \uc218\uc815 (Edit text)\n  - \ud560 \uc77c \uc644\ub8cc \ud1a0\uae00 (Toggle completion status)\n- \u2713 \ud560 \uc77c \uc0ad\uc81c (Todo deletion)\n  - \ud560 \uc77c \uc0ad\uc81c (Delete todo)\n  - \uc0ad\uc81c \ucde8\u     // ---- XLSX rendering via SheetJS ----
    function renderXlsx(container, b64Data) {
      try {
        const raw = Uint8Array.from(atob(b64Data), c => c.charCodeAt(0));
        const wb = XLSX.read(raw, { type: "array" });

        for (let i = 0; i < wb.SheetNames.length; i++) {
          const sheetName = wb.SheetNames[i];
          const ws = wb.Sheets[sheetName];

          if (wb.SheetNames.length > 1) {
            const sheetLabel = document.createElement("div");
            sheetLabel.style.cssText =
              "font-weight:600; font-size:0.8rem; color:#b0aea5; margin-top:0.5rem; margin-bottom:0.25rem;";
            sheetLabel.textContent = "시트: " + sheetName;
            container.appendChild(sheetLabel);
          }

          const htmlStr = XLSX.utils.sheet_to_html(ws, { editable: false });
          const wrapper = document.createElement("div");
          wrapper.innerHTML = htmlStr;
          container.appendChild(wrapper);
        }
      } catch (err) {
        container.textContent = "스프레드시트 렌더링 오류: " + err.message;

      // Don't capture when typing in textarea
      if (e.target.tagName === "TEXTAREA") return;

      if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
        e.preventDefault();
        navigate(-1);
      } else if (e.key === "ArrowRight" || e.key === "ArrowDown") {
        e.preventDefault();
        navigate(1);
      }
    });

    // ---- Util ----
    function getDownloadUri(file) {
      if (file.data_uri) return file.data_uri;
      if (file.data_b64) return "data:application/octet-stream;base64," + file.data_b64;
      if (file.type === "text") return "data:text/plain;charset=utf-8," + encodeURIComponent(file.content);
      return "#";
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // ---- View switching ----
    function switchView(view) {
      document.querySelectorAll(".view-tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".view-panel").forEach(p => p.classList.remove("active"));
      document.querySelector(`[onclick="switchView('${view}')"]`).classList.add("active");
      document.getElementById("panel-" + view).classList.add("active");
    }

    // ---- Benchmark rendering ----
    function renderBenchmark() {
      const data = EMBEDDED_DATA.benchmark;
      if (!data) return;

      // Show the tabs
      document.getElementById("view-tabs").style.display = "flex";

      const container = document.getElementById("benchmark-content");
      const summary = data.run_summary || {};
      const metadata = data.metadata || {};
      const notes = data.notes || [];

      let html = "";

      // Header
      html += "<h2 style='font-family: Poppins, sans-serif; margin-bottom: 0.5rem;'>벤치마크 결과</h2>";
      html += "<p style='color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.25rem;'>";
      if (metadata.skill_name) html += "<strong>" + escapeHtml(metadata.skill_name) + "</strong> &mdash; ";
      if (metadata.timestamp) html += metadata.timestamp + " &mdash; ";
      if (metadata.evals_run) html += "평가: " + metadata.evals_run.join(", ") + " &mdash; ";
      html += "설정당 " + (metadata.runs_per_configuration || "?") + "회 실행";
      html += "</p>";

      // Summary table
      html += '<table class="benchmark-table">';

      function fmtStat(stat, pct) {
        if (!stat) return "—";
        const suffix = pct ? "%" : "";
        const m = pct ? (stat.mean * 100).toFixed(0) : stat.mean.toFixed(1);
        const s = pct ? (stat.stddev * 100).toFixed(0) : stat.stddev.toFixed(1);
        return m + suffix + " ± " + s + suffix;
      }

      function deltaClass(val) {
        if (!val) return "";
        const n = parseFloat(val);
        if (n > 0) return "benchmark-delta-positive";
        if (n < 0) return "benchmark-delta-negative";
        return "";
      }

      // Discover config names dynamically (everything except "delta")
      const configs = Object.keys(summary).filter(k => k !== "delta");
      const configA = configs[0] || "config_a";
      const configB = configs[1] || "config_b";
      const labelA = configA.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      const labelB = configB.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      const a = summary[configA] || {};
      const b = summary[configB] || {};
      const delta = summary.delta || {};

      html += "<thead><tr><th>지표</th><th>" + escapeHtml(labelA) + "</th><th>" + escapeHtml(labelB) + "</th><th>차이</th></tr></thead>";
      html += "<tbody>";

      html += "<tr><td><strong>통과율</strong></td>";
      html += "<td>" + fmtStat(a.pass_rate, true) + "</td>";
      html += "<td>" + fmtStat(b.pass_rate, true) + "</td>";
      html += '<td class="' + deltaClass(delta.pass_rate) + '">' + (delta.pass_rate || "—") + "</td></tr>";

      // Time (only show row if data exists)
      if (a.time_seconds || b.time_seconds) {
        html += "<tr><td><strong>소요 시간 (초)</strong></td>";
        html += "<td>" + fmtStat(a.time_seconds, false) + "</td>";
        html += "<td>" + fmtStat(b.time_seconds, false) + "</td>";
        html += '<td class="' + deltaClass(delta.time_seconds) + '">' + (delta.time_seconds ? delta.time_seconds + "s" : "—") + "</td></tr>";
      }

      // Tokens (only show row if data exists)
      if (a.tokens || b.tokens) {
        html += "<tr><td><strong>토큰</strong></td>";
        html += "<td>" + fmtStat(a.tokens, false) + "</td>";
        html += "<td>" + fmtStat(b.tokens, false) + "</td>";
        html += '<td class="' + deltaClass(delta.tokens) + '">' + (delta.tokens || "—") + "</td></tr>";
      }

      html += "</tbody></table>";

      // Per-eval breakdown (if runs data available)
      const runs = data.runs || [];
      if (runs.length > 0) {
        const evalIds = [...new Set(runs.map(r => r.eval_id))].sort((a, b) => a - b);

        html += "<h3 style='font-family: Poppins, sans-serif; margin-bottom: 0.75rem;'>평가별 상세 내역</h3>";

        const hasTime = runs.some(r => r.result && r.result.time_seconds != null);
        const hasErrors = runs.some(r => r.result && r.result.errors > 0);

        for (const evalId of evalIds) {
          const evalRuns = runs.filter(r => r.eval_id === evalId);
          const evalName = evalRuns[0] && evalRuns[0].eval_name ? evalRuns[0].eval_name : "평가 " + evalId;

          html += "<h4 style='font-family: Poppins, sans-serif; margin: 1rem 0 0.5rem; color: var(--text);'>" + escapeHtml(evalName) + "</h4>";
          html += '<table class="benchmark-table">';
          html += "<thead><tr><th>설정</th><th>실행</th><th>통과율</th>";
          if (hasTime) html += "<th>소요 시간 (초)</th>";
          if (hasErrors) html += "<th>실행 중 오류</th>";
          html += "</tr></thead>";
          html += "<tbody>";

          // Group by config and render with average rows
          const configGroups = [...new Set(evalRuns.map(r => r.configuration))];
          for (let ci = 0; ci < configGroups.length; ci++) {
            const config = configGroups[ci];
            const configRuns = evalRuns.filter(r => r.configuration === config);
            if (configRuns.length === 0) continue;

            const rowClass = ci === 0 ? "benchmark-row-with" : "benchmark-row-without";
            const configLabel = config.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());

            for (const run of configRuns) {
              const r = run.result || {};
              const prClass = r.pass_rate >= 0.8 ? "benchmark-delta-positive" : r.pass_rate < 0.5 ? "benchmark-delta-negative" : "";
              html += '<tr class="' + rowClass + '">';
              html += "<td>" + configLabel + "</td>";
              html += "<td>" + run.run_number + "</td>";
              html += '<td class="' + prClass + '">' + ((r.pass_rate || 0) * 100).toFixed(0) + "% (" + (r.passed || 0) + "/" + (r.total || 0) + ")</td>";
              if (hasTime) html += "<td>" + (r.time_seconds != null ? r.time_seconds.toFixed(1) : "—") + "</td>";
              if (hasErrors) html += "<td>" + (r.errors || 0) + "</td>";
              html += "</tr>";
            }

            // Average row
            const rates = configRuns.map(r => (r.result || {}).pass_rate || 0);
            const avgRate = rates.reduce((a, b) => a + b, 0) / rates.length;
            const avgPrClass = avgRate >= 0.8 ? "benchmark-delta-positive" : avgRate < 0.5 ? "benchmark-delta-negative" : "";
            html += '<tr class="benchmark-row-avg ' + rowClass + '">';
            html += "<td>" + configLabel + "</td>";
            html += "<td>평균</td>";
            html += '<td class="' + avgPrClass + '">' + (avgRate * 100).toFixed(0) + "%</td>";
            if (hasTime) {
              const times = configRuns.map(r => (r.result || {}).time_seconds).filter(t => t != null);
              html += "<td>" + (times.length ? (times.reduce((a, b) => a + b, 0) / times.length).toFixed(1) : "—") + "</td>";
            }
            if (hasErrors) html += "<td></td>";
            html += "</tr>";
          }
          html += "</tbody></table>";

          // Per-assertion detail for this eval
          const runsWithExpectations = {};
          for (const config of configGroups) {
            runsWithExpectations[config] = evalRuns.filter(r => r.configuration === config && r.expectations && r.expectations.length > 0);
          }
          const hasAnyExpectations = Object.values(runsWithExpectations).some(runs => runs.length > 0);
          if (hasAnyExpectations) {
            // Collect all unique assertion texts across all configs
            const allAssertions = [];
            const seen = new Set();
            for (const config of configGroups) {
              for (const run of runsWithExpectations[config]) {
                for (const exp of (run.expectations || [])) {
                  if (!seen.has(exp.text)) {
                    seen.add(exp.text);
                    allAssertions.push(exp.text);
                  }
                }
              }
            }

            html += '<table class="benchmark-table" style="margin-top: 0.5rem;">';
            html += "<thead><tr><th>검증 항목</th>";
            for (const config of configGroups) {
              const label = config.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
              html += "<th>" + escapeHtml(label) + "</th>";
            }
            html += "</tr></thead><tbody>";

            for (const assertionText of allAssertions) {
              html += "<tr><td>" + escapeHtml(assertionText) + "</td>";

              for (const config of configGroups) {
                html += "<td>";
                for (const run of runsWithExpectations[config]) {
                  const exp = (run.expectations || []).find(e => e.text === assertionText);
                  if (exp) {
                    const cls = exp.passed ? "benchmark-delta-positive" : "benchmark-delta-negative";
                    const icon = exp.passed ? "\u2713" : "\u2717";
                    html += '<span class="' + cls + '" title="Run ' + run.run_number + ': ' + escapeHtml(exp.evidence || "") + '">' + icon + "</span> ";
                  } else {
                    html += "— ";
                  }
                }
                html += "</td>";
              }
              html += "</tr>";
            }
            html += "</tbody></table>";
          }
        }
      }

      // Notes
      if (notes.length > 0) {
        html += '<div class="benchmark-notes">';
        html += "<h3>분석 노트</h3>";
        html += "<ul>";
        for (const note of notes) {
          html += "<li>" + escapeHtml(note) + "</li>";
        }
        html += "</ul></div>";
      }

      container.innerHTML = html;
    }

    // ---- Start ----
    init();
    renderBenchmark();
  </script>
</body>
</html>
