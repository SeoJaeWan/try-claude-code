<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>평가 리뷰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #141413;
      --text-muted: #b0aea5;
      --accent: #d97757;
      --accent-hover: #c4613f;
      --green: #788c5d;
      --green-bg: #eef2e8;
      --red: #c44;
      --red-bg: #fceaea;
      --header-bg: #141413;
      --header-text: #faf9f5;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .header .instructions {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    .header .progress {
      font-size: 0.875rem;
      opacity: 0.8;
      text-align: right;
    }

    /* ---- Main content ---- */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ---- Sections ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .section-header {
      font-family: 'Poppins', sans-serif;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .section-body {
      padding: 1rem;
    }

    /* ---- Config badge ---- */
    .config-badge {
      display: inline-block;
      padding: 0.2rem 0.625rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-left: 0.75rem;
      vertical-align: middle;
    }
    .config-badge.config-primary {
      background: rgba(33, 150, 243, 0.12);
      color: #1976d2;
    }
    .config-badge.config-baseline {
      background: rgba(255, 193, 7, 0.15);
      color: #f57f17;
    }

    /* ---- Prompt ---- */
    .prompt-text {
      white-space: pre-wrap;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    /* ---- Outputs ---- */
    .output-file {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .output-file + .output-file {
      margin-top: 1rem;
    }
    .output-file-header {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .output-file-header .dl-btn {
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      opacity: 0.8;
    }
    .output-file-header .dl-btn:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .output-file-content {
      padding: 0.75rem;
      overflow-x: auto;
    }
    .output-file-content pre {
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .output-file-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .output-file-content iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    .output-file-content table {
      border-collapse: collapse;
      font-size: 0.8125rem;
      width: 100%;
    }
    .output-file-content table td,
    .output-file-content table th {
      border: 1px solid var(--border);
      padding: 0.375rem 0.5rem;
      text-align: left;
    }
    .output-file-content table th {
      background: var(--bg);
      font-weight: 600;
    }
    .output-file-content .download-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .output-file-content .download-link:hover {
      background: var(--border);
    }
    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      padding: 2rem;
      text-align: center;
    }

    /* ---- Feedback ---- */
    .prev-feedback {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.625rem 0.75rem;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .prev-feedback-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
      color: var(--text-muted);
    }
    .feedback-textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9375rem;
      line-height: 1.5;
      resize: vertical;
      color: var(--text);
    }
    .feedback-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .feedback-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      min-height: 1.1em;
    }

    /* ---- Grades (collapsible) ---- */
    .grades-toggle {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .grades-toggle:hover {
      color: var(--accent);
    }
    .grades-toggle .arrow {
      margin-right: 0.5rem;
      transition: transform 0.15s;
      font-size: 0.75rem;
    }
    .grades-toggle .arrow.open {
      transform: rotate(90deg);
    }
    .grades-content {
      display: none;
      margin-top: 0.75rem;
    }
    .grades-content.open {
      display: block;
    }
    .grades-summary {
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .grade-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .grade-pass { background: var(--green-bg); color: var(--green); }
    .grade-fail { background: var(--red-bg); color: var(--red); }
    .assertion-list {
      list-style: none;
    }
    .assertion-item {
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .assertion-item:last-child { border-bottom: none; }
    .assertion-status {
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .assertion-status.pass { color: var(--green); }
    .assertion-status.fail { color: var(--red); }
    .assertion-evidence {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      padding-left: 1.5rem;
    }

    /* ---- View tabs ---- */
    .view-tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-tab {
      font-family: 'Poppins', sans-serif;
      padding: 0.625rem 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .view-panel { display: none; }
    .view-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* ---- Benchmark view ---- */
    .benchmark-view {
      padding: 1.5rem 2rem;
      overflow-y: auto;
      flex: 1;
    }
    .benchmark-table {
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .benchmark-table th, .benchmark-table td {
      padding: 0.625rem 0.75rem;
      text-align: left;
      border: 1px solid var(--border);
    }
    .benchmark-table th {
      font-family: 'Poppins', sans-serif;
      background: var(--header-bg);
      color: var(--header-text);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .benchmark-table tr:hover { background: var(--bg); }
    .benchmark-table tr.benchmark-row-with { background: rgba(33, 150, 243, 0.06); }
    .benchmark-table tr.benchmark-row-without { background: rgba(255, 193, 7, 0.06); }
    .benchmark-table tr.benchmark-row-with:hover { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-without:hover { background: rgba(255, 193, 7, 0.12); }
    .benchmark-table tr.benchmark-row-avg { font-weight: 600; border-top: 2px solid var(--border); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-with { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-without { background: rgba(255, 193, 7, 0.12); }
    .benchmark-delta-positive { color: var(--green); font-weight: 600; }
    .benchmark-delta-negative { color: var(--red); font-weight: 600; }
    .benchmark-notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .benchmark-notes h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }
    .benchmark-notes ul {
      list-style: disc;
      padding-left: 1.25rem;
    }
    .benchmark-notes li {
      font-size: 0.8125rem;
      line-height: 1.6;
      margin-bottom: 0.375rem;
    }
    .benchmark-empty {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      padding: 3rem;
    }

    /* ---- Navigation ---- */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .nav-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      transition: all 0.15s;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .done-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .done-btn:hover {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .done-btn.ready {
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .done-btn.ready:hover {
      background: var(--accent-hover);
    }
    /* ---- Done overlay ---- */
    .done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .done-overlay.visible {
      display: flex;
    }
    .done-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
    }
    .done-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .done-card p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .done-card .btn-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .done-card button {
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
    }
    .done-card button:hover {
      background: var(--bg);
    }
    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--header-bg);
      color: var(--header-text);
      padding: 0.625rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app" style="height:100vh; display:flex; flex-direction:column;">
    <div class="header">
      <div>
        <h1>평가 리뷰: <span id="skill-name"></span></h1>
        <div class="instructions">각 출력을 검토하고 아래에 피드백을 남겨주세요. 화살표 키 또는 버튼으로 이동할 수 있습니다. 완료되면 피드백을 복사하여 Claude Code에 붙여넣으세요.</div>
      </div>
      <div class="progress" id="progress"></div>
    </div>

    <!-- View tabs (only shown when benchmark data exists) -->
    <div class="view-tabs" id="view-tabs" style="display:none;">
      <button class="view-tab active" onclick="switchView('outputs')">출력 결과</button>
      <button class="view-tab" onclick="switchView('benchmark')">벤치마크</button>
    </div>

    <!-- Outputs panel (qualitative review) -->
    <div class="view-panel active" id="panel-outputs">
    <div class="main">
      <!-- Prompt -->
      <div class="section">
        <div class="section-header">프롬프트 <span class="config-badge" id="config-badge" style="display:none;"></span></div>
        <div class="section-body">
          <div class="prompt-text" id="prompt-text"></div>
        </div>
      </div>

      <!-- Outputs -->
      <div class="section">
        <div class="section-header">출력</div>
        <div class="section-body" id="outputs-body">
          <div class="empty-state">출력 파일을 찾을 수 없습니다</div>
        </div>
      </div>

      <!-- Previous Output (collapsible) -->
      <div class="section" id="prev-outputs-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="togglePrevOutputs()">
            <span class="arrow" id="prev-outputs-arrow">&#9654;</span>
            이전 출력
          </div>
        </div>
        <div class="grades-content" id="prev-outputs-content"></div>
      </div>

      <!-- Grades (collapsible) -->
      <div class="section" id="grades-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="toggleGrades()">
            <span class="arrow" id="grades-arrow">&#9654;</span>
            평가 등급
          </div>
        </div>
        <div class="grades-content" id="grades-content"></div>
      </div>

      <!-- Feedback -->
      <div class="section">
        <div class="section-header">피드백</div>
        <div class="section-body">
          <textarea
            class="feedback-textarea"
            id="feedback"
            placeholder="이 출력에 대해 어떻게 생각하시나요? 문제점, 제안사항, 또는 잘된 점이 있나요?"
          ></textarea>
          <div class="feedback-status" id="feedback-status"></div>
          <div class="prev-feedback" id="prev-feedback" style="display:none;">
            <div class="prev-feedback-label">이전 피드백</div>
            <div id="prev-feedback-text"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="nav" id="outputs-nav">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&#8592; 이전</button>
      <button class="done-btn" id="done-btn" onclick="showDoneDialog()">모든 리뷰 제출</button>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">다음 &#8594;</button>
    </div>
    </div><!-- end panel-outputs -->

    <!-- Benchmark panel (quantitative stats) -->
    <div class="view-panel" id="panel-benchmark">
      <div class="benchmark-view" id="benchmark-content">
        <div class="benchmark-empty">벤치마크 데이터가 없습니다. 벤치마크를 실행하면 여기에 정량적 결과가 표시됩니다.</div>
      </div>
    </div>
  </div>

  <!-- Done overlay -->
  <div class="done-overlay" id="done-overlay">
    <div class="done-card">
      <h2>리뷰 완료</h2>
      <p>피드백이 저장되었습니다. Claude Code 세션으로 돌아가서 리뷰가 끝났다고 알려주세요.</p>
      <div class="btn-row">
        <button onclick="closeDoneDialog()">확인</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ---- Embedded data (injected by generate_review.py) ----

r is present on first visit. The test sets `cookie-consent: \"true\"` via `addInitScript` in `beforeEach` to prevent the banner from blocking button clicks.\n\n## Test Scenarios\n\n| # | Type | Description |\n|---|---|---|\n| 1 | Happy flow | `/signup` 폼 제출 → `/dashboard` 리다이렉트 → greeting 표시 → `nav-logout` 클릭 → `/login` 리다이렉트 → `/dashboard` 재접근 차단 |\n| 2 | State persistence | 회원가입 후 대시보드에서 `reload()` → 여전히 `/dashboard`에 머물고 greeting이 표시된다 |\n| 3 | State teardown (persistence) | 로그아웃 후 `auth_user`, `auth_login_at`이 localStorage에서 실제로 삭제됨을 직접 검증. 단순 URL 리다이렉트만으로는 세션 파기를 보장할 수 없기 때문 |\n| 4 | Branch flow (unauthenticated) | 로그인 없이 `/dashboard` 직접 접근 → `/login`으로 리다이렉트 |\n| 5 | Branch flow (duplicate email) | 동일 이메일로 재가입 시도 → `signup-error` 표시, `/signup`에 머묾 |\n\n## Design Decisions\n\n- **Unique email per test**: `Date.now()` suffix prevents `auth_users` collision between tests run in the same browser context.\n- **State teardown verification**: Rather than only checking URL after logout, the test directly reads `localStorage` to confirm both `auth_user` and `auth_login_at` are null. This catches regressions where the session is not properly cleared (ghost login risk).\n- **nav-logout vs mobile-logout**: The test uses `nav-logout` (desktop nav button). Playwright's default headless viewport is 1280x720, so the desktop nav is visible and `nav-logout` is reachable without opening the hamburger menu.\n- **cookie-consent initScript**: Set before page load so the banner never renders, ensuring deterministic click targeting throughout the journey.\n\n## Test placement\n\n```\ntests/guard/auth/signup-dashboard-logout.spec.ts\n```\n"}], "grading": {"expectations": [{"text": "SKILL.md 및 e2e-conventions.md 참조 파일 읽기", "passed": true, "evidence": "Agent read SKILL.md, e2e-conventions.md, agent-browser-patterns.md before test generation"}, {"text": "agent-browser로 localhost:3000 탐색 수행 (Write/Edit 전에 실행)", "passed": true, "evidence": "Re-run agent used npx agent-browser open/snapshot omplete-${suffix}@example.com`,\n    password: \"password123\",\n  };\n}\n\n/**\n * 쿠키 동의 배너를 사전 처리한다.\n * addInitScript를 통해 모든 페이지 로드 전에 localStorage에 동의 플래그를 설정한다.\n */\nasync function skipCookieBanner(page: Page) {\n  await page.addInitScript(() => {\n    localStorage.setItem(\"cookie-consent\", \"true\");\n  });\n}\n\n/**\n * 회원가입 헬퍼: /signup → 폼 제출 → /dashboard → 로그아웃으로\n * 테스트 계정을 만들고 깨끗한 비인증 상태로 복귀한다.\n */\nasync function registerAndLogout(\n  page: Page,\n  user: ReturnType<typeof makeTestUser>\n) {\n  await page.goto(\"/signup\");\n  await page.getByTestId(\"signup-name\").fill(user.name);\n  await page.getByTestId(\"signup-email\").fill(user.email);\n  await page.getByTestId(\"signup-password\").fill(user.password);\n  await page.getByTestId(\"signup-confirm-password\").fill(user.password);\n  await page.getByTestId(\"signup-submit\").click();\n  await expect(page).toHaveURL(\"/dashboard\");\n  await page.getByTestId(\"nav-logout\").click();\n  await expect(page).toHaveURL(\"/login\");\n}\n\n/**\n * StatsCard의 숫자 값을 정수로 읽는다.\n * StatsCard 구조: <div data-testid=\"stat-*\"><p>숫자</p><p>레이블</p></div>\n */\nasync function readStat(page: Page, testId: string): Promise<number> {\n  const text = await page.getByTestId(testId).locator(\"p\").first().textContent();\n  return parseInt(text ?? \"0\", 10);\n}\n\ntest.describe(\n  \"[Guard] 로그인 → 대시보드 할 일 추가 → /todos 완료 처리 → 대시보드 통계 반영 여정\",\n  () => {\n    // -------------------------------------------------------------------\n    // 1. 해피 플로우: 전체 여정이 정상 동작한다\n    //    로그인 → 대시보드에서 할 일 추가 → /todos에서 완료 처리 → 대시보드 통계 갱신 확인\n    // -------------------------------------------------------------------\n    test(\n      \"[JOURNEY-TODO-001] 로그인 후 대시보드에서 할 일 추가, /todos에서 완료 처리 시 대시보드 통계가 반영된다\",\n      async ({ page }) => {\n        const user = makeTestUser();\n        await skipCookieBanner(page);\n        await registerAndLogout(page, user);\n\n        // Step 1: 로그인 → /dashboard 진입\n        await page.goto(\"/login\");\n ct(checkbox).not.toBeChecked();\n        await checkbox.click();\n        await expect(checkbox).toBeChecked();\n\n        // Step 5: 대시보드로 돌아가 통계 반영 확인\n        await page.getByTestId(\"nav-dashboard\").click();\n        await expect(page).toHaveURL(\"/dashboard\");\n\n        // Assert: 완료 처리가 대시보드 통계에 반영됐다 (전체 1, 완료 1, 진행중 0)\n        await expect(\n          page.getByTestId(\"stat-total\").locator(\"p\").first()\n        ).toHaveText(\"1\");\n        await expect(\n          page.getByTestId(\"stat-completed\").locator(\"p\").first()\n        ).toHaveText(\"1\");\n        await expect(\n          page.getByTestId(\"stat-pending\").locator(\"p\").first()\n        ).toHaveText(\"0\");\n      }\n    );\n\n    // -------------------------------------------------------------------\n    // 2. 상태 지속성: /todos → /dashboard 이동 및 새로고침 후에도 통계가 유지된다\n    // -------------------------------------------------------------------\n    test(\n      \"[JOURNEY-TODO-001] 완료 처리 후 대시보드 새로고침해도 통계가 유지된다\",\n      async ({ page }) => {\n        const user = makeTestUser();\n        await skipCookieBanner(page);\n        await registerAndLogout(page, user);\n\n        // Arrange: 로그인 → 할 일 추가 → /todos에서 완료 처리\n        await page.goto(\"/login\");\n        await page.getByTestId(\"login-email\").fill(user.email);\n        await page.getByTestId(\"login-password\").fill(user.password);\n        await page.getByTestId(\"login-submit\").click();\n        await expect(page).toHaveURL(\"/dashboard\");\n\n        await page.getByTestId(\"todo-input\").fill(\"새로고침 지속성 검증용 할 일\");\n        await page.getByTestId(\"todo-add\").click();\n\n        await page.goto(\"/todos\");\n        await expect(page).toHaveURL(\"/todos\");\n\n        const todoItems = page.locator(\"[data-testid^='todo-item-']\");\n        await expect(todoItems).toHaveCount(1);\n        const itemTestId = await todoItems.first().getAttribute(\"data-testid\");\n        const todoId = itemTestId?.replace(\"todo-item-\", \"\") ?? \  //    로그인 → 대시보드에서 할 일 추가 → /todos에서 완료 처리 → 대시보드 통계 갱신 확인\n    // -------------------------------------------------------------------\n    test(\n      \"[JOURNEY-TODO-002] 로그인 후 대시보드에서 할 일을 추가하고, /todos에서 완료 처리하면 대시보드 통계가 갱신된다\",\n      async ({ page }) => {\n        const user = makeTestUser();\n        await skipCookieBanner(page);\n\n        // Arrange: 계정 생성 후 로그아웃 (깨끗한 상태)\n        await registerAccount(page, user);\n\n        // Step 1: 로그인 → /dashboard 진입\n        await loginUser(page, user);\n        await expect(page.getByTestId(\"greeting\")).toContainText(`안녕하세요, ${user.name}님`);\n\n        // Step 2: 초기 통계 확인 - 모두 0이어야 한다\n        const initialTotal = await readStat(page, \"stat-total\");\n        const initialCompleted = await readStat(page, \"stat-completed\");\n        const initialPending = await readStat(page, \"stat-pending\");\n        expect(initialTotal).toBe(0);\n        expect(initialCompleted).toBe(0);\n        expect(initialPending).toBe(0);\n\n        // Step 3: 대시보드 빠른 추가 폼으로 할 일 추가\n        const todoText = \"E2E 전체 플로우 회귀 테스트\";\n        await page.getByTestId(\"todo-input\").fill(todoText);\n        await page.getByTestId(\"todo-add\").click();\n\n        // Assert: 할 일 추가 직후 대시보드 통계가 즉시 반영된다 (전체+1, 진행중+1, 완료 변화 없음)\n        await expect(page.getByTestId(\"stat-total\").locator(\"p\").first()).toHaveText(\"1\");\n        await expect(page.getByTestId(\"stat-completed\").locator(\"p\").first()).toHaveText(\"0\");\n        await expect(page.getByTestId(\"stat-pending\").locator(\"p\").first()).toHaveText(\"1\");\n\n        // Step 4: /todos로 이동 (대시보드 링크 클릭)\n        await page.getByTestId(\"go-to-todos\").click();\n        await expect(page).toHaveURL(\"/todos\");\n\n        // Assert: /todos에서도 방금 추가한 할 일이 표시된다\n        await expect(page.getByText(todoText)).toBeVisible();\n\n        // Step 5: /todos에서 할 일 완료 처리\n        // 동적 ID를 가진 todo-item의 체크박스를 data-testid 패턴으로 찾는다\n        const todoItems = page.locator(\"[data-testid^='todo-item-']\");\n        await expect(todoItems).toHaveCount(1);\n        const itemTestId = await todoItems.first().getAttribute(\"data-testid\");\n        const todoId = itemTestId?.replace(\"todo-item-\", \"\") ?? \"\";\n        const checkbox = page.getByTestId(`todo-checkbox-${todoId}`);\n        await expect(checkbox).not.toBeChecked();\n        await checkbox.click();\n        await expect(checkbox).toBeChecked();\n\n        // Step 6: /dashboard로 돌아가 통계 반영 확인\n        await page.getByTestId(\"nav-dashboard\").click();\n        await expect(page).toHaveURL(\"/dashboard\");\n\n        // Assert: 완료 처리가 대시보드 통계에 반영됐다 (전체 1, 완료 1, 진행중 0)\n        await expect(page.getByTestId(\"stat-total\").locator(\"p\").first()).toHaveText(\"1\");\n        await expect(page.getByTestId(\"stat-completed\").locator(\"p\").first()).toHaveText(\"1\");\n        await expect(page.getByTestId(\"stat-pending\").locator(\"p\").first()).toHaveText(\"0\");\n      }\n    );\n\n    // -------------------------------------------------------------------\n    // 2. 상태 지속성: /todos → /dashboard 경로 전환 및 새로고침 후에도 통계가 유지된다\n    // -------------------------------------------------------------------\n    test(\n      \"[JOURNEY-TODO-002] 완료 처리 후 대시보드를 새로고침해도 통계 수치가 그대로 유지된다\",\n      async ({ page }) => {\n        const user = makeTestUser();\n        await skipCookieBanner(page);\n\n        // Arrange: 계정 생성, 로그인, 할 일 추가, /todos에서 완료 처리\n        await registerAccount(page, user);\n        await loginUser(page, user);\n\n        await page.getByTestId(\"todo-input\").fill(\"새로고침 지속성 검증용 할 일\");\n        await page.getByTestId(\"todo-add\").click();\n\n        await page.goto(\"/todos\");\n        await expect(page).toHaveURL(\"/todos\");\n\n        const todoItems = page.locator(\"[data-testid^='todo-item-']\");\n        await expect(todoItems).toHaveCount(1);\n        const itemTestId = await todoItems.first().getAttribute(\"data-testid\");\n        const todoId = itemTestId?.replace(\"todo-item-\", \"\") ?? \"\";\n        await page.getByTestId(`todo-checkbox-${todoId}`).click();\n        await expect(page.getByTestId(`todo-checkbox-${todoId}`)).toBeChecked();\n\n        // Act: 대시보드로 이동 후 새로고침\n        await page.goto(\"/dashboard\");\n        await expect(page).toHaveURL(\"/dashboard\");\n        await page.reload();\n\n        // Assert: 새로고침 후에도 대시보드 URL이 유지되고 통계가 올바르게 표시된다\n        await expect(page).toHaveURL(\"/dashboard\");\n        await expect(page.getByTestId(\"stat-total\").locator(\"p\").first()).toHaveText(\"1\");\n        await expect(page.getByTestId(\"stat-completed\").locator(\"p\").first()).toHaveText(\"1\");\n        await expect(page.getByTestId(\"stat-pending\").locator(\"p\").first()).toHaveText(\"0\");\n      }\n    );\n\n    // -------------------------------------------------------------------\n    // 3. 상태 지속성: /dashboard → /todos 경로 전환 후에도 인증 상태가 유지된다\n    // -------------------------------------------------------------------\n    test(\n      \"[JOURNEY-TODO-002] 로그인 상태는 /dashboard에서 /todos로 이동한 후에도 유지된다\",\n      async ({ page }) => {\n        const user = makeTestUser();\n        await skipCookieBanner(page);\n\n        // Arrange: 계정 생성 및 로그인\n        await registerAccount(page, user);\n        await loginUser(page, user);\n\n        // Assert: 대시보드에서 greeting으로 인증 상태 확인\n        await expect(page.getByTestId(\"greeting\")).toContainText(user.name);\n        await expect(page.getByTestId(\"nav-user-email\")).toContainText(user.email);\n\n        // Act: /todos로 이동\n        await page.getByTestId(\"nav-todos\").click();\n        await expect(page).toHaveURL(\"/todos\");\n\n        // Assert: /todos에서도 nav에 사용자 이메일이 표시된다 (인증 상태 유지)\n        await expect(page.getByTestId(\"nav-user-email\")).toContainText(user.email);\n\n        // Act: 새로고침\n        await page.reload();\n        await expect(page).toHaveURL(\"/todos\");\n\n        // Assert: 새로고침 후에도 인증 상태 유지\n        await expect(page.getByTestId(\"nav-user-email\")).toContainText(user.email);\n      }\n    );\n\n    // -------------------------------------------------------------------\n    // 4. 분기 플로우 (데이터 상태 불변): 할 일을 추가만 하고 완료하지 않으면 완료 통계가 변하지 않는다\n    //    해피 플로우의 역: \"완료 없이 추가만 하면 완료 카운터는 그대로다\"\n    // -------------------------------------------------------------------\n    test(\n      \"[JOURNEY-TODO-002] 할 일을 추가만 하고 완료 처리하지 않으면 대시보드 완료 통계가 변경되지 않는다\",\n      async ({ page }) => {\n        const user = makeTestUser();\n        await skipCookieBanner(page);\n\n        // Arrange: 계정 생성 및 로그인\n        await registerAccount(page, user);\n        await loginUser(page, user);\n\n        // 초기 완료 수 기록\n        const completedBefore = await readStat(page, \"stat-completed\");\n        expect(completedBefore).toBe(0);\n\n        // Act: 할 일 추가\n        await page.getByTestId(\"todo-input\").fill(\"완료하지 않을 할 일\");\n        await page.getByTestId(\"todo-add\").click();\n\n        // Act: /todos로 이동하지만 체크박스는 클릭하지 않는다\n        await page.getByTestId(\"go-to-todos\").click();\n        await expect(page).toHaveURL(\"/todos\");\n        await expect(page.getByText(\"완료하지 않을 할 일\")).toBeVisible();\n        // 의도적으로 완료 처리 없이 대시보드로 복귀\n\n        // Act: 대시보드 복귀\n        await page.getByTestId(\"nav-dashboard\").click();\n        await expect(page).toHaveURL(\"/dashboard\");\n\n        // Assert: 완료 통계는 변하지 않아야 한다\n        await expect(page.getByTestId(\"stat-completed\").locator(\"p\").first()).toHaveText(\n          String(completedBefore)\n        );\n\n        // Assert: 전체와 진행중은 증가해야 한다\n        await expect(page.getByTestId(\"stat-total\").locator(\"p\").first()).toHaveText(\"1\");\n        await expect(page.getByTestId(\"stat-pending\").locator(\"p\").first()).toHaveText(\"1\");\n      }\n    );\n\n    // -------------------------------------------------------------------\n    // 5. 분기 플로우 (접근 제어): 비인증 상태에서 /dashboard와 /todos 접근 시 /login으로 리다이렉트\n    // -------------------------------------------------------------------\n    test(\n      \"[JOURNEY-TODO-002] 인증 없이 /dashboard와 /todos에 직접 접근하면 /login으로 리다이렉트된다\",\n      async ({ page }) => {\n        await skipCookieBanner(page);\n\n        // Act + Assert: /dashboard 직접 접근 → /login 리다이렉트\n        await page.goto(\"/dashboard\");\n        await expect(page).toHaveURL(\"/login\");\n\n        // Act + Assert: /todos 직접 접근 → /login 리다이렉트\n        await page.goto(\"/todos\");\n        await expect(page).toHaveURL(\"/login\");\n      }\n    );\n\n    // -------------------------------------------------------------------\n    // 6. 상태 지속성 (세션 종료): 전체 여정 후 로그아웃 시 클라이언트 인증 상태가 완전히 제거된다\n    //    리다이렉트만으로는 세션 파기를 보장할 수 없다 — localStorage를 직접 검증한다\n    // -------------------------------------------------------------------\n    test(\n      \"[JOURNEY-TODO-002] 전체 여정 완료 후 로그아웃 시 localStorage 인증 키가 완전히 삭제된다\",\n      async ({ page }) => {\n        const user = makeTestUser();\n        await skipCookieBanner(page);\n\n        // Arrange: 전체 플로우 수행 (로그인 → 할 일 추가 → 완료 → 대시보드 확인)\n        await registerAccount(page, user);\n        await loginUser(page, user);\n\n        await page.getByTestId(\"todo-input\").fill(\"세션 파기 검증용 할 일\");\n        await page.getByTestId(\"todo-add\").click();\n\n        await page.goto(\"/todos\");\n        const todoItems = page.locator(\"[data-testid^='todo-item-']\");\n        await expect(todoItems).toHaveCount(1);\n        const itemTestId = await todoItems.first().getAttribute(\"data-testid\");\n        const todoId = itemTestId?.replace(\"todo-item-\", \"\") ?? \"\";\n        await page.getByTestId(`todo-checkbox-${todoId}`).click();\n\n        await page.goto(\"/dashboard\");\n        await expect(page).toHaveURL(\"/dashboard\");\n\n        // 로그인 중 인증 항목이 localStorage에 존재함을 확인\n        const authUserBefore = await page.evaluate(() => localStorage.getItem(\"auth_user\"));\n        expect(authUserBefore).not.toBeNull();\n        const loginAtBefore = await page.evaluate(() => localStorage.getItem(\"auth_login_at\"));\n        expect(loginAtBefore).not.toBeNull();\n\n        // Act: 로그아웃\n        await page.getByTestId(\"nav-logout\").click();\n        await expect(page).toHaveURL(\"/login\");\n\n        // Assert: 단순 리다이렉트만으로는 세션 파기를 보장할 수 없다.\n        // auth_user와 auth_login_at이 localStorage에서 실제로 삭제됐는지 검증한다.\n        const authUserAfter = await page.evaluate(() => localStorage.getItem(\"auth_user\"));\n        expect(authUserAfter).toBeNull();\n\n        const loginAtAfter = await page.evaluate(() => localStorage.getItem(\"auth_login_at\"));\n        expect(loginAtAfter).toBeNull();\n\n        // Assert: 쿠키에도 인증 관련 항목이 없음을 확인\n        const cookies = await page.context().cookies();\n        const sessionCookies = cookies.filter((c) => c.name.match(/token|session|auth/i));\n        expect(sessionCookies).toHaveLength(0);\n\n        // Assert: 로그아웃 후 /dashboard 재접근 시 /login으로 리다이렉트\n        await page.goto(\"/dashboard\");\n        await expect(page).toHaveURL(\"/login\");\n      }\n    );\n  }\n);\n"}, {"name": "summary.md", "type": "text", "content": "# Guard E2E Test Generation Summary\n\n## Task\n\n로그인 → 대시보드에서 할 일 추가 → /todos에서 완료 처리 → 대시보드 통계 반영 확인까지 전체 플로우 회귀 테스트 생성\n\n## Generated File\n\n`login-todo-complete-dashboard-stats.spec.ts`\n\nPlaced at:\n- Output: `skills/guard-e2e-test-workspace/iteration-3/eval-2-todo-flow/with_skill/outputs/login-todo-complete-dashboard-stats.spec.ts`\n- Project: `features/next-app/tests/guard/todo-flow/login-todo-complete-dashboard-stats.spec.ts`\n\n## Journey\n\n**JOURNEY-TODO-002**\n\n`/login → /dashboard (할 일 추가) → /todos (완료 처리) → /dashboard (통계 확인)`\n\n## Test Result\n\n6/6 passed in 11.7s\n\n```\n6 passed (11.7s)\n```\n\n## Test Scenarios\n\n| # | Type | Test Name |\n|---|---|---|\n| 1 | Happy flow | 로그인 후 대시보드에서 할 일을 추가하고, /todos에서 완료 처리하면 대시보드 통계가 갱신된다 |\n| 2 | State persistence | 완료 처리 후 대시보드를 새로고침해도 통계 수치가 그대로 유지된다 |\n| 3 | State persistence | 로그인 상태는 /dashboard에서 /todos로 이동한 후에도 유지된다 |\n| 4 | Branch flow (data-state invariant) | 할 일을 추가만 하고 완료 처리하지 않으면 대시보드 완료 통계가 변경되지 않는다 |\n| 5 | Branch flow (access control) | 인증 없이 /dashboard와 /todos에 직접 접근하면 /login으로 리다이렉트된다 |\n| 6 | State persistence (session teardown) | 전체 여정 완료 후 로그아웃 시 localStorage 인증 키가 완전히 삭제된다 |\n\n## Key Design Decisions\n\n### Cookie Banner Pre-handling\n`addInitScript`를 통해 모든 페이지 로드 전에 `localStorage.setItem(\"cookie-consent\", \"true\")`를 설정해 쿠키 배너가 버튼 클릭을 가로막지 않게 처리했다.\n\n### Test Isolation\n- 각 테스트마다 `Date.now() + random suffix`로 고유한 이메일을 생성해 병렬 실행 시 계정 충돌을 방지한다.\n- `registerAccount` 헬퍼는 회원가입 후 즉시 로그아웃해 깨끗한 비인증 상태를 만든다. 이를 통해 `/login` 경로가 실제로 동작함을 검증한다.\n\n### Dynamic Todo ID Handling\nTodoItem은 `crypto.randomUUID()`로 생성된 ID를 가진다. `data-testid^='todo-item-'` 패턴 매처로 항목을 찾고 ID를 추출해 `todo-checkbox-{id}` testid로 체크박스를 정확히 조작한다.\n\n### Stats Verification\n`StatsCard` 구조(`<div data-testid=\"stat-*\"><p>숫자</p><p>레이블</p></div>`)에 맞게 `.locator(\"p\").first()`로 숫자 값을 추출한다. `readStat` 헬퍼는 숫자를 정수로 파싱해 비교 연산에 사용할 수 있게 한다.\n\n### Session Teardown Verification\n로그아웃 후 단순 리다이렉트 확인만으로는 세션 파기를 보장할 수 없다. `page.evaluate`로 `auth_user`와 `auth_login_at` localStorage 키가 실제로 삭제됐는지 직접 검증한다.\n\n### Branch Flow (Data-State Invariant)\n해피 플로우(\"완료 처리 → 완료 통계 증가\")의 역을 검증한다: 할 일을 추가만 하고 완료하지 않으면 완료 카운터는 변하지 않아야 한다. 이 패턴은 상태 누수 회귀를 탐지한다.\n\n## Locators Used\n\n| Element | Locator |\n|---|---|\n| 로그인 이메일 입력 | `getByTestId(\"login-email\")` |\n| 로그인 비밀번호 입력 | `getByTestId(\"login-password\")` |\n| 로그인 제출 버튼 | `getByTestId(\"login-submit\")` |\n| 인사 메시지 | `getByTestId(\"greeting\")` |\n| 전체 통계 카드 | `getByTestId(\"stat-total\")` |\n| 완료 통계 카드 | `getByTestId(\"stat-completed\")` |\n| 진행중 통계 카드 | `getByTestId(\"stat-pending\")` |\n| 할 일 입력 | `getByTestId(\"todo-input\")` |\n| 할 일 추가 버튼 | `getByTestId(\"todo-add\")` |\n| /todos 이동 링크 | `getByTestId(\"go-to-todos\")` |\n| Todo 항목 (동적) | `locator(\"[data-testid^='todo-item-']\")` |\n| Todo 체크박스 (동적) | `getByTestId(\"todo-checkbox-{id}\")` |\n| 대시보드 nav 링크 | `getByTestId(\"nav-dashboard\")` |\n| 할 일 nav 링크 | `getByTestId(\"nav-todo d(\"profile-save\").click();\n    await expect(page.getByTestId(\"profile-saved\")).toBeVisible();\n\n    // Act: 프로필 페이지 새로고침\n    await page.reload();\n    await expect(page).toHaveURL(\"/profile\");\n\n    // Assert: 새로고침 후 수정된 이름이 뷰 모드에서 유지된다\n    await expect(page.getByTestId(\"profile-view\")).toBeVisible();\n    await expect(page.getByTestId(\"profile-display-name\")).toHaveText(\"새로고침후이름\");\n\n    // Assert: localStorage의 auth_user에 수정된 이름이 저장되어 있다\n    const authUser = await page.evaluate(() => {\n      const raw = localStorage.getItem(\"auth_user\");\n      return raw ? JSON.parse(raw) : null;\n    });\n    expect(authUser).not.toBeNull();\n    expect(authUser.name).toBe(\"새로고침후이름\");\n\n    // Assert: 대시보드 새로고침 후에도 인사말이 수정된 이름을 반영한다\n    await page.goto(\"/dashboard\");\n    await page.reload();\n    await expect(page).toHaveURL(\"/dashboard\");\n    await expect(page.getByTestId(\"greeting\")).toContainText(\"안녕하세요, 새로고침후이름님\");\n  });\n\n  test(\"[JOURNEY-PROFILE-002] 프로필 수정 취소 시 이름·스킬이 변경되지 않고 대시보드 인사말도 그대로다 (데이터 불변 분기)\", async ({\n    page,\n  }) => {\n    // 데이터 불변 분기: 수정 후 저장하지 않고 취소 → 상태 변화 없음을 검증\n    // 해피 플로우의 역: \"저장\" 없이 \"취소\"하면 상태가 불변해야 한다\n    const email = `journey-profile-cancel-${Date.now()}@example.com`;\n    await signupAndGoToDashboard(page, \"취소전이름\", email);\n\n    // 대시보드 원래 인사말 확인\n    await expect(page.getByTestId(\"greeting\")).toContainText(\"안녕하세요, 취소전이름님\");\n\n    // Step 1: 프로필 수정 모드에서 이름·스킬 변경 후 취소\n    await page.goto(\"/profile\");\n    await page.getByTestId(\"profile-edit-btn\").click();\n    await page.getByTestId(\"profile-name\").fill(\"절대저장안됨\");\n\n    await page.getByTestId(\"profile-skills-toggle\").click();\n    await expect(page.getByTestId(\"multiselect-dropdown\")).toBeVisible();\n    await page.getByTestId(\"multiselect-option-Rust\").click();\n    await page.getByTestId(\"profile-name\").click(); // 드롭다운 닫기\n\n    // 저장하지 않고 취소\n    await page.getByTestId(\"profile-cancel\").click();\n\n    // Assert: 뷰 모드로 전환되고 원래 이름이 표시된다 (취소 → 변경 없음)\n    await expect(page.getByTestId(\"profile-view\")).toBeVisible();\n    await expect(page.getByTestId(\"profile-display-name\")).toHaveText(\"취소전이름\");\n\n    // Assert: 대시보드 인사말도 원래 이름 그대로 (취소는 상태를 바꾸지 않는다)\n    await page.goto(\"/dashboard\");\n    await expect(page.getByTestId(\"greeting\")).toContainText(\"안녕하세요, 취소전이름님\");\n  });\n\n  test(\"[JOURNEY-PROFILE-002] 비인증 상태에서 /profile 직접 접근 시 /login으로 리다이렉트된다 (분기 플로우)\", async ({\n    page,\n  }) => {\n    // Branch flow: 로그인하지 않은 상태에서 보호된 라우트 직접 접근\n    await page.goto(\"/profile\");\n    await expect(page).toHaveURL(\"/login\");\n  });\n\n  test(\"[JOURNEY-PROFILE-002] 이름 비워두고 저장 시 에러가 표시되고 데이터·인사말이 변경되지 않는다 (유효성 오류 분기)\", async ({\n    page,\n  }) => {\n    // Branch flow: 유효성 오류 시 상태 불변 검증\n    // 저장을 시도해도 유효하지 않으면 데이터가 변경되지 않는다\n    const email = `journey-profile-validation-${Date.now()}@example.com`;\n    await signupAndGoToDashboard(page, \"유효성검사이름\", email);\n\n    await page.goto(\"/profile\");\n    await page.getByTestId(\"profile-edit-btn\").click();\n\n    // Act: 이름을 비워두고 저장 시도\n    await page.getByTestId(\"profile-name\").fill(\"\");\n    await page.getByTestId(\"profile-save\").click();\n\n    // Assert: 에러 메시지가 표시되고 수정 모드가 유지된다\n    await expect(page.getByTestId(\"profile-form\")).toBeVisible();\n    await expect(page.getByText(\"이름을 입력해주세요\")).toBeVisible();\n\n    // Assert: 저장 성공 메시지가 나타나지 않는다\n    await expect(page.getByTestId(\"profile-saved\")).not.toBeVisible();\n\n    // Assert: 대시보드 인사말은 원래 이름이 유지된다\n    await page.goto(\"/dashboard\");\n    await expect(page.getByTestId(\"greeting\")).toContainText(\"안녕하세요, 유효성검사이름님\");\n  });\n});\n"}, {"name": "profile-edit-dashboard-flow.spec.ts", "type": "text", "content": "import { test, expect } from \"@playwright/test\";\n\n// 쿠키 배너가 버튼 클릭을 가로막지 않도록 사전에 동의 처리\ntest.beforeEach(async ({ page }) => {\n  await page.addInitScript(() => {\n    localStorage.setItem(\"cookie-consent\", \"true\");\n  });\n});\n\n// 공통 헬퍼: 회원가입 → 대시보드 진입\nasync function signupAndLogin(\n  page: import(\"@playwright/test\").Page,\n  name: string,\n  email: string\n) {\n  await page.goto(\"/signup\");\n  await page.getByTestId(\"signup-name\").fill(name);\n  await page.getByTestId(\"signup-email\").fill(email);\n  await page.getByTestId(\"signup-password\").fill(\"password123\");\n  await page.getByTestId(\"signup-confirm-password\").fill(\"password123\");\n  await page.getByTestId(\"signup-submit\").click();\n  await expect(page).toHaveURL(\"/dashboard\");\n}\n\ntest.describe(\"[Guard] 로그인 → 프로필 수정 (이름·스킬) → 저장 → 대시보드 인사말 반영 → 프로필 재진입 데이터 유지 여정\", () => {\n  test(\"[JOURNEY-PROFILE-001] 이름·스킬 수정 후 저장하면 대시보드 인사말에 새 이름이 반영된다\", async ({\n    page,\n  }) => {\n    // Arrange: 회원가입으로 로그인 상태 생성\n    const email = `guard-profile-happy-${Date.now()}@example.com`;\n    await signupAndLogin(page, \"원래이름\", email);\n\n    // 대시보드에서 원래 이름 인사말 확인\n    await expect(page.getByTestId(\"greeting\")).toContainText(\"안녕하세요, 원래이름님\");\n\n    // Step 1: 프로필 페이지 진입\n    await page.goto(\"/profile\");\n    await expect(page).toHaveURL(\"/profile\");\n    await expect(page.getByTestId(\"profile-view\")).toBeVisible();\n    await expect(page.getByTestId(\"profile-display-name\")).toHaveText(\"원래이름\");\n\n    // Step 2: 프로필 수정 모드 진입\n    await page.getByTestId(\"profile-edit-btn\").click();\n    await expect(page.getByTestId(\"profile-form\")).toBeVisible();\n\n    // Step 3: 이름 수정\n    await page.getByTestId(\"profile-name\").fill(\"수정된이름\");\n\n    // Step 4: 스킬 선택 — 드롭다운 열기\n    await page.getByTestId(\"profile-skills-toggle\").click();\n    await expect(page.getByTestId(\"multiselect-dropdown\")).toBeVisible();\n\n    // Step 5: JavaScript, TypeScript 스킬 선택\n    await page.getByTestId(\"multiselect-option-JavaScript\").click();\n    await page.getByTestId(\"multiselect-option-TypeScript\").click();\n\n    // Step 6: 드롭다운 닫기 (이름 입력 필드 클릭 → 외부 mousedown 이벤트 발생)\n    await page.getByTestId(\"profile-name\").click();\n    await expect(page.getByTestId(\"multiselect-dropdown\")).not.toBeVisible();\n\n    // 선택된 스킬 칩 확인\n    await expect(page.getByTestId(\"multiselect-chip-JavaScript\")).toBeVisible();\n    await expect(page.getByTestId(\"multiselect-chip-TypeScript\")).toBeVisible();\n\n    // Step 7: 저장\n    await page.getByTestId(\"profile-save\").click();\n\n    // Assert: 저장 성공 배너 표시\n    await expect(page.getByTestId(\"profile-saved\")).toBeVisible();\n    await expect(page.getByTestId(\"profile-saved\")).toContainText(\"프로필이 저장되었습니다\");\n\n    // Assert: view 모드로 전환되고 수정된 이름 표시\n    await expect(page.getByTestId(\"profile-view\")).toBeVisible();\n    await expect(page.getByTestId(\"profile-display-name\")).toHaveText(\"수정된이름\");\n\n    // Step 8: 대시보드로 이동하여 인사말이 새 이름으로 반영됐는지 확인\n    await page.goto(\"/dashboard\");\n    await expect(page).toHaveURL(\"/dashboard\");\n    await expect(page.getByTestId(\"greeting\")).toContainText(\"안녕하세요, 수정된이름님\");\n  });\n\n  test(\"[JOURNEY-PROFILE-001] 프로필 수정 저장 후 재진입 시 이름과 스킬이 유지된다\", async ({\n    page,\n  }) => {\n    // Arrange: 회원가입으로 로그인 상태 생성 후 프로필 수정\n    const email = `guard-profile-persist-${Date.now()}@example.com`;\n    await signupAndLogin(page, \"초기이름\", email);\n\n    await page.goto(\"/profile\");\n    await page.getByTestId(\"profile-edit-btn\").click();\n    await page.getByTestId(\"profile-name\").fill(\"영속이름\");\n\n    await page.getByTestId(\"profile-skills-toggle\").click();\n    await expect(page.getByTestId(\"multiselect-dropdown\")).toBeVisible();\n    await page.getByTestId(\"multiselect-option-React\").click();\n    await page.getByTestId(\"multiselect-option-Next.js\").click();\n    // 드롭다운 닫기\n    await page.getByTestId(\"profile-name\").click();\n    await expect(page.getByTestId(\"multiselect-dropdown\")).not.toBeVisible();\n\n    await page.getByTestId(\"profile-save\").click();\n    await expect(page.getByTestId(\"profile-saved\")).toBeVisible();\n\n    // Act: 대시보드를 거쳐 프로필 재진입\n    await page.goto(\"/dashboard\"); 만들어줘. http://localhost:3000 에서 확인 가능해.", "eval_id": 3, "outputs": [{"name": "login-profile-edit-dashboard.spec.ts", "type": "text", "content": "import { test, expect } from \"@playwright/test\";\n\n// 쿠키 배너가 버튼 클릭을 가로막지 않도록 사전에 동의 처리\ntest.beforeEach(async ({ page }) => {\n  await page.addInitScript(() => {\n    localStorage.setItem(\"cookie-consent\", \"true\");\n  });\n});\n\n// 공통 헬퍼: 회원가입 → 대시보드 진입\nasync function signupAndGoToDashboard(\n  page: import(\"@playwright/test\").Page,\n  name: string,\n  email: string\n) {\n  await page.goto(\"/signup\");\n  await page.getByTestId(\"signup-name\").fill(name);\n  await page.getByTestId(\"signup-email\").fill(email);\n  await page.getByTestId(\"signup-password\").fill(\"password123\");\n  await page.getByTestId(\"signup-confirm-password\").fill(\"password123\");\n  await page.getByTestId(\"signup-submit\").click();\n  await expect(page).toHaveURL(\"/dashboard\");\n}\n\ntest.describe(\"[Guard] 로그인 → 프로필 수정 (이름·스킬) → 저장 → 대시보드 인사말 반영 → 프로필 재진입 데이터 유지 여정\", () => {\n  test(\"[JOURNEY-PROFILE-001] 이름·스킬 수정 저장 후 대시보드 인사말에 새 이름이 즉시 반영된다\", async ({\n    page,\n  }) => {\n    // Arrange: 회원가입으로 로그인 상태 생성 후 대시보드 확인\n    const email = `guard-profile-happy-${Date.now()}@example.com`;\n    await signupAndGoToDashboard(page, \"원래이름\", email);\n\n    // 대시보드 인사말에 원래 이름이 표시됨을 확인\n    await expect(page.getByTestId(\"greeting\")).toContainText(\"안녕하세요, 원래이름님\");\n\n    // Step 1: 프로필 페이지 진입\n    await page.goto(\"/profile\");\n    await expect(page).toHaveURL(\"/profile\");\n    await expect(page.getByTestId(\"profile-view\")).toBeVisible();\n    await expect(page.getByTestId(\"profile-display-name\")).toHaveText(\"원래이름\");\n\n    // Step 2: 프로필 수정 모드 진입\n    await page.getByTestId(\"profile-edit-btn\").click();\n    await expect(page.getByTestId(\"profile-form\")).toBeVisible();\n\n    // Step 3: 이름 수정\n    await page.getByTestId(\"profile-name\").fill(\"수정된이름\");\n\n    // Step 4: 스킬 선택 — MultiSelect 드롭다운 열기\n    await page.getByTestId(\"profile-skills-toggle\").click();\n    await expect(page.getByTestId(\"multiselect-dropdown\")).toBeVisible();\n\n    // Step 5: JavaScript, TypeScript 선택\n    await page.getByTestId(\"multiselect-option-JavaScript\").click();\n    await page.getByTestId(\"multiselect-option-TypeScript\").click();\n\n    // Step 6: 드롭다운 외부(이름 필드) 클릭으로 닫기\n    await page.getByTestId(\"profile-name\").click();\n    await expect(page.getByTestId(\"multiselect-dropdown\")).not.toBeVisible();\n\n    // 선택된 스킬 칩 확인\n    await expect(page.getByTestId(\"multiselect-chip-JavaScript\")).toBeVisible();\n    await expect(page.getByTestId(\"multiselect-chip-TypeScript\")).toBeVisible();\n\n    // Step 7: 저장\n    await page.getByTestId(\"profile-save\").click();\n\n    // Assert: 저장 성공 메시지 표시\n    await expect(page.getByTestId(\"profile-saved\")).toBeVisible();\n    await expect(page.getByTestId(\"profile-saved\")).toContainText(\"프로필이 저장되었습니다\");\n\n    // Assert: 뷰 모드로 전환되고 수정된 이름 표시\n    await expect(page.getByTestId(\"profile-view\")).toBeVisible();\n    await expect(page.getByTestId(\"profile-display-name\")).toHaveText(\"수정된이름\");\n\n    // Step 8: 대시보드로 이동 → 인사말에 새 이름 반영 확인\n    await page.goto(\"/dashboard\");\n    await expect(page).toHaveURL(\"/dashboard\");\n    await expect(page.getByTestId(\"greeting\")).toContainText(\"안녕하세요, 수정된이름님\");\n  });\n\n  test(\"[JOURNEY-PROFILE-001] 프로필 수정 저장 후 대시보드 경유 재진입 시 이름·스킬이 유지된다 (상태 유지 검증)\", async ({\n    page,\n  }) => {\n    // Arrange: 회원가입으로 로그인 상태 생성\n    const email = `guard-profile-persist-${Date.now()}@example.com`;\n    await signupAndGoToDashboard(page, \"초기이름\", email);\n\n    // Step 1: 프로필 수정 (이름 + 스킬)\n    await page.goto(\"/profile\");\n    await page.getByTestId(\"profile-edit-btn\").click();\n    await page.getByTestId(\"profile-name\").fill(\"영속이름\");\n\n    await page.getByTestId(\"profile-skills-toggle\").click();\n    await expect(page.getByTestId(\"multiselect-dropdown\")).toBeVisible();\n    await page.getByTestId(\"multiselect-option-React\").click();\n    await page.getByTestId(\"multiselect-option-Next.js\").click();\n    await page.getByTestId(\"profile-name\").click(); // 드롭다운 닫기\n\n    await page.getByTestId(\"profile-save\").click();\n    await expect(page.getByTestId(\"profile-saved\")).toBeVisible();\n\n    // Step 2: 대시보드 경유 후 프로필 재진입\n    await page.goto(\"/dashboard\");\n    await expect(page).toHaveURL(\"/dashboard\");\n    // 대시보드에서 수정된 이름이 인사말에 반영됐는지 확인\n    await expect(page.getByTestId(\"greeting\")).toContainText(\"안녕하세요, 영속이름님\");\n\n    await page.goto(\"/profile\");\n    await expect(page).toHaveURL(\"/profile\");\n\n    // Assert: 뷰 모드에서 수정된 이름이 유지된다\n    await expect(page.getByTestId(\"profile-view\")).toBeVisible();\n    await expect(page.getByTestId(\"profile-display-name\")).toHaveText(\"영속이름\");\n\n    // Assert: 수정 모드 재진입 시 선택한 스킬 칩이 유지된다\n    await page.getByTestId(\"profile-edit-btn\").click();\n    await expect(page.getByTestId(\"profile-form\")).toBeVisible();\n    await expect(page.getByTestId(\"multiselect-chip-React\")).toBeVisible();\n    await expect(page.getByTestId(\"multiselect-chip-Next.js\")).toBeVisible();\n  });\n\n  test(\"[JOURNEY-PROFILE-001] 페이지 새로고침 후 수정된 프로필 데이터가 localStorage에서 복원된다\", async ({\n    page,\n  }) => {\n    // Arrange: 회원가입 후 프로필 수정 및 저장\n    const email = `guard-profile-reload-${Date.now()}@example.com`;\n    await signupAndGoToDashboard(page, \"새로고침전이름\", email);\n\n    await page.goto(\"/profile\");\n    await page.getByTestId(\"profile-edit-btn\").click();\n    await page.getByTestId(\"profile-name\").fill(\"새로고침후이름\");\n\n    await page.getByTestId(\"profile-skills-toggle\").click();\n    await expect(page.getByTestId(\"multiselect-dropdown\")).toBeVisible();\n    await page.getByTestId(\"multiselect-option-Go\").click();\n    await page.getByTestId(\"profile-name\").click();\n\n    await page.getByTestId(\"profile-save\").click();\n    await expect(page.getByTestId(\"profile-saved\")).toBeVisible();\n\n    // Act: 프로필 페이지 새로고침\n    await page.reload();\n    await expect(page).toHaveURL(\"/profile\");\n\n    // Assert: 새로고침 후 수정된 이름이 뷰 모드에서 유지된다\n    await expect(page.getByTestId(\"profile-view\")).toBeVisible();\n    await expect(page.getByTestId(\"profile-display-name\")).toHaveText(\"새로고침후이름\");\n\n    // Assert: localStorage의 auth_user에 수정된 이름이 저장되어 있다\n    const authUser = await page.evaluate(() => {\n      const raw = localStorage.getItem(\"auth_user\");\n      return raw ? JSON.parse(raw) : null;\n    });\n    expect(authUser).not.toBeNull();\n    expect(authUser.name).toBe(\"새로고침후이름\");\n\n    // Assert: 대시보드 새로고침 후에도 인사말이 수정된 이름을 반영한다\n    await page.goto(\"/dashboard\");\n    await page.reload();\n    await expect(page).toHaveURL(\"/dashboard\");\n    await expect(page.getByTestId(\"greeting\")).toContainText(\"안녕하세요, 새로고침후이름님\");\n  });\n\n  test(\"[JOURNEY-PROFILE-001] 프로필 수정 취소 시 이름·스킬이 변경되지 않고 대시보드 인사말도 그대로다 (데이터 불변 분기)\", async ({\n    page,\n  }) => {\n    // 데이터 불변 분기: 수정 후 저장하지 않고 취소 → 상태 변화 없음을 검증\n    const email = `guard-profile-cancel-${Date.now()}@example.com`;\n    await signupAndGoToDashboard(page, \"취소전이름\", email);\n\n    // 대시보드 원래 인사말 확인\n    await expect(page.getByTestId(\"greeting\")).toContainText(\"안녕하세요, 취소전이름님\");\n\n    // Step 1: 프로필 수정 모드에서 이름·스킬 변경 후 취소\n    await page.goto(\"/profile\");\n    await page.getByTestId(\"profile-edit-btn\").click();\n    await page.getByTestId(\"profile-name\").fill(\"절대저장안됨\");\n\n    await page.getByTestId(\"profile-skills-toggle\").click();\n    await expect(page.getByTestId(\"multiselect-dropdown\")).toBeVisible();\n    await page.getByTestId(\"multiselect-option-Rust\").click();\n    await page.getByTestId(\"profile-name\").click();\n\n    // 저장하지 않고 취소\n    await page.getByTestId(\"profile-cancel\").click();\n\n    // Assert: 뷰 모드로 전환되고 원래 이름이 표시된다 (취소 → 변경 없음)\n    await expect(page.getByTestId(\"profile-view\")).toBeVisible();\n    await expect(page.getByTestId(\"profile-display-name\")).toHaveText(\"취소전이름\");\n\n    // Assert: 대시보드 인사말도 원래 이름 그대로 (취소는 상태를 바꾸지 않는다)\n    await page.goto(\"/dashboard\");\n    await expect(page.getByTestId(\"greeting\")).toContainText(\"안녕하세요, 취소전이름님\");\n  });\n\n  test(\"[JOURNEY-PROFILE-001] 비인증 상태에서 /profile 직접 접근 시 /login으로 리다이렉트된다\", async ({\n    page,\n  }) => {\n    // Branch flow: 로그인하지 않은 상태에서 보호된 라우트 직접 접근\n    await page.goto(\"/profile\");\n    await expect(page).toHaveURL(\"/login\");\n  });\n\n  test(\"[JOURNEY-PROFILE-001] 이름 비워두고 저장 시 에러가 표시되고 데이터·인사말이 변경되지 않는다\", async ({\n    page,\n  }) => {\n    // Branch flow: 유효성 오류 시 상태 불변 검증\n    const email = `guard-profile-validation-${Date.now()}@example.com`;\n    await signupAndGoToDashboard(page, \"유효성검사이름\", email);\n\n    await page.goto(\"/profile\");\n    await page.getByTestId(\"profile-edit-btn\").click();\n\n    // Act: 이름을 비워두고 저장 시도\n    await page.getByTestId(\"profile-name\").fill(\"\");\n    await page.getByTestId(\"profile-save\").click();\n\n    // Assert: 에러 메시지가 표시되고 수정 모드가 유지된다\n    await expect(page.getByTestId(\"profile-form\")).toBeVisible();\n    await expect(page.getByText(\"이름을 입력해주세요\")).toBeVisible();\n\n    // Assert: 저장 성공 메시지가 나타나지 않는다\n    await expect(page.getByTestId(\"profile-saved\")).not.toBeVisible();\n\n    // Assert: 대시보드 인사말은 원래 이름이 유지된다\n    await page.goto(\"/dashboard\");\n    await expect(page.getByTestId(\"greeting\")).toContainText(\"안녕하세요, 유효성검사이름님\");\n  });\n});\n"}, {"name": "summary.md", "type": "text", "content": "# Guard E2E Test Generation Summary\n\n## Journey\n\n**Journey ID:** JOURNEY-PROFILE-001\n**Summary:** 로그인 → 프로필 수정 (이름·스킬 선택) → 저장 → 대시보드 인사말 반영 확인 → 프로필 재진입 시 데이터 유지 확인\n**Flow:** `/signup` → `/dashboard` → `/profile` → 수정·저장 → `/dashboard` (인사말 확인) → `/profile` (데이터 유지 확인)\n**App URL:** `http://localhost:3000`\n\n---\n\n## Generated File\n\n**Path:** `tests/guard/profile/login-profile-edit-dashboard.spec.ts`\n\n---\n\n## Source Code Analysis\n\n읽은 입력 파일 및 참조 파일:\n- `SKILL.md`, `references/e2e-conve
