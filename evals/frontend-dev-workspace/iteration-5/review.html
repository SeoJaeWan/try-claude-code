<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>평가 리뷰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #141413;
      --text-muted: #b0aea5;
      --accent: #d97757;
      --accent-hover: #c4613f;
      --green: #788c5d;
      --green-bg: #eef2e8;
      --red: #c44;
      --red-bg: #fceaea;
      --header-bg: #141413;
      --header-text: #faf9f5;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .header .instructions {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    .header .progress {
      font-size: 0.875rem;
      opacity: 0.8;
      text-align: right;
    }

    /* ---- Main content ---- */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ---- Sections ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .section-header {
      font-family: 'Poppins', sans-serif;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .section-body {
      padding: 1rem;
    }

    /* ---- Config badge ---- */
    .config-badge {
      display: inline-block;
      padding: 0.2rem 0.625rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-left: 0.75rem;
      vertical-align: middle;
    }
    .config-badge.config-primary {
      background: rgba(33, 150, 243, 0.12);
      color: #1976d2;
    }
    .config-badge.config-baseline {
      background: rgba(255, 193, 7, 0.15);
      color: #f57f17;
    }

    /* ---- Prompt ---- */
    .prompt-text {
      white-space: pre-wrap;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    /* ---- Outputs ---- */
    .output-file {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .output-file + .output-file {
      margin-top: 1rem;
    }
    .output-file-header {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .output-file-header .dl-btn {
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      opacity: 0.8;
    }
    .output-file-header .dl-btn:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .output-file-content {
      padding: 0.75rem;
      overflow-x: auto;
    }
    .output-file-content pre {
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .output-file-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .output-file-content iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    .output-file-content table {
      border-collapse: collapse;
      font-size: 0.8125rem;
      width: 100%;
    }
    .output-file-content table td,
    .output-file-content table th {
      border: 1px solid var(--border);
      padding: 0.375rem 0.5rem;
      text-align: left;
    }
    .output-file-content table th {
      background: var(--bg);
      font-weight: 600;
    }
    .output-file-content .download-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .output-file-content .download-link:hover {
      background: var(--border);
    }
    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      padding: 2rem;
      text-align: center;
    }

    /* ---- Feedback ---- */
    .prev-feedback {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.625rem 0.75rem;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .prev-feedback-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
      color: var(--text-muted);
    }
    .feedback-textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9375rem;
      line-height: 1.5;
      resize: vertical;
      color: var(--text);
    }
    .feedback-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .feedback-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      min-height: 1.1em;
    }

    /* ---- Grades (collapsible) ---- */
    .grades-toggle {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .grades-toggle:hover {
      color: var(--accent);
    }
    .grades-toggle .arrow {
      margin-right: 0.5rem;
      transition: transform 0.15s;
      font-size: 0.75rem;
    }
    .grades-toggle .arrow.open {
      transform: rotate(90deg);
    }
    .grades-content {
      display: none;
      margin-top: 0.75rem;
    }
    .grades-content.open {
      display: block;
    }
    .grades-summary {
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .grade-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .grade-pass { background: var(--green-bg); color: var(--green); }
    .grade-fail { background: var(--red-bg); color: var(--red); }
    .assertion-list {
      list-style: none;
    }
    .assertion-item {
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .assertion-item:last-child { border-bottom: none; }
    .assertion-status {
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .assertion-status.pass { color: var(--green); }
    .assertion-status.fail { color: var(--red); }
    .assertion-evidence {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      padding-left: 1.5rem;
    }

    /* ---- View tabs ---- */
    .view-tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-tab {
      font-family: 'Poppins', sans-serif;
      padding: 0.625rem 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .view-panel { display: none; }
    .view-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* ---- Benchmark view ---- */
    .benchmark-view {
      padding: 1.5rem 2rem;
      overflow-y: auto;
      flex: 1;
    }
    .benchmark-table {
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .benchmark-table th, .benchmark-table td {
      padding: 0.625rem 0.75rem;
      text-align: left;
      border: 1px solid var(--border);
    }
    .benchmark-table th {
      font-family: 'Poppins', sans-serif;
      background: var(--header-bg);
      color: var(--header-text);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .benchmark-table tr:hover { background: var(--bg); }
    .benchmark-table tr.benchmark-row-with { background: rgba(33, 150, 243, 0.06); }
    .benchmark-table tr.benchmark-row-without { background: rgba(255, 193, 7, 0.06); }
    .benchmark-table tr.benchmark-row-with:hover { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-without:hover { background: rgba(255, 193, 7, 0.12); }
    .benchmark-table tr.benchmark-row-avg { font-weight: 600; border-top: 2px solid var(--border); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-with { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-without { background: rgba(255, 193, 7, 0.12); }
    .benchmark-delta-positive { color: var(--green); font-weight: 600; }
    .benchmark-delta-negative { color: var(--red); font-weight: 600; }
    .benchmark-notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .benchmark-notes h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }
    .benchmark-notes ul {
      list-style: disc;
      padding-left: 1.25rem;
    }
    .benchmark-notes li {
      font-size: 0.8125rem;
      line-height: 1.6;
      margin-bottom: 0.375rem;
    }
    .benchmark-empty {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      padding: 3rem;
    }

    /* ---- Navigation ---- */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .nav-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      transition: all 0.15s;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .done-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .done-btn:hover {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .done-btn.ready {
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .done-btn.ready:hover {
      background: var(--accent-hover);
    }
    /* ---- Done overlay ---- */
    .done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .done-overlay.visible {
      display: flex;
    }
    .done-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
    }
    .done-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .done-card p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .done-card .btn-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .done-card button {
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
    }
    .done-card button:hover {
      background: var(--bg);
    }
    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--header-bg);
      color: var(--header-text);
      padding: 0.625rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app" style="height:100vh; display:flex; flex-direction:column;">
    <div class="header">
      <div>
        <h1>평가 리뷰: <span id="skill-name"></span></h1>
        <div class="instructions">각 출력을 검토하고 아래에 피드백을 남겨주세요. 화살표 키 또는 버튼으로 이동할 수 있습니다. 완료되면 피드백을 복사하여 Claude Code에 붙여넣으세요.</div>
      </div>
      <div class="progress" id="progress"></div>
    </div>

    <!-- View tabs (only shown when benchmark data exists) -->
    <div class="view-tabs" id="view-tabs" style="display:none;">
      <button class="view-tab active" onclick="switchView('outputs')">출력 결과</button>
      <button class="view-tab" onclick="switchView('benchmark')">벤치마크</button>
    </div>

    <!-- Outputs panel (qualitative review) -->
    <div class="view-panel active" id="panel-outputs">
    <div class="main">
      <!-- Prompt -->
      <div class="section">
        <div class="section-header">프롬프트 <span class="config-badge" id="config-badge" style="display:none;"></span></div>
        <div class="section-body">
          <div class="prompt-text" id="prompt-text"></div>
        </div>
      </div>

      <!-- Outputs -->
      <div class="section">
        <div class="section-header">출력</div>
        <div class="section-body" id="outputs-body">
          <div class="empty-state">출력 파일을 찾을 수 없습니다</div>
        </div>
      </div>

      <!-- Previous Output (collapsible) -->
      <div class="section" id="prev-outputs-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="togglePrevOutputs()">
            <span class="arrow" id="prev-outputs-arrow">&#9654;</span>
            이전 출력
          </div>
        </div>
        <div class="grades-content" id="prev-outputs-content"></div>
      </div>

      <!-- Grades (collapsible) -->
      <div class="section" id="grades-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="toggleGrades()">
            <span class="arrow" id="grades-arrow">&#9654;</span>
            평가 등급
          </div>
        </div>
        <div class="grades-content" id="grades-content"></div>
      </div>

      <!-- Feedback -->
      <div class="section">
        <div class="section-header">피드백</div>
        <div class="section-body">
          <textarea
            class="feedback-textarea"
            id="feedback"
            placeholder="이 출력에 대해 어떻게 생각하시나요? 문제점, 제안사항, 또는 잘된 점이 있나요?"
          ></textarea>
          <div class="feedback-status" id="feedback-status"></div>
          <div class="prev-feedback" id="prev-feedback" style="display:none;">
            <div class="prev-feedback-label">이전 피드백</div>
            <div id="prev-feedback-text"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="nav" id="outputs-nav">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&#8592; 이전</button>
      <button class="done-btn" id="done-btn" onclick="showDoneDialog()">모든 리뷰 제출</button>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">다음 &#8594;</button>
    </div>
    </div><!-- end panel-outputs -->

    <!-- Benchmark panel (quantitative stats) -->
    <div class="view-panel" id="panel-benchmark">
      <div class="benchmark-view" id="benchmark-content">
        <div class="benchmark-empty">벤치마크 데이터가 없습니다. 벤치마크를 실행하면 여기에 정량적 결과가 표시됩니다.</div>
      </div>
    </div>
  </div>

  <!-- Done overlay -->
  <div class="done-overlay" id="done-overlay">
    <div class="done-card">
      <h2>리뷰 완료</h2>
      <p>피드백이 저장되었습니다. Claude Code 세션으로 돌아가서 리뷰가 끝났다고 알려주세요.</p>
      <div class="btn-row">
        <button onclick="closeDoneDialog()">확인</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ---- Embedded data (injected by generate_review.py) ----
    const EMBEDDED_DATA = {"skill_name": "frontend-dev", "runs": [{"id": "notification-filter-with_skill", "prompt": "plans/sample-frontend-dashboard-notification-filter/plan.md의 Phase 1을 실행해줘. NotificationList에 all/unread 필터를 추가하고 empty state, error 처리까지 해줘", "eval_id": 1, "outputs": [{"name": "features__next-app__app__dashboard__page.tsx", "type": "text", "content": "\"use client\";\n\nimport { useEffect } from \"react\";\nimport { useRouter } from \"next/navigation\";\nimport Link from \"next/link\";\nimport { useAuth } from \"@/contexts/AuthContext\";\nimport { useTodos } from \"@/contexts/TodoContext\";\nimport StatsCard from \"@/components/StatsCard\";\nimport TodoForm from \"@/components/TodoForm\";\nimport NotificationList from \"@/components/NotificationList\";\n\nexport default function DashboardPage() {\n  const { user, isAuthenticated, mounted } = useAuth();\n  const { todos, addTodo } = useTodos();\n  const router = useRouter();\n\n  useEffect(() => {\n    if (mounted && !isAuthenticated) router.push(\"/login\");\n  }, [mounted, isAuthenticated, router]);\n\n  if (!mounted || !isAuthenticated) return null;\n\n  const completed = todos.filter((t) => t.completed).length;\n  const pending = todos.length - completed;\n\n  return (\n    <div>\n      <h1 className=\"text-2xl font-bold text-zinc-900 dark:text-zinc-50\" data-testid=\"greeting\">\n        안녕하세요, {user?.name}님\n      </h1>\n      <p className=\"mt-1 text-sm text-zinc-500\">오늘도 좋은 하루 되세요!</p>\n      <p className=\"mt-1 text-xs text-zinc-400\" data-testid=\"current-date\">\n        {new Date().toLocaleDateString(\"ko-KR\")}\n      </p>\n\n      <div className=\"mt-8 grid grid-cols-1 gap-4 sm:grid-cols-3\">\n        <StatsCard label=\"전체 할 일\" value={todos.length} testId=\"stat-total\" />\n        <StatsCard label=\"완료\" value={completed} testId=\"stat-completed\" />\n        <StatsCard label=\"진행중\" value={pending} testId=\"stat-pending\" />\n      </div>\n\n      <div className=\"mt-8\">\n \"../index\";\n\nconst createWrapper = () => {\n  const queryClient = new QueryClient({\n    defaultOptions: { queries: { retry: false } },\n  });\n  return ({ children }: { children: ReactNode }) => (\n    <QueryClientProvider client={queryClient}>{children}</QueryClientProvider>\n  );\n};\n\ndescribe(\"useFetchOrder\", () => {\n  beforeEach(() => {\n    global.fetch = jest.fn();\n  });\n\n  afterEach(() => {\n    jest.restoreAllMocks();\n  });\n\n  it(\"주문 데이터를 성공적으로 가져온다\", async () => {\n    // Arrange\n    const mockOrder = {\n      id: \"order-1\",\n      status: \"completed\",\n      totalAmount: 50000,\n      createdAt: \"2026-01-01T00:00:00Z\",\n      updatedAt: \"2026-01-01T00:00:00Z\",\n    };\n    (global.fetch as jest.Mock).mockResolvedValueOnce({\n      ok: true,\n      json: async () => mockOrder,\n    });\n\n    // Act\n    const { result } = renderHook(\n      () => useFetchOrder({ orderId: \"order-1\" }),\n      { wrapper: createWrapper() },\n    );\n\n    // Assert\n    await waitFor(() => expect(result.current.isLoading).toBe(false));\n    expect(result.current.data).toEqual(mockOrder);\n    expect(result.current.isError).toBe(false);\n  });\n\n  it(\"주문 조회 실패 시 에러를 반환한다\", async () => {\n    // Arrange\n    (global.fetch as jest.Mock).mockResolvedValueOnce({\n      ok: false,\n      status: 404,\n    });\n\n    // Act\n    const { result } = renderHook(\n      () => useFetchOrder({ orderId: \"invalid-id\" }),\n      { wrapper: createWrapper() },\n    );\n\n    // Assert\n    await waitFor(() => expect(result.current.isError).toBe(true));\n    expect(result.current.error).toBeDefined();\n  });\n\n  it(\"enabled가 false이면 쿼리를 실행하지 않는다\", () => {\n    // Arrange & Act\n    const { result } = renderHook(\n      () => useFetchOrder({ orderId: \"order-1\", enabled: false }),\n      { wrapper: createWrapper() },\n    );\n\n    // Assert\n    expect(global.fetch).not.toHaveBeenCalled();\n    expect(result.current.data).toBeUndefined();\n  });\n\n  it(\"orderId 없이 호출하면 전체 주문 목록 엔드포인트를 사용한다\", async () => {\n    // Arrange\n    (global.fetch as jest.Mock).mockResolvedValueOnce({\n      ok: true,\n      json: async () => [],\n    });\n\n    // Act\n    const { result } = renderHook(() => useFetchOrder(), {\n      wrapper: createWrapper(),\n    });\n\n    // Assert\n    await waitFor(() => expect(result.current.isLoading).toBe(false));\n    expect(global.fetch).toHaveBeenCalledWith(\"/api/orders\");\n  });\n});\n"}, {"name": "hooks__apis__queries__useFetchOrder__index.ts", "type": "text", "content": "\"use client\";\n\nimport { useQuery } from \"@tanstack/react-query\";\n\n/** 주문 데이터 응답 타입 */\ninterface Order {\n  id: string;\n  status: string;\n  totalAmount: number;\n  createdAt: string;\n  updatedAt: string;\n}\n\n/** useFetchOrder 파라미터 */\ninterface UseFetchOrderParams {\n  orderId?: string;\n  enabled?: boolean;\n}\n\n/**\n * 주문 데이터를 조회하는 API 훅 (query)\n * @param params - 주문 조회 파라미터\n * @param params.orderId - 조회할 주문 ID\n * @param params.enabled - 쿼리 활성화 여부 (기본값: true)\n * @returns 주문 데이터, 로딩 상태, 에러 정보\n */\nconst useFetchOrder = (params: UseFetchOrderParams = {}) => {\n  const { orderId, enabled = true } = params;\n\n  const query = useQuery<Order>({\n    queryKey: [\"order\", orderId],\n    queryFn: async () => {\n      const url = orderId ? `/api/orders/${orderId}` : \"/api/orders\";\n      const response = await fetch(url);\n\n      if (!response.ok) {\n        throw new Error(\"Failed to fetch order\");\n      }\n\n      return response.json();\n    },\n    enabled,\n  });\n\n  return {\n    data: query.data,\n    isLoading: query.isLoading,\n    isError: query.isError,\n    error: query.error,\n    refetch: query.refetch,\n  };\n};\n\nexport default useFetchOrder;\n"}], "grading": {"expectations": [{"text": "generate-output-exists", "passed": true, "evidence": "에이전트가 generate.mjs api-hook useFetchOrder --method query 실행 확인 (transcript 참조)"}, {"text": "hook-file-exists", "passed": true, "evidence": "hooks/api Data(null);\n    } finally {\n      setIsLoading(false);\n    }\n  }, [orderId]);\n\n  useEffect(() => {\n    if (enabled && orderId) {\n      fetchOrder();\n    }\n  }, [enabled, orderId, fetchOrder]);\n\n  return {\n    data,\n    isLoading,\n    isError,\n    error,\n    refetch: fetchOrder,\n  };\n}\n"}, {"name": "lib__types.ts", "type": "text", "content": "export interface User {\n  id: string;\n  email: string;\n  name: string;\n  bio?: string;\n  skills?: string[];\n  birthDate?: string;\n  avatarFileName?: string;\n}\n\nexport interface Todo {\n  id: string;\n  text: string;\n  completed: boolean;\n  createdAt: string;\n}\n\nexport interface OrderItem {\n  id: string;\n  productId: string;\n  productName: string;\n  quantity: number;\n  unitPrice: number;\n  totalPrice: number;\n}\n\nexport type OrderStatus =\n  | \"pending\"\n  | \"confirmed\"\n  | \"shipping\"\n  | \"delivered\"\n  | \"cancelled\";\n\nexport interface Order {\n  id: string;\n  userId: string;\n  items: OrderItem[];\n  totalAmount: number;\n  status: OrderStatus;\n  shippingAddress: string;\n  createdAt: string;\n  updatedAt: string;\n}\n"}], "grading": {"expectations": [{"text": "generate-output-exists", "passed": false, "evidence": "generate.mjs 미실행 — 스킬 없이는 보일러플레이트 생성기 인지 불가"}, {"text": "hook-file-exists", "passed": true, "evidence": "hooks/apis/queries/useFetchOrder.ts 존재"}, {"text": "hook-in-queries", "passed": true, "evidence": "apis/queries/ 하위 배치 — iteration-4 대비 개선"}, {"text": "index-export", "passed": false, "evidence": "useFetchOrder.ts 플랫 파일 — useFetchOrder/index.ts 디렉토리 패턴 아님"}, {"text": "returns-loading", "passed": true, "evidence": "isLoading 상태 반환 (line 25, 62)"}, {"text": "returns-error", "passed": true, "evidence": "error 상태 반환 (line 26, 63)"}], "summary": {"passed": 4, "failed": 2, "total": 6, "pass_rate": 0.667}}}, {"id": "login-hook-composition-with_skill", "prompt": "로그인 페이지에 useLoginForm 커스텀 훅이랑 useLogin API 훅을 만들고 페이지에서 조합해줘", "eval_id": 3, "outputs": [{"name": "app_ d\");\n      return true;\n    },\n    [authLogin, router],\n  );\n\n  const resetError = useCallback(() => {\n    setError(null);\n  }, []);\n\n  return {\n    login,\n    isLoading,\n    error,\n    resetError,\n  };\n};\n\nexport default useLogin;\n"}, {"name": "hooks__utils__useLoginForm__index.ts", "type": "text", "content": "\"use client\";\n\nimport { useState, useCallback } from \"react\";\nimport { validateEmail, validatePassword } from \"@/lib/validators\";\n\ninterface LoginFormState {\n  email: string;\n  password: string;\n  errors: Record<string, string>;\n}\n\n/**\n * useLoginForm - 로그인 폼 상태 관리 훅\n * @returns 폼 상태, 변경 핸들러, 검증 함수\n */\nconst useLoginForm = () => {\n  const [form, setForm] = useState<LoginFormState>({\n    email: \"\",\n    password: \"\",\n    errors: {},\n  });\n\n  const handleChange = useCallback((field: \"email\" | \"password\", value: string) => {\n    setForm((prev) => ({\n      ...prev,\n      [field]: value,\n    }));\n  }, []);\n\n  const handleBlur = useCallback((field: \"email\" | \"password\") => {\n    const value = field === \"email\" ? form.email : form.password;\n    const validator = field === \"email\" ? validateEmail : validatePassword;\n    const err = validator(value);\n\n    setForm((prev) => {\n      const newErrors = { ...prev.errors };\n      if (err) {\n        newErrors[field] = err;\n      } else {\n        delete newErrors[field];\n      }\n      return { ...prev, errors: newErrors };\n    });\n  }, [form.email, form.password]);\n\n  const validate = useCallback((): Record<string, string> => {\n    const errs: Record<string, string> = {};\n    const emailErr = validateEmail(form.email);\n    if (emailErr) errs.email = emailErr;\n    const pwErr = validatePassword(form.password);\n    if (pwErr) errs.password = pwErr;\n    return errs;\n  }, [form.email, form.password]);\n\n  const setErrors = useCallback((errors: Record<string, string>) => {\n    setForm((prev) => ({ ...prev, errors }));\n  }, []);\n\n  return {\n    form,\n    handleChange,\n    handleBlur,\n    validate,\n    setErrors,\n  };\n};\n\nexport default useLoginForm;\n"}], "grading": {"expectations": [{"text": "generate-form-hook", "passed": true, "evidence": "에이전트가 generate.mjs hook useLoginForm --form 실행 (transcript 참조)"}, {"text": "generate-api-hook", "passed": true, "evidence": "에이전트가 generate.mjs api-hook useLogin --method mutation 실행 (transcript 참조)"}, {"text": "login-hook-in-mutations", "passed": true, "evidence": "hooks/apis/mutations/useLogin/index.ts — 올바른 mutations/ 배치"}, {"text": "form-hook-placement", "passed": true, "evidence": "hooks/utils/useLoginForm/index.ts — hooks/ 하위 배치"}, {"text": "page-imports-hooks", "passed": true, "evidence": "import useLoginForm from '@/hooks/utils/useLoginForm'; import useLogin from '@/hooks/apis/mutations/useLogin' (page.tsx line 4-5)"}, {"text": "page-no-direct-logic", "passed": true, "evidence": "페이지에 useState/fetch 없음 — 훅 조합만 사용"}, {"text": "handle-submit", "passed": true, "evidence": "handleSubmit 함수 존재 (page.tsx line 11)"}], "summary": {"passed": 7, "failed": 0, "total": 7, "pass_rate": 1.0}}}, {"id": "login-hook-composition-without_skill", "prompt": "로그인 페이지에 useLoginForm 커스텀 훅이랑 useLogin API 훅을 만들고 페이지에서 조합해줘", "eval_id": 3, "outputs": [{"name": "app__login__page.tsx", "type": "text", "content": "\"use client\";\n\nimport Link from \"next/link\";\nimport { useLoginForm } from \"@/hooks/useLoginForm\";\nimport { useLogin } from \"@/hooks/useLogin\";\n\nexport default function LoginPage() {\n  const {\n    email,\n    password,\n    errors,\n    setEmail,\n    setPassword,\n    validateField,\n    validateAll,\n  } = useLoginForm();\n\n  const { generalError, execute, clearError } = useLogin();\n\n  const handleSubmit = (e: React.FormEvent) => {\n    e.preventDefault();\n    clearError();\n\n    if (!validateAll()) return;\n\n    execute(email, password);\n  };\n\n  return (\n    <div className=\"mx-auto mt-20 max-w-md\">\n      <h1 className=\"mb-8 text- submit\"\n        >\n          로그인\n        </button>\n      </form>\n\n      <p className=\"mt-4 text-center text-sm text-zinc-500\">\n        계정이 없으신가요?{\" \"}\n        <Link href=\"/signup\" className=\"text-blue-600 hover:text-blue-800\">회원가입</Link>\n      </p>\n    </div>\n  );\n}\n"}, {"name": "hooks__useLogin.ts", "type": "text", "content": "\"use client\";\n\nimport { useState, useCallback } from \"react\";\nimport { useRouter } from \"next/navigation\";\nimport { useAuth } from \"@/contexts/AuthContext\";\n\ninterface UseLoginReturn {\n  generalError: string | null;\n  isLoading: boolean;\n  execute: (email: string, password: string) => void;\n  clearError: () => void;\n}\n\nexport function useLogin(): UseLoginReturn {\n  const { login } = useAuth();\n  const router = useRouter();\n  const [generalError, setGeneralError] = useState<string | null>(null);\n  const [isLoading, setIsLoading] = useState(false);\n\n  const execute = useCallback(\n    (email: string, password: string) => {\n      setGeneralError(null);\n      setIsLoading(true);\n\n      try {\n        const err = login(email, password);\n        if (err) {\n          setGeneralError(err);\n        } else {\n          router.push(\"/dashboard\");\n        }\n      } finally {\n        setIsLoading(false);\n      }\n    },\n    [login, router]\n  );\n\n  const clearError = useCallback(() => {\n    setGeneralError(null);\n  }, []);\n\n  return {\n    generalError,\n    isLoading,\n    execute,\n    clearError,\n  };\n}\n"}, {"name": "hooks__useLoginForm.ts", "type": "text", "content": "\"use client\";\n\nimport { useState, useCallback } from \"react\";\nimport { validateEmail, validatePassword } from \"@/lib/validators\";\n\ninterface LoginFormState {\n  email: string;\n  password: string;\n  errors: Record<string, string>;\n}\n\ninterface UseLoginFormReturn {\n  email: string;\n  password: string;\n  errors: Record<string, string>;\n  setEmail: (value: string) => void;\n  setPassword: (value: string) => void;\n  validateField: (field: \"email\" | \"password\") => void;\n  validateAll: () => boolean;\n  resetForm: () => void;\n}\n\nconst initialState: LoginFormState = {\n  email: \"\",\n  password: \"\",\n  errors: {},\n};\n\nexport function useLoginForm(): UseLoginFormReturn {\n  const [formState, setFormState] = useState<LoginFormState>(initialState);\n\n  const setEmail = useCallback((value: string) => {\n    setFormState((prev) => ({ ...prev, email: value }));\n  }, []);\n\n  const setPassword = useCallback((value: string) => {\n    setFormState((prev) => ({ ...prev, password: value }));\n  }, []);\n\n  const validateField = useCallback((field: \"email\" | \"password\") => {\n    setFormState((prev) => {\n      const validator = field === \"email\" ? validateEmail : validatePassword;\n      const value = field === \"email\" ? prev.email : prev.password;\n      const error = validator(value);\n\n      const newErrors = { ...prev.errors };\n      if (error) {\n        newErrors[field] = error;\n      } else {\n        delete newErrors[field];\n      }\n\n      return { ...prev, errors: newErrors };\n    });\n  }, []);\n\n  const validateAll = useCallback((): boolean => {\n    let isValid = true;\n\n    setFormState((prev) => {\n      const newErrors: Record<string, string> = {};\n      const emailErr = validateEmail(prev.email);\n      if (emailErr) {\n        newErrors.email = emailErr;\n        isValid = false;\n      }\n      const pwErr = validatePassword(prev.password);\n      if (pwErr) {\n        newErrors.password = pwErr;\n        isValid = false;\n      }\n      return { ...prev, errors: newErrors };\n    });\n\n    return isValid;\n  }, []);\n\n  const resetForm = useCallback(() => {\n    setFormState(initialState);\n  }, []);\n\n  return {\n    email: formState.email,\n    password: formState.password,\n    errors: formState.errors,\n    setEmail,\n    setPassword,\n    validateField,\n    validateAll,\n    resetForm,\n  };\n}\n"}], "grading": {" otification-filter.spec.ts`\n- The E2E spec was not modified (frozen plan artifact)\n\n### 3. No changes to `features/next-app/app/dashboard/page.tsx`\n\n- The dashboard page already imports and renders `<NotificationList />` without props\n- All filter logic is self-contained within the `NotificationList` component, so no dashboard changes were needed\n\n## Data-testid Locator Contract\n\n| Locator | Element | Condition |\n| --- | --- | --- |\n| `notifications-filter-all` | All filter button | Visible on success |\n| `notifications-filter-unread` | Unread filter button | Visible on success |\n| `notifications-list` | List container | Visible when filtered items > 0 |\n| `notification-{id}` | Individual notification row | Visible when item passes filter |\n| `notifications-empty` | Empty state message | Visible when filtered items = 0 |\n| `notifications-loading` | Loading skeleton | Visible during fetch |\n| `notifications-error` | Error message | Visible on API error (filter buttons hidden) |\n\n## Verification Results\n\n| Check | Result | Notes |\n| --- | --- | --- |\n| ESLint (NotificationList.tsx) | Pass | No errors or warnings |\n| TypeScript (tsc --noEmit) | Pre-existing errors only | Errors in `playwright.config.ts` and `guard/` test files, not in changed files |\n| Build (pnpm build) | Pre-existing failure | `playwright.config.ts` type error blocks build; source compilation succeeds |\n\n## Files Created/Modified\n\n- **Modified:** `features/next-app/components/NotificationList.tsx`\n- **Created:** `features/next-app/tests/dashboard-notification-filter.spec.ts` (copied from plan E2E artifact)\n- **Created:** `evals/frontend-dev-workspace/iteration-4/notification-filter/with_skill/outputs/summary.md`\n\n## Final File Structure (relevant)\n\n```\nfeatures/next-app/\n  app/\n    dashboard/\n      page.tsx                 (unchanged)\n    api/\n      notifications/\n        route.ts               (unchanged)\n  components/\n    NotificationList.tsx       (modified - filter state, empty state, error contract)\n  tests/\n    dashboard-notification-filter.spec.ts  (new - E2E frozen artifact)\n```\n\n## Exit Criteria Status\n\n- [x] Default entry shows all notifications\n- [x] Unread filter shows only unread notifications\n- [x] Empty state shown when unread filter yields 0 results\n- [x] API error shows error UI with filter buttons hidden\n"}], "notification-filter-without_skill": [{"name": "dashboard-notification-filter.spec.ts", "type": "text", "content": "import { test, expect, type Page } from \"@playwright/test\";\n\ntype Notification = {\n  id: string;\n  message: string;\n  time: string;\n  read: boolean;\n};\n\nclass DashboardNotificationsSection {\n  constructor(private readonly page: Page) {}\n\n  allFilter() {\n    return this.page.getByTestId(\"notifications-filter-all\");\n  }\n\n  unreadFilter() {\n    return this.page.getByTestId(\"notifications-filter-unread\");\n  }\n\n  list() {\n    return this.page.getByTestId(\"notifications-list\");\n  }\n\n  empty() {\n    return this.page.getByTestId(\"notifications-empty\");\n  }\n\n  error() {\n    return this.page.getByTestId(\"notifications-error\");\n  }\n\n  item(id: string) {\n    return this.page.getByTestId(`notification-${id}`);\n  }\n}\n\nasync function loginAsTestUser(page: Page) {\n  await page.goto(\"/signup\");\n  await page.getByTestId(\"signup-name\").fill(\"테스트유저\");\n  await page.getByTestId(\"signup-email\").fill(`notification-${Date.now()}@example.com`);\n  await page.getByTestId(\"signup-password\").fill(\"password123\");\n  await page.getByTestId(\"signup-confirm-password\").fill(\"password123\");\n  await page.getByTestId(\"signup-submit\").click();\n  await page.waitForURL(\"**/dashboard\");\n}\n\nasync function stubNotifications(page: Page, notifications: Notification[] | \"error\") {\n  await page.route(\"**/api/notifications\", async (route) => {\n    if (notifications === \"error\") {\n      await route.fulfill({\n        status: 500,\n        contentType: \"application/json\",\n        body: JSON.stringify({ message: \"알림을 불러올 수 없습니다\" }),\n      });\n      return;\n    }\n\n    await route.fulfill({\n      status: 200,\n      contentType: \"application/json\",\n      body: JSON.stringify({\n        notifications,\n        total: notifications.length,\n      }),\n    });\n  });\n}\n\ntest.describe(\"대시보드 알림 필터\", () => {\n  test.beforeEach(async ({ page }) => {\n    await page.addInitScript(() => {\n      localStorage.setItem(\"cookie-consent\", \"true\");\n    });\n\n    await loginAsTestUser(page);\n  });\n\n  test(\"[C-NOTI-001] 기본 진입 시 전체 알림이 노출된다\", async ({ page }) => {\n    // Arrange\n    await stubNotifications(page, [\n      { id: \"1\", message: \"새 알림\", time: new Date().toISOString(), read: false },\n      { id: \"2\", message: \"읽은 알림\", time: new Date().toISOString(), read: true },\n    ]);\n    const section = new DashboardNotificationsSection(page);\n\n    // Act\n    await page.goto(\"/dashboard\");\n\n    // Assert\n    await expect(section.list()).toBeVisible();\n    await expect(section.allFilter()).toBeVisible();\n    await expect(section.unreadFilter()).toBeVisible();\n    await expect(section.item(\"1\")).toBeVisible();\n    await expect(section.item(\"2\")).toBeVisible();\n  });\n\n  test(\"[C-NOTI-002][C-NOTI-003] unread filter는 읽지 않은 알림만 남기고 비면 empty state를 노출한다\", async ({\n    page,\n  }) => {\n    // Arrange\n    await stubNotifications(page, [\n      { id: \"2\", message: \"읽은 알림\", time: new Date().toISOString(), read: true },\n    ]);\n    const section = new DashboardNotificationsSection(page);\n    await page.goto(\"/dashboard\");\n\n    // Act\n    await section.unreadFilter().click();\n\n    // Assert\n    await expect(section.item(\"2\")).not.toBeVisible();\n    await expect(section.empty()).toBeVisible();\n  });\n\n  test(\"[C-NOTI-004] API 오류면 오류 상태가 필터 UI보다 우선한다\", async ({ page }) => {\n    // Arrange\n    await stubNotifications(page, \"error\");\n    const section = new DashboardNotificationsSection(page);\n\n    // Act\n    await page.goto(\"/dashboard\");\n\n    // Assert\n    await expect(section.error()).toBeVisible();\n    await expect(section.allFilter()).not.toBeVisible();\n    await expect(section.unreadFilter()).not.toBeVisible();\n  });\n});\n"}, {"name": "NotificationList.tsx", "type": "text", "content": "\"use client\";\n\nimport { useEffect, useState } from \"react\";\n\ninterface Notification {\n  id: string;\n  message: string;\n  time: string;\n  read: boolean;\n}\n\ntype FilterType = \"all\" | \"unread\";\n\nexport default function NotificationList() {\n  const [notifications, setNotifications] = useState<Notification[]>([]);\n  const [loading, setLoading] = useState(true);\n  const [error, setError] = useState<string | null>(null);\n  const [filter, setFilter] = useState<FilterType>(\"all\");\n\n  useEffect(() => {\n    fetch(\"/api/notifications\")\n      .then((res) => {\n        if (!res.ok) throw new Error(\"알림을 불러올 수 없습니다\");\n        return res.json();\n      })\n      .then((data) => {\n        setNotifications(data.notifications);\n        setLoading(false);\n      })\n      .catch((err) => {\n        setError(err.message);\n        setLoading(false);\n      });\n  }, []);\n\n  if (loading) {\n    return (\n      <div data-testid=\"notifications-loading\" className=\"animate-pulse space-y-2\">\n        {[1, 2, 3].map((i) => (\n          <div key={i} className=\"h-12 rounded bg-zinc-200 dark:bg-zinc-700\" />\n        ))}\n      </div>\n    );\n  }\n\n  if (error) {\n    return (\n      <p data-testid=\"notifications-error\" className=\"text-sm text-red-500\">\n        {error}\n      </p>\n    );\n  }\n\n  const filtered =\n    filter === \"unread\"\n      ? notifications.filter((n) => !n.read)\n      : notifications;\n\n  return (\n    <div>\n      <div className=\"mb-3 flex gap-2\">\n        <button\n          data-testid=\"notifications-filter-all\"\n          onClick={() => setFilter(\"all\")}\n          className={`rounded px-3 py-1 text-sm font-medium transition-colors ${\n            filter === \"all\"\n              ? \"bg-blue-600 text-white\"\n              : \"bg-zinc-100 text-zinc-600 hover:bg-zinc-200 dark:bg-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-600\"\n          }`}\n        >\n          전체\n        </button>\n        <button\n          data-testid=\"notifications-filter-unread\"\n          onClick={() => setFilter(\"unread\")}\n          className={`rounded px-3 py-1 text-sm font-medium transition-colors ${\n            filter === \"unread\"\n              ? \"bg-blue-600 text-white\"\n              : \"bg-zinc-100 text-zinc-600 hover:bg-zinc-200 dark:bg-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-600\"\n          }`}\n        >\n          읽지 않음\n        </button>\n      </div>\n\n      {filtered.length === 0 ? (\n        <p\n          data-testid=\"notifications-empty\"\n          className=\"py-6 text-center text-sm text-zinc-400\"\n        >\n          알림이 없습니다\n        </p>\n      ) : (\n        <ul data-testid=\"notifications-list\" className=\"space-y-2\">\n          {filtered.map((n) => (\n            <li\n              key={n.id}\n              data-testid={`notification-${n.id}`}\n              className={`rounded border p-3 text-sm ${\n                n.read\n                  ? \"border-zinc-200 bg-white dark:border-zinc-700 dark:bg-zinc-800\"\n                  : \"border-blue-200 bg-blue-50 dark:border-blue-800 dark:bg-blue-900/20\"\n              }`}\n            >\n              <p className=\"text-zinc-800 dark:text-zinc-200\">{n.message}</p>\n              <time\n                data-testid={`notification-time-${n.id}`}\n                className=\"mt-1 block text-xs text-zinc-400\"\n              >\n                {new Date(n.time).toLocaleString(\"ko-KR\")}\n              </time>\n            </li>\n          ))}\n        </ul>\n      )}\n    </div>\n  );\n}\n"}, {"name": "summary.md", "type": "text", "content": "# Phase 1 Implementation Summary\n\n## Task\n\nExecute Phase 1 of `plans/sample-frontend-dashboard-notification-filter/plan.md`: add all/unread filter to `NotificationList`, implement empty state when no unread notifications exist, and ensure error state takes priority over filter UI.\n\n## What Was Done\n\n### 1. Modified: `features/next-app/components/NotificationList.tsx`\n\nAdded the following capabilities:\n\n- **Filter state** (`all` | `unread`): a `useState` hook tracks the active filter, defaulting to `all`.\n- **Segmented filter buttons**: two buttons (`notifications-filter-all`, `notifications-filter-unread`) render above the notification list. The active button is visually highlighted with `bg-blue-600 text-white`.\n- **Client-side filtering**: when `unread` is selected, notifications are filtered to `read === false` before rendering.\n- **Empty state**: when the filtered list has zero items, a `notifications-empty` element is shown with the message \"알림이 없습니다\".\n- **Error-first rendering**: if the API call fails, the error UI (`notifications-error`) renders immediately without any filter buttons, satisfying the contract that error state takes priority over filter UI.\n- **Preserved locators**: all existing `data-testid` attributes (`notifications-loading`, `notifications-error`, `notifications-list`, `notification-{id}`, `notification-time-{id}`) remain unchanged.\n\n### 2. Unchanged: `features/next-app/app/dashboard/page.tsx`\n\nNo modifications were needed. The dashboard page already renders `<NotificationList />` and the filter logic is fully encapsulated within the component.\n\n### 3. Created: `features/next-app/tests/dashboard-notification-filter.spec.ts`\n\nPlaced the frozen Playwright E2E spec from the plan artifacts into the project test directory. This spec covers:\n\n- `[C-NOTI-001]` Default entry shows all notifications with both filter buttons visible\n- `[C-NOTI-002][C-NOTI-003]` Unread filter hides read notifications; empty state appears when no unread items exist\n- `[C-NOTI-004]` API error renders error UI and hides filter buttons\n\n## data-testid Registry\n\n| Locator | Status |\n| --- | --- |\n| `notifications-filter-all` | Added |\n| `notifications-filter-unread` | Added |\n| `notifications-empty` | Added |\n| `notifications-list` | Preserved |\n| `notification-{id}` | Preserved |\n| `notifications-loading` | Preserved |\n| `notifications-error` | Preserved |\n\n## Output Files\n\n```\nevals/frontend-dev-workspace/iteration-4/notification-filter/without_skill/outputs/\n  NotificationList.tsx                      # Modified component\n  dashboard-notification-filter.spec.ts     # E2E Playwright spec\n  summary.md                                # This file\n```\n\n## Source Files Changed\n\n```\nfeatures/next-app/components/NotificationList.tsx   # Modified\nfeatures/next-app/tests/dashboard-notification-filter.spec.ts  # Created\n```\n\n## Verification Commands\n\n1. `pnpm --dir features/next-app lint`\n2. `pnpm --dir features/next-app exec playwright test tests/dashboard-notification-filter.spec.ts`\n\n## Exit Criteria Status\n\n- [x] Default entry shows all notifications\n- [x] Unread filter shows only unread notifications\n- [x] Empty state appears when unread result count is 0\n- [x] API error shows error UI with filter buttons hidden\n"}], "api-hook-order-with_skill": [{"name": "summary.md", "type": "text", "content": "# useFetchOrder API Hook - Implementation Summary\n\n## Task\n\nCreate a `useFetchOrder` API hook that fetches order data using a query pattern.\n\n## What Was Done\n\n1. **Added Order-related types** to the existing `lib/types.ts` file (`Order`, `OrderItem`, `OrderStatus`).\n2. **Created `useFetchOrder` hook** as a query-style API hook under the `hooks/apis/queries/` directory following the skill's folder structure convention.\n3. **Created barrel exports** (`index.ts`) at each level of the hooks directory for clean import paths.\n\n## Hook API\n\n```ts\nuseFetchOrder({ orderId, enabled? }): { data, isLoading, isError, error, refetch }\n```\n\n- `orderId` (string | undefined) - The ID of the order to fetch. When undefined, the hook is idle.\n- `enabled` (boolean, default: true) - Controls whether the fetch is executed.\n- Returns standard query-style result: `data`, `isLoading`, `isError`, `error`, `refetch`.\n\n### Features\n\n- Abort controller for request cancellation on unmount or orderId change\n- Configurable API base URL via `NEXT_PUBLIC_API_BASE_URL` env variable (defaults to `/api`)\n- `enabled` flag to conditionally skip fetching\n- `refetch` callback for manual re-fetching\n- Proper error handling with typed Error objects\n\n## Files Created\n\n- `features/next-app/hooks/apis/queries/useFetchOrder.ts` - The main hook implementation\n- `features/next-app/hooks/apis/queries/index.ts` - Barrel export for queries\n- `features/next-app/hooks/apis/index.ts` - Barrel export for apis\n- `features/next-app/hooks/index.ts` - Barrel export for hooks root\n\n## Files Modified\n\n- `features/next-app/lib/types.ts` - Added `Order`, `OrderItem`, and `OrderStatus` type definitions\n\n## Generate Scripts Run\n\nNone. The coding-rules scripts directory (`.claude/try-claude/references/coding-rules/scripts/generate.mjs`) was not found (init-try not run), so boilerplate generation was skipped and implementation was done manually per skill instructions.\n\n## Coding Rules References Consulted\n\n- Skill guide `frontend-dev/SKILL.md`: Folder structure (`{hooksRoot}/apis/queries/`), API hook pattern (query method), boilerplate generation fallback guidance.\n- `.claude/try-claude/references/coding-rules/completion.md`: Not found (no coding-rules directory present).\n\n## Verification\n\n- TypeScript type check (`pnpm exec tsc --noEmit`): No errors in new/modified files (pre-existing playwright test errors are unrelated).\n\n## Final File Paths\n\n| File | Absolute Path |\n|------|---------------|\n| Hook | `C:\\Users\\sjw73\\Desktop\\dev\\try-claude-code\\features\\next-app\\hooks\\apis\\queries\\useFetchOrder.ts` |\n| Types | `C:\\Users\\sjw73\\Desktop\\dev\\try-claude-code\\features\\next-app\\lib\\types.ts` |\n| Barrel (queries) | `C:\\Users\\sjw73\\Desktop\\dev\\try-claude-code\\features\\next-app\\hooks\\apis\\queries\\index.ts` |\n| Barrel (apis) | `C:\\Users\\sjw73\\Desktop\\dev\\try-claude-code\\features\\next-app\\hooks\\apis\\index.ts` |\n| Barrel (hooks) | `C:\\Users\\sjw73\\Desktop\\dev\\try-claude-code\\features\\next-app\\hooks\\index.ts` |\n"}], "api-hook-order-without_skill": [{"name": "summary.md", "type": "text", "content": "# useFetchOrder API Hook\n\n## What was done\n\nCreated a `useFetchOrder` custom React hook that fetches order data via a query pattern (GET request). The hook follows the conventions observed in the existing Next.js 16 / React 19 / TypeScript project (`features/next-app`).\n\nSince the project does not use an external data-fetching library (no TanStack Query, SWR, etc.), the hook is built with native React primitives (`useState`, `useEffect`, `useCallback`).\n\n## Design decisions\n\n- **Query pattern**: The hook accepts an `orderId` and an optional `enabled` flag. It automatically fetches when mounted (if enabled) and re-fetches when `orderId` changes.\n- **Return shape**: Returns `{ data, isLoading, isError, error, refetch }` -- a standard query-hook interface similar to TanStack Query / SWR conventions.\n- **Type definitions**: Includes `Order` and `OrderItem` interfaces with common order fields (status enum, items, amounts, timestamps).\n- **Error handling**: Catches both network errors and non-OK HTTP responses, surfacing them through `isError` and `error`.\n- **`\"use client\"` directive**: Included to match the project convention (Next.js App Router client components).\n- **Korean error messages**: Matches the project's existing Korean-language UI strings.\n\n## Files created\n\n| File | Description |\n|------|-------------|\n| `evals/frontend-dev-workspace/iteration-4/api-hook-order/without_skill/outputs/useFetchOrder.ts` | The `useFetchOrder` hook with `Order` and `OrderItem` type exports |\n| `evals/frontend-dev-workspace/iteration-4/api-hook-order/without_skill/outputs/summary.md` | This summary document |\n\n## Final file paths\n\n- `C:\\Users\\sjw73\\Desktop\\dev\\try-claude-code\\evals\\frontend-dev-workspace\\iteration-4\\api-hook-order\\without_skill\\outputs\\useFetchOrder.ts`\n- `C:\\Users\\sjw73\\Desktop\\dev\\try-claude-code\\evals\\frontend-dev-workspace\\iteration-4\\api-hook-order\\without_skill\\outputs\\summary.md`\n"}, {"name": "useFetchOrder.ts", "type": "text", "content": "\"use client\";\n\nimport { useState, useEffect, useCallback } from \"react\";\n\nexport interface OrderItem {\n  id: string;\n  productName: string;\n  quantity: number;\n  unitPrice: number;\n}\n\nexport interface Order {\n  id: string;\n  userId: string;\n  items: OrderItem[];\n  totalAmount: number;\n  status: \"pending\" | \"confirmed\" | \"shipped\" | \"delivered\" | \"cancelled\";\n  createdAt: string;\n  updatedAt: string;\n}\n\ninterface UseFetchOrderParams {\n  orderId: string | undefined;\n  enabled?: boolean;\n}\n\ninterface UseFetchOrderResult {\n  data: Order | null;\n  isLoading: boolean;\n  isError: boolean;\n  error: Error | null;\n  refetch: () => Promise<void>;\n}\n\nexport function useFetchOrder({\n  orderId,\n  enabled = true,\n}: UseFetchOrderParams): UseFetchOrderResult {\n  const [data, setData] = useState<Order | null>(null);\n  const [isLoading, setIsLoading] = useState(false);\n  const [isError, setIsError] = useState(false);\n  const [error, setError] = useState<Error | null>(null);\n\n  const fetchOrder = useCallback(async () => {\n    if (!orderId) return;\n\n    setIsLoading(true);\n    setIsError(false);\n    setError(null);\n\n    try {\n      const response = await fetch(`/api/orders/${orderId}`);\n\n      if (!response.ok) {\n        throw new Error(`주문 조회 실패: ${response.status} ${response.statusText}`);\n      }\n\n      const order: Order = await response.json();\n      setData(order);\n    } catch (err) {\n      const fetchError = err instanceof Error ? err : new Error(\"알 수 없는 오류가 발생했습니다\");\n      setError(fetchError);\n      setIsError(true);\n      setData(null);\n    } finally {\n      setIsLoading(false);\n    }\n  }, [orderId]);\n\n  useEffect(() => {\n    if (enabled && orderId) {\n      fetchOrder();\n    }\n  }, [enabled, orderId, fetchOrder]);\n\n  return { data, isLoading, isError, error, refetch: fetchOrder };\n}\n"}], "login-hook-composition-with_skill": [{"name": "summary.md", "type": "text", "content": "# Login Hook Composition - Summary\n\n## Task\n\nRefactor the login page to extract logic into two custom hooks (`useLoginForm` and `useLogin`) and compose them in the page component.\n\n## What Was Done\n\nThe login page (`app/login/page.tsx`) previously contained all form state, validation, and login API logic inline. This was refactored into a clean hook composition pattern:\n\n1. **Created `useLoginForm` custom hook** - Manages form state (email, password, field-level errors) and validation logic. Provides `validateField` for onBlur validation and `validateAll` for submit-time validation.\n\n2. **Created `useLogin` API hook** - Wraps the `login` call from `AuthContext` and handles navigation on success. Exposes `generalError`, `isLoading`, `execute`, and `clearError`.\n\n3. **Refactored `LoginPage`** - The page component now imports and composes both hooks, acting purely as a thin orchestration layer that connects UI to hook logic. All `data-testid` attributes, CSS classes, and DOM structure remain identical to preserve existing E2E test compatibility.\n\n## Files Created\n\n- `features/next-app/hooks/login/useLoginForm.ts` - Form state management hook\n- `features/next-app/hooks/apis/useLogin.ts` - Login API integration hook\n\n## Files Modified\n\n- `features/next-app/app/login/page.tsx` - Refactored to compose `useLoginForm` + `useLogin`\n\n## Boilerplate Scripts\n\nNo `generate.mjs` scripts were run. The coding-rules scripts directory (`.claude/try-claude/references/coding-rules/scripts/`) does not exist in this project (init-try not run), so hooks were implemented manually per the skill guide fallback.\n\n## Coding Rules References Consulted\n\n- Skill guide `SKILL.md` folder structure convention: `{hooksRoot}/apis/` for API hooks, `{hooksRoot}/{feature}/` for page-specific hooks\n- No `.claude/try-claude/references/coding-rules/` directory was found, so no additional coding rules were consulted\n\n## Verification\n\n- TypeScript type check (`tsc --noEmit`): No errors in created/modified files (pre-existing errors in unrelated test files only)\n- All `data-testid` attributes preserved for E2E compatibility\n"}], "login-hook-composition-without_skill": [{"name": "page.tsx", "type": "text", "content": "\"use client\";\n\nimport Link from \"next/link\";\nimport { useLoginForm } from \"@/hooks/useLoginForm\";\nimport { useLogin } from \"@/hooks/useLogin\";\n\nexport default function LoginPage() {\n  const {\n    email,\n    password,\n    errors,\n    setEmail,\n    setPassword,\n    validateField,\n    validateAll,\n  } = useLoginForm();\n\n  const { generalError, handleLogin, clearError } = useLogin();\n\n  const handleSubmit = (e: React.FormEvent) => {\n    e.preventDefault();\n    clearError();\n    if (!validateAll()) return;\n    handleLogin(email, password);\n  };\n\n  return (\n    <div className=\"mx-auto mt-20 max-w-md\">\n      <h1 className=\"mb-8 text-2xl font-bold text-zinc-900 dark:text-zinc-50\">로그인</h1>\n\n      {generalError && (\n        <div className=\"mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800\" data-testid=\"login-error\">\n          {generalError}\n        </div>\n      )}\n\n      <form onSubmit={handleSubmit} className=\"space-y-4\">\n        <div>\n          <label htmlFor=\"email\" className=\"mb-1 block text-sm font-medium text-zinc-700 dark:text-zinc-300\">이메일</label>\n          <input\n            id=\"email\"\n            type=\"email\"\n            value={email}\n            onChange={(e) => setEmail(e.target.value)}\n            onBlur={() => validateField(\"email\")}\n            className=\"w-full rounded-lg border border-zinc-300 px-4 py-2 text-sm focus:border-blue-500 focus:outline-none dark:border-zinc-700 dark:bg-zinc-900 dark:text-zinc-50\"\n            data-testid=\"login-email\"\n          />\n          {errors.email && <p className=\"mt-1 text-xs text-red-600\" data-testid=\"email-error\">{errors.email}</p>}\n        </div>\n\n        <div>\n          <label htmlFor=\"password\" className=\"mb-1 block text-sm font-medium text-zinc-700 dark:text-zinc-300\">비밀번호</label>\n          <input\n            id=\"password\"\n            type=\"password\"\n            value={password}\n            onChange={(e) => setPassword(e.target.value)}\n            onBlur={() => validateField(\"password\")}\n            className=\"w-full rounded-lg border border-zinc-300 px-4 py-2 text-sm focus:border-blue-500 focus:outline-none dark:border-zinc-700 dark:bg-zinc-900 dark:text-zinc-50\"\n            data-testid=\"login-password\"\n          />\n          {errors.password && <p className=\"mt-1 text-xs text-red-600\" data-testid=\"password-error\">{errors.password}</p>}\n        </div>\n\n        <button\n          type=\"submit\"\n          className=\"w-full rounded-lg bg-blue-600 py-2 text-sm font-medium text-white hover:bg-blue-700\"\n          data-testid=\"login-submit\"\n        >\n          로그인\n        </button>\n      </form>\n\n      <p className=\"mt-4 text-center text-sm text-zinc-500\">\n        계정이 없으신가요?{\" \"}\n        <Link href=\"/signup\" className=\"text-blue-600 hover:text-blue-800\">회원가입</Link>\n      </p>\n    </div>\n  );\n}\n"}, {"name": "summary.md", "type": "text", "content": "# Login Hook Composition - Summary\n\n## What was done\n\nThe login page (`features/next-app/app/login/page.tsx`) was refactored by extracting its logic into two custom hooks and recomposing them in the page component.\n\n### 1. `useLoginForm` hook — Form state and validation\n\nExtracts all form-related state and validation logic:\n\n- `email` / `password` state with setters\n- `errors` record for field-level validation messages\n- `validateField(field)` — validates a single field (used on blur)\n- `validateAll()` — validates all fields at once, returns `true` if valid\n- `resetErrors()` — clears all field errors\n\nUses `@/lib/validators` (`validateEmail`, `validatePassword`) for validation rules, matching the original behavior.\n\n### 2. `useLogin` hook — Login API call\n\nEncapsulates the authentication call and navigation:\n\n- `generalError` — server/auth-level error message (e.g., wrong password)\n- `handleLogin(email, password)` — calls `useAuth().login()`, navigates to `/dashboard` on success\n- `clearError()` — resets the general error\n\n### 3. Refactored `page.tsx` — Composition\n\nThe page component now composes both hooks and wires them together in `handleSubmit`:\n\n1. Clears any previous general error\n2. Runs form validation via `validateAll()`\n3. If valid, calls `handleLogin(email, password)`\n\nAll `data-testid` attributes, CSS classes, and UI structure are preserved identically.\n\n## Files created\n\n| File | Description | Target path in app |\n|------|-------------|--------------------|\n| `useLoginForm.ts` | Form state & validation hook | `features/next-app/hooks/useLoginForm.ts` |\n| `useLogin.ts` | Login API hook | `features/next-app/hooks/useLogin.ts` |\n| `page.tsx` | Refactored login page | `features/next-app/app/login/page.tsx` |\n| `summary.md` | This summary | — |\n\n## Output file paths\n\n- `evals/frontend-dev-workspace/iteration-4/login-hook-composition/without_skill/outputs/useLoginForm.ts`\n- `evals/frontend-dev-workspace/iteration-4/login-hook-composition/without_skill/outputs/useLogin.ts`\n- `evals/frontend-dev-workspace/iteration-4/login-hook-composition/without_skill/outputs/page.tsx`\n- `evals/frontend-dev-workspace/iteration-4/login-hook-composition/without_skill/outputs/summary.md`\n"}, {"name": "useLogin.ts", "type": "text", "content": "\"use client\";\n\nimport { useState, useCallback } from \"react\";\nimport { useRouter } from \"next/navigation\";\nimport { useAuth } from \"@/contexts/AuthContext\";\n\ninterface UseLoginReturn {\n  generalError: string | null;\n  handleLogin: (email: string, password: string) => void;\n  clearError: () => void;\n}\n\nexport function useLogin(): UseLoginReturn {\n  const { login } = useAuth();\n  const router = useRouter();\n  const [generalError, setGeneralError] = useState<string | null>(null);\n\n  const handleLogin = useCallback(\n    (email: string, password: string) => {\n      setGeneralError(null);\n      const err = login(email, password);\n      if (err) {\n        setGeneralError(err);\n      } else {\n        router.push(\"/dashboard\");\n      }\n    },\n    [login, router]\n  );\n\n  const clearError = useCallback(() => {\n    setGeneralError(null);\n  }, []);\n\n  return {\n    generalError,\n    handleLogin,\n    clearError,\n  };\n}\n"}, {"name": "useLoginForm.ts", "type": "text", "content": "\"use client\";\n\nimport { useState, useCallback } from \"react\";\nimport { validateEmail, validatePassword } from \"@/lib/validators\";\n\ninterface UseLoginFormReturn {\n  email: string;\n  password: string;\n  errors: Record<string, string>;\n  setEmail: (value: string) => void;\n  setPassword: (value: string) => void;\n  validateField: (field: \"email\" | \"password\") => void;\n  validateAll: () => boolean;\n  resetErrors: () => void;\n}\n\nexport function useLoginForm(): UseLoginFormReturn {\n  const [email, setEmail] = useState(\"\");\n  const [password, setPassword] = useState(\"\");\n  const [errors, setErrors] = useState<Record<string, string>>({});\n\n  const validateField = useCallback(\n    (field: \"email\" | \"passwo     // ---- State ----
    let feedbackMap = {};  // run_id -> feedback text
    let currentIndex = 0;
    let visitedRuns = new Set();

    // ---- Init ----
    async function init() {
      // Load saved feedback from server — but only if this isn't a fresh
      // iteration (indicated by previous_feedback being present). When
      // previous feedback exists, the feedback.json on disk is stale from
      // the prior iteration and should not pre-fill the textareas.
      const hasPrevious = Object.keys(EMBEDDED_DATA.previous_feedback || {}).length > 0
        || Object.keys(EMBEDDED_DATA.previous_outputs || {}).length > 0;
      if (!hasPrevious) {
        try {
          const resp = await fetch("/api/feedback");
          const data = await resp.json();
          if (data.reviews) {
            for (const r of data.reviews) feedbackMap[r.run_id] = r.feedback;
          }
        } catch { /* first run, no feedback yet */ }
      }

      document.getElementById("skill-name").textContent = EMBEDDED_DATA.skill_name;
      showRun(0);

      // Wire up feedback auto-save
      const textarea = document.getElementById("feedback");
      let saveTimeout = null;
      textarea.addEventListener("input", () => {
        clearTimeout(saveTimeout);
        document.getElementById("feedback-status").textContent = "";
        saveTimeout = setTimeout(() => saveCurrentFeedback(), 800);
      });
    }

    // ---- Navigation ----
    function navigate(delta) {
      const newIndex = currentIndex + delta;
      if (newIndex >= 0 && newIndex < EMBEDDED_DATA.runs.length) {
        saveCurrentFeedback();
        showRun(newIndex);
      }
    }

    function updateNavButtons() {
      document.getElementById("prev-btn").disabled = currentIndex === 0;
      document.getElementById("next-btn").disabled =
        currentIndex === EMBEDDED_DATA.runs.length - 1;
    }

    // ---- Show a run ----
    function showRun(index) {
      currentIndex = index;
      const run = EMBEDDED_DATA.runs[index];

      // Progress
      document.getElementById("progress").textContent =
        `${index + 1} of ${EMBEDDED_DATA.runs.length}`;

      // Prompt
      document.getElementById("prompt-text").textContent = run.prompt;

      // Config badge
      const badge = document.getElementById("config-badge");
      const configMatch = run.id.match(/(with_skill|without_skill|new_skill|old_skill)/);
      if (configMatch) {
        const config = configMatch[1];
        const isBaseline = config === "without_skill" || config === "old_skill";
        badge.textContent = config.replace(/_/g, " ");
        badge.className = "config-badge " + (isBaseline ? "config-baseline" : "config-primary");
        badge.style.display = "inline-block";
      } else {
        badge.style.display = "none";
      }

      // Outputs
      renderOutputs(run);

      // Previous outputs
      renderPrevOutputs(run);

      // Grades
      renderGrades(run);

      // Previous feedback
      const prevFb = (EMBEDDED_DATA.previous_feedback || {})[run.id];
      const prevEl = document.getElementById("prev-feedback");
      if (prevFb) {
        document.getElementById("prev-feedback-text").textContent = prevFb;
        prevEl.style.display = "block";
      } else {
        prevEl.style.display = "none";
      }

      // Feedback
      document.getElementById("feedback").value = feedbackMap[run.id] || "";
      document.getElementById("feedback-status").textContent = "";

      updateNavButtons();

      // Track visited runs and promote done button when all visited
      visitedRuns.add(index);
      const doneBtn = document.getElementById("done-btn");
      if (visitedRuns.size >= EMBEDDED_DATA.runs.length) {
        doneBtn.classList.add("ready");
      }

      // Scroll main content to top
      document.querySelector(".main").scrollTop = 0;

    function renderOutputs(run) {
      const container = document.getElementById("outputs-body");

      const outputs = run.outputs || [];
      if (outputs.length === 0) {
        container.innerHTML = '<div class="empty-state">출력 파일 없음</div>';

        if (file.type === "text") {
          const pre = document.createElement("pre");

          content.appendChild(pre);
        } else if (file.type === "image") {
          const img = document.createElement("img");

          const a = document.createElement("a");
          a.className = "download-link";

          content.appendChild(a);
        } else if (file.type === "error") {
          const pre = document.createElement("pre");
          pre.textContent = file.content;
          pre.style.color = "var(--red)";
          content.appendChild(pre);
        }

        fileDiv.appendChild(content);
        container.appendChild(fileDiv);
      }

    // ---- XLSX rendering via SheetJS ----
    function renderXlsx(container, b64Data) {
      try {
        const raw = Uint8Array.from(atob(b64Data), c => c.charCodeAt(0));
        const wb = XLSX.read(raw, { type: "array" });

        for (let i = 0; i < wb.SheetNames.length; i++) {
          const sheetName = wb.SheetNames[i];
          const ws = wb.Sheets[sheetName];

          if (wb.SheetNames.length > 1) {
            const sheetLabel = document.createElement("div");
            sheetLabel.style.cssText =
              "font-weight:600; font-size:0.8rem; color:#b0aea5; margin-top:0.5rem; margin-bottom:0.25rem;";
            sheetLabel.textContent = "시트: " + sheetName;
            container.appendChild(sheetLabel);
          }

          const htmlStr = XLSX.utils.sheet_to_html(ws, { editable: false });
          const wrapper = document.createElement("div");
          wrapper.innerHTML = htmlStr;
          container.appendChild(wrapper);
        }
      } catch (err) {
        container.textContent = "스프레드시트 렌더링 오류: " + err.message;
      }
    }

      let html = '<div style="padding: 1rem;">';

        ? Math.round(summary.pass_rate * 100) + "%"
        : "?";
      const badgeClass = summary.pass_rate >= 0.8 ? "grade-pass" : summary.pass_rate >= 0.5 ? "" : "grade-fail";
      html += '<div class="grades-summary">';
      html += '<span class="grade-badge ' + badgeClass + '">' + passRate + '</span>';
      html += '<span>' + (summary.total || 0) + '개 중 ' + (summary.passed || 0) + '개 통과, ' + (summary.failed || 0) + '개 실패</span>';
      html += '</div>';

      // Assertions list
      html += '<ul class="assertion-list">';
      for (const exp of expectations) {
        const statusClass = exp.passed ? "pass" : "fail";
        const statusIcon = exp.passed ? "\u2713" : "\u2717";
        html += '<li class="assertion-item">';
        html += '<span class="assertion-status ' + statusClass + '">' + statusIcon + '</span>';
        html += '<span>' + escapeHtml(exp.text) + '</span>';
        if (exp.evidence) {
          html += '<div class="assertion-evidence">' + escapeHtml(exp.evidence) + '</div>';
        }
        html += '</li>';
      }
      html += '</ul>';

      html += '</div>';
      content.innerHTML = html;
    }
