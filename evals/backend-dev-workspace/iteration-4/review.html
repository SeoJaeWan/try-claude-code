<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>평가 리뷰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #141413;
      --text-muted: #b0aea5;
      --accent: #d97757;
      --accent-hover: #c4613f;
      --green: #788c5d;
      --green-bg: #eef2e8;
      --red: #c44;
      --red-bg: #fceaea;
      --header-bg: #141413;
      --header-text: #faf9f5;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .header .instructions {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    .header .progress {
      font-size: 0.875rem;
      opacity: 0.8;
      text-align: right;
    }

    /* ---- Main content ---- */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ---- Sections ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .section-header {
      font-family: 'Poppins', sans-serif;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .section-body {
      padding: 1rem;
    }

    /* ---- Config badge ---- */
    .config-badge {
      display: inline-block;
      padding: 0.2rem 0.625rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-left: 0.75rem;
      vertical-align: middle;
    }
    .config-badge.config-primary {
      background: rgba(33, 150, 243, 0.12);
      color: #1976d2;
    }
    .config-badge.config-baseline {
      background: rgba(255, 193, 7, 0.15);
      color: #f57f17;
    }

    /* ---- Prompt ---- */
    .prompt-text {
      white-space: pre-wrap;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    /* ---- Outputs ---- */
    .output-file {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .output-file + .output-file {
      margin-top: 1rem;
    }
    .output-file-header {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .output-file-header .dl-btn {
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      opacity: 0.8;
    }
    .output-file-header .dl-btn:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .output-file-content {
      padding: 0.75rem;
      overflow-x: auto;
    }
    .output-file-content pre {
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .output-file-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .output-file-content iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    .output-file-content table {
      border-collapse: collapse;
      font-size: 0.8125rem;
      width: 100%;
    }
    .output-file-content table td,
    .output-file-content table th {
      border: 1px solid var(--border);
      padding: 0.375rem 0.5rem;
      text-align: left;
    }
    .output-file-content table th {
      background: var(--bg);
      font-weight: 600;
    }
    .output-file-content .download-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .output-file-content .download-link:hover {
      background: var(--border);
    }
    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      padding: 2rem;
      text-align: center;
    }

    /* ---- Feedback ---- */
    .prev-feedback {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.625rem 0.75rem;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .prev-feedback-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
      color: var(--text-muted);
    }
    .feedback-textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9375rem;
      line-height: 1.5;
      resize: vertical;
      color: var(--text);
    }
    .feedback-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .feedback-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      min-height: 1.1em;
    }

    /* ---- Grades (collapsible) ---- */
    .grades-toggle {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .grades-toggle:hover {
      color: var(--accent);
    }
    .grades-toggle .arrow {
      margin-right: 0.5rem;
      transition: transform 0.15s;
      font-size: 0.75rem;
    }
    .grades-toggle .arrow.open {
      transform: rotate(90deg);
    }
    .grades-content {
      display: none;
      margin-top: 0.75rem;
    }
    .grades-content.open {
      display: block;
    }
    .grades-summary {
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .grade-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .grade-pass { background: var(--green-bg); color: var(--green); }
    .grade-fail { background: var(--red-bg); color: var(--red); }
    .assertion-list {
      list-style: none;
    }
    .assertion-item {
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .assertion-item:last-child { border-bottom: none; }
    .assertion-status {
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .assertion-status.pass { color: var(--green); }
    .assertion-status.fail { color: var(--red); }
    .assertion-evidence {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      padding-left: 1.5rem;
    }

    /* ---- View tabs ---- */
    .view-tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-tab {
      font-family: 'Poppins', sans-serif;
      padding: 0.625rem 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .view-panel { display: none; }
    .view-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* ---- Benchmark view ---- */
    .benchmark-view {
      padding: 1.5rem 2rem;
      overflow-y: auto;
      flex: 1;
    }
    .benchmark-table {
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .benchmark-table th, .benchmark-table td {
      padding: 0.625rem 0.75rem;
      text-align: left;
      border: 1px solid var(--border);
    }
    .benchmark-table th {
      font-family: 'Poppins', sans-serif;
      background: var(--header-bg);
      color: var(--header-text);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .benchmark-table tr:hover { background: var(--bg); }
    .benchmark-table tr.benchmark-row-with { background: rgba(33, 150, 243, 0.06); }
    .benchmark-table tr.benchmark-row-without { background: rgba(255, 193, 7, 0.06); }
    .benchmark-table tr.benchmark-row-with:hover { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-without:hover { background: rgba(255, 193, 7, 0.12); }
    .benchmark-table tr.benchmark-row-avg { font-weight: 600; border-top: 2px solid var(--border); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-with { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-without { background: rgba(255, 193, 7, 0.12); }
    .benchmark-delta-positive { color: var(--green); font-weight: 600; }
    .benchmark-delta-negative { color: var(--red); font-weight: 600; }
    .benchmark-notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .benchmark-notes h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }
    .benchmark-notes ul {
      list-style: disc;
      padding-left: 1.25rem;
    }
    .benchmark-notes li {
      font-size: 0.8125rem;
      line-height: 1.6;
      margin-bottom: 0.375rem;
    }
    .benchmark-empty {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      padding: 3rem;
    }

    /* ---- Navigation ---- */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .nav-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      transition: all 0.15s;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .done-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .done-btn:hover {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .done-btn.ready {
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .done-btn.ready:hover {
      background: var(--accent-hover);
    }
    /* ---- Done overlay ---- */
    .done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .done-overlay.visible {
      display: flex;
    }
    .done-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
    }
    .done-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .done-card p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .done-card .btn-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .done-card button {
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
    }
    .done-card button:hover {
      background: var(--bg);
    }
    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--header-bg);
      color: var(--header-text);
      padding: 0.625rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app" style="height:100vh; display:flex; flex-direction:column;">
    <div class="header">
      <div>
        <h1>평가 리뷰: <span id="skill-name"></span></h1>
        <div class="instructions">각 출력을 검토하고 아래에 피드백을 남겨주세요. 화살표 키 또는 버튼으로 이동할 수 있습니다. 완료되면 피드백을 복사하여 Claude Code에 붙여넣으세요.</div>
      </div>
      <div class="progress" id="progress"></div>
    </div>

    <!-- View tabs (only shown when benchmark data exists) -->
    <div class="view-tabs" id="view-tabs" style="display:none;">
      <button class="view-tab active" onclick="switchView('outputs')">출력 결과</button>
      <button class="view-tab" onclick="switchView('benchmark')">벤치마크</button>
    </div>

    <!-- Outputs panel (qualitative review) -->
    <div class="view-panel active" id="panel-outputs">
    <div class="main">
      <!-- Prompt -->
      <div class="section">
        <div class="section-header">프롬프트 <span class="config-badge" id="config-badge" style="display:none;"></span></div>
        <div class="section-body">
          <div class="prompt-text" id="prompt-text"></div>
        </div>
      </div>

      <!-- Outputs -->
      <div class="section">
        <div class="section-header">출력</div>
        <div class="section-body" id="outputs-body">
          <div class="empty-state">출력 파일을 찾을 수 없습니다</div>
        </div>
      </div>

      <!-- Previous Output (collapsible) -->
      <div class="section" id="prev-outputs-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="togglePrevOutputs()">
            <span class="arrow" id="prev-outputs-arrow">&#9654;</span>
            이전 출력
          </div>
        </div>
        <div class="grades-content" id="prev-outputs-content"></div>
      </div>

      <!-- Grades (collapsible) -->
      <div class="section" id="grades-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="toggleGrades()">
            <span class="arrow" id="grades-arrow">&#9654;</span>
            평가 등급
          </div>
        </div>
        <div class="grades-content" id="grades-content"></div>
      </div>

      <!-- Feedback -->
      <div class="section">
        <div class="section-header">피드백</div>
        <div class="section-body">
          <textarea
            class="feedback-textarea"
            id="feedback"
            placeholder="이 출력에 대해 어떻게 생각하시나요? 문제점, 제안사항, 또는 잘된 점이 있나요?"
          ></textarea>
          <div class="feedback-status" id="feedback-status"></div>
          <div class="prev-feedback" id="prev-feedback" style="display:none;">
            <div class="prev-feedback-label">이전 피드백</div>
            <div id="prev-feedback-text"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="nav" id="outputs-nav">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&#8592; 이전</button>
      <button class="done-btn" id="done-btn" onclick="showDoneDialog()">모든 리뷰 제출</button>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">다음 &#8594;</button>
    </div>
    </div><!-- end panel-outputs -->

    <!-- Benchmark panel (quantitative stats) -->
    <div class="view-panel" id="panel-benchmark">
      <div class="benchmark-view" id="benchmark-content">
        <div class="benchmark-empty">벤치마크 데이터가 없습니다. 벤치마크를 실행하면 여기에 정량적 결과가 표시됩니다.</div>
      </div>
    </div>
  </div>

  <!-- Done overlay -->
  <div class="done-overlay" id="done-overlay">
    <div class="done-card">
      <h2>리뷰 완료</h2>
      <p>피드백이 저장되었습니다. Claude Code 세션으로 돌아가서 리뷰가 끝났다고 알려주세요.</p>
      <div class="btn-row">
        <button onclick="closeDoneDialog()">확인</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>

    const EMBEDDED_DATA = {"skill_name": "backend-dev", "runs": [{"id": "profile-summary-api-with_skill", "prompt": "plans/sample-backend-profile-summary-api/plan.md의 Phase 1을 실행해줘. AppService에 buildProfileSummary를 추가하고 GET /profile-summary 엔드포인트 연결해줘", "eval_id": 1, "outputs": [{"name": "app.controller.ts", "type": "text", "content": "import { Controller, Get } from '@nestjs/common';\nimport { AppService } from './app.service';\n\n@Controller()\nexport class AppController {\n  constructor(private readonly appService: AppService) {}\n\n  @Get()\n  getHello(): string {\n    return this.appService.getHello();\n  }\n\n  @Get('profile-summary')\n  getProfileSummary() {\n    return this.appService.getProfileSummary();\n  }\n}\n"}, {"name": "app.service.ts", "type": "text", "content": "import { Injectable } from '@nestjs/common';\n\ninterface RawProfileSummary {\n  userName?: string;\n  pendingTodos?: number | null;\n  completedTodos?: number | null;\n  unreadNotifications?: number | null;\n}\n\nexport interface ProfileSummary {\n  userName: string;\n  pendingTodos: number;\n  completedTodos: number;\n  unreadNotifications: number;\n}\n\n@Injectable()\nexport class AppService {\n  private static readonly DEFAULT_SEED: RawProfileSummary = {\n    userName: '테스트유저',\n    pendingTodos: 0,\n    completedTodos: 0,\n    unreadNotifications: 0,\n  };\n\n  getHello(): string {\n    return 'Hello World!';\n  }\n\n  buildProfileSummary(raw?: RawProfileSummary): ProfileSummary {\n    const seed = raw ?? {};\n    return {\n      userName: seed.userName ?? '테스트유저',\n      pendingTodos: this.normalizeCount(seed.pendingTodos),\n      completedTodos: this.normalizeCount(seed.completedTodos),\n      unreadNotifications: this.normalizeCount(seed.unreadNotifications),\n    };\n  }\n\n  getProfileSummary(): ProfileSummary {\n    return this.buildProfileSummary(AppService.DEFAULT_SEED);\n  }\n\n  private normalizeCount(value?: number | null): number {\n    if (value == null || value < 0) {\n ng;\n  quantity: number;\n  price: number;\n}\n"}, {"name": "order.interface.ts", "type": "text", "content": "export interface OrderItem {\n  productName: string;\n  quantity: number;\n  price: number;\n}\n\nexport interface Order {\n  id: string;\n  customerName: string;\n  items: OrderItem[];\n  totalAmount: number;\n  status: 'pending' | 'confirmed' | 'shipped' | 'delivered' | 'cancelled';\n  createdAt: Date;\n  updatedAt: Date;\n}\n"}, {"name": "orders.controller.spec.ts", "type": "text", "content": "import { Test, TestingModule } from '@nestjs/testing';\nimport { NotFoundException } from '@nestjs/common';\nimport { OrdersController } from './orders.controller';\nimport { OrdersService } from './orders.service';\nimport { CreateOrderDto } from './dto/create-order.dto';\n\ndescribe('OrdersController', () => {\n  let controller: OrdersController;\n\n  beforeEach(async () => {\n    const module: TestingModule = await Test.createTestingModule({\n      controllers: [OrdersController],\n      providers: [OrdersService],\n    }).compile();\n\n    controller = module.get<OrdersController>(OrdersController);\n  });\n\n  it('should be defined', () => {\n    expect(controller).toBeDefined();\n  });\n\n  describe('create', () => {\n    it('should create an order', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'John Doe',\n        items: [{ productName: 'Widget', quantity: 2, price: 10 }],\n      };\n      const result = controller.create(dto);\n      expect(result.customerName).toBe('John Doe');\n      expect(result.totalAmount).toBe(20);\n      expect(result.status).toBe('pending');\n      expect(result.id).toBeDefined();\n    });\n  });\n\n  describe('findAll', () => {\n    it('should return an array of orders', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'Jane Doe',\n        items: [{ productName: 'Gadget', quantity: 1, price: 50 }],\n      };\n      controller.create(dto);\n      const result = controller.findAll();\n      expect(result).toHaveLength(1);\n    });\n  });\n\n  describe('findOne', () => {\n    it('should return a single order', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'Jane Doe',\n        items: [{ productName: 'Gadget', quantity: 1, price: 50 }],\n      };\n      const created = controller.create(dto);\n      const result = controller.findOne(created.id);\n      expect(result.id).toBe(created.id);\n    });\n\n    it('should throw NotFoundException for non-existent order', () => {\n      expect(() => controller.findOne('non-existent')).toThrow(\n        NotFoundException,\n      );\n    });\n  });\n\n  describe('update', () => {\n    it('should update an order', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'Jane Doe',\n        items: [{ productName: 'Gadget', quantity: 1, price: 50 }],\n      };\n      const created = controller.create(dto);\n      const result = controller.update(created.id, { status: 'confirmed' });\n      expect(result.status).toBe('confirmed');\n    });\n  });\n\n  describe('remove', () => {\n    it('should remove an order', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'Jane Doe',\n        items: [{ productName: 'Gadget', quantity: 1, price: 50 }],\n      };\n      const created = controller.create(dto);\n      controller.remove(created.id);\n      expect(controller.findAll()).toHaveLength(0);\n    });\n\n    it('should throw NotFoundException for non-existent order', () => {\n      expect(() => controller.remove('non-existent')).toThrow(\n        NotFoundException,\n      );\n    });\n  });\n});\n"}, {"name": "orders.controller.ts", "type": "text", "content": "import {\n  Body,\n  Controller,\n  Delete,\n  Get,\n  HttpCode,\n  HttpStatus,\n  Param,\n  Patch,\n  Post,\n} from '@nestjs/common';\nimport { CreateOrderDto } from './dto/create-order.dto';\nimport { UpdateOrderDto } from './dto/update-order.dto';\nimport { Order } from './interfaces/order.interface';\nimport { OrdersSe  pendingTodos: this.normalizeCount(seed.pendingTodos),\n      completedTodos: this.normalizeCount(seed.completedTodos),\n      unreadNotifications: this.normalizeCount(seed.unreadNotifications),\n    };\n  }\n\n  getProfileSummary(): ProfileSummary {\n    return this.buildProfileSummary(this.defaultSeed);\n  }\n\n  private normalizeCount(value: number | null | undefined): number {\n    if (value == null || value < 0) {\n      return 0;\n    }\n    return Math.floor(value);\n  }\n}\n"}, {"name": "profile-summary.controller.spec.ts", "type": "text", "content": "import { Test, TestingModule } from '@nestjs/testing';\nimport { AppController } from './app.controller';\nimport { AppService } from './app.service';\n\ntype ProfileSummary = {\n  userName: string;\n  pendingTodos: number;\n  completedTodos: number;\n  unreadNotifications: number;\n};\n\ndescribe('프로필 요약 컨트롤러 계획 계약', () => {\n  let controller: AppController & {\n    getProfileSummary: () => ProfileSummary;\n  };\n  let service: { getProfileSummary: jest.Mock<ProfileSummary, []> };\n\n  beforeEach(async () => {\n    service = {\n      getProfileSummary: jest.fn<ProfileSummary, []>(),\n    };\n\n    const module: TestingModule = await Test.createTestingModule({\n      controllers: [AppController],\n      providers: [{ provide: AppService, useValue: service }],\n    }).compile();\n\n    controller = module.get(AppController);\n  });\n\n  it('[C-PROFILE-003] 컨트롤러는 서비스 응답을 래핑 없이 그대로 반환한다', () => {\n    // Arrange\n    service.getProfileSummary.mockReturnValue({\n      userName: '테스트유저',\n      pendingTodos: 2,\n      completedTodos: 1,\n      unreadNotifications: 3,\n    });\n\n    // Act\n    const result = controller.getProfileSummary();\n\n    // Assert\n    expect(service.getProfileSummary).toHaveBeenCalledTimes(1);\n    expect(result).toEqual({\n      userName: '테스트유저',\n      pendingTodos: 2,\n      completedTodos: 1,\n      unreadNotifications: 3,\n    });\n  });\n\n  it('[C-PROFILE-003][C-PROFILE-004] 정규화된 0-count 응답도 그대로 전달한다', () => {\n    // Arrange\n    service.getProfileSummary.mockReturnValue({\n      userName: '테스트유저',\n      pendingTodos: 0,\n      completedTodos: 0,\n      unreadNotifications: 0,\n    });\n\n    // Act\n    const result = controller.getProfileSummary();\n\n    // Assert\n    expect(result).toEqual({\n      userName: '테스트유저',\n      pendingTodos: 0,\n      completedTodos: 0,\n      unreadNotifications: 0,\n    });\n  });\n});\n"}, {"name": "profile-summary.service.spec.ts", "type": "text", "content": "import { AppService } from './app.service';\n\ntype RawProfileSummary = {\n  userName?: string;\n  pendingTodos?: number | null;\n  completedTodos?: number | null;\n  unreadNotifications?: number | null;\n};\n\ntype ProfileSummary = {\n  userName: string;\n  pendingTodos: number;\n  completedTodos: number;\n  unreadNotifications: number;\n};\n\ndescribe('프로필 요약 서비스 계획 계약', () => {\n  let service: AppService & {\n    buildProfileSummary: (raw?: RawProfileSummary) => ProfileSummary;\n  };\n\n  beforeEach(() => {\n    service = new AppService() as AppService & {\n      buildProfileSummary: (raw?: RawProfileSummary) => ProfileSummary;\n    };\n  });\n\n  it('[C-PROFILE-001] 정상 seed를 profile summary 응답 구조로 변환한다', () => {\n    // Arrange\n    const raw: RawProfileSummary = {\n      userName: '테스트유저',\n      pendingTodos: 2,\n      completedTodos: 1,\n      unreadNotifications: 3,\n    };\n\n    // Act\n    const result = service.buildProfileSummary(raw);\n\n    // Assert\n    expect(result).toEqual({\n      userName: '테스트유저',\n      pendingTodos: 2,\n      completedTodos: 1,\n      unreadNotifications: 3,\n    });\n  });\n\n  it('[C-PROFILE-002][C-PROFILE-004] 누락되거나 잘못된 숫자 seed는 0으로 정규화한다', () => {\n    // Arrange\n    const raw: RawProfileSummary = {\n      userName: '테스트유저',\n      pendingTodos: null,\n      completedTodos: -2,\n      unreadNotifications: undefined,\n    };\n\n    // Act\n    const result = service.buildProfileSummary(raw);\n\n    // Assert\n    expect(result).toEqual({\n      userName: '테스트유저',\n      pendingTodos: 0,\n      completedTodos: 0,\n      unreadNotifications: 0,\n    });\n  });\n\n  it('[C-PROFILE-004] 빈 입력도 음수가 아닌 정수 응답으로 수렴한다', () => {\n    // Arrange\n\n    // Act\n    const result = service.buildProfileSummary();\n\n    // Assert\n    expect(result.pendingTodos).toBe(0);\n    expect(result.completedTodos).toBe(0);\n    expect(result.unreadNotifications).toBe(0);\n    expect(Number.isInteger(result.pendingTodos)).toBe(true);\n    expect(Number.isInteger(result.completedTodos)).toBe(true);\n    expect(Number.isInteger(result.unreadNotifications)).toBe(true);\n  });\n});\n"}], "orders-crud-with_skill": [{"name": "app.module.ts", "type": "text", "content": "import { Module } from '@nestjs/common';\nimport { AppController } from './app.controller';\nimport { AppService } from './app.service';\nimport { AuthModule } from './auth/auth.module';\nimport { OrdersModule } from './orders/orders.module';\n\n@Module({\n  imports: [AuthModule, OrdersModule],\n  controllers: [AppController],\n  providers: [AppService],\n})\nexport class AppModule {}\n"}, {"name": "create-order.dto.ts", "type": "text", "content": "import {\n  IsString,\n  IsNotEmpty,\n  IsArray,\n  ValidateNested,\n  IsNumber,\n  Min,\n  ArrayMinSize,\n} from 'class-validator';\nimport { Type } from 'class-transformer';\n\nexport class OrderItemDto {\n  @IsString()\n  @IsNotEmpty()\n  productName: string;\n\n  @IsNumber()\n  @Min(1)\n  quantity: number;\n\n  @IsNumber()\n  @Min(0)\n  price: number;\n}\n\nexport class CreateOrderDto {\n  @IsString()\n  @IsNotEmpty()\n  customerName: string;\n\n  @IsArray()\n  @ArrayMinSize(1)\n  @ValidateNested({ each: true })\n  @Type(() => OrderItemDto)\n  items: OrderItemDto[];\n}\n"}, {"name": "order.interface.ts", "type": "text", "content": "export interface OrderItem {\n  productName: string;\n  quantity: number;\n  price: number;\n}\n\nexport interface Order {\n  id: string;\n  customerName: string;\n  items: OrderItem[];\n  totalAmount: number;\n  status: 'pending' | 'confirmed' | 'shipped' | 'delivered' | 'cancelled';\n  createdAt: Date;\n  updatedAt: Date;\n}\n"}, {"name": "orders.controller.spec.ts", "type": "text", "content": "import { Test, TestingModule } from '@nestjs/testing';\nimport { NotFoundException } from '@nestjs/common';\nimport { OrdersController } from './orders.controller';\nimport { OrdersService } from './orders.service';\nimport { CreateOrderDto } from './dto/create-order.dto';\n\ndescribe('OrdersController', () => {\n  let controller: OrdersController;\n\n  beforeEach(async () => {\n    const module: TestingModule = await Test.createTestingModule({\n      controllers: [OrdersController],\n      providers: [OrdersService],\n    }).compile();\n\n    controller = module.get<OrdersController>(OrdersController);\n  });\n\n  it('should be defined', () => {\n    expect(controller).toBeDefined();\n  });\n\n  describe('create', () => {\n    it('should create an order', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'John Doe',\n        items: [{ productName: 'Widget', quantity: 2, price: 10 }],\n      };\n      const result = controller.create(dto);\n      expect(result.customerName).toBe('John Doe');\n      expect(result.totalAmount).toBe(20);\n      expect(result.status).toBe('pending');\n      expect(result.id).toBeDefined();\n    });\n  });\n\n  describe('findAll', () => {\n    it('should return an array of orders', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'Jane Doe',\n        items: [{ productName: 'Gadget', quantity: 1, price: 50 }],\n      };\n      controller.create(dto);\n      const result = controller.findAll();\n      expect(result).toHaveLength(1);\n    });\n  });\n\n  describe('findOne', () => {\n    it('should return a single order', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'Jane Doe',\n        items: [{ productName: 'Gadget', quantity: 1, price: 50 }],\n      };\n      const created = controller.create(dto);\n      const result = controller.findOne(created.id);\n      expect(result.id).toBe(created.id);\n    });\n\n    it('should throw NotFoundException for non-existent order', () => {\n      expect(() => controller.findOne('non-existent')).toThrow(\n        NotFoundException,\n      );\n    });\n  });\n\n  describe('update', () => {\n    it('should update an order', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'Jane Doe',\n        items: [{ productName: 'Gadget', quantity: 1, price: 50 }],\n      };\n      const created = controller.create(dto);\n      const result = controller.update(created.id, { status: 'confirmed' });\n      expect(result.status).toBe('confirmed');\n    });\n  });\n\n  describe('remove', () => {\n    it('should remove an order', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'Jane Doe',\n        items: [{ productName: 'Gadget', quantity: 1, price: 50 }],\n      };\n      const created = controller.create(dto);\n      controller.remove(created.id);\n      expect(controller.findAll()).toHaveLength(0);\n    });\n\n    it('should throw NotFoundException for non-existent order', () => {\n      expect(() => controller.remove('non-existent')).toThrow(\n        NotFoundException,\n      );\n    });\n  });\n});\n"}, {"name": "orders.controller.ts", "type": "text", "content": "import {\n  Body,\n  Controller,\n  Delete,\n  Get,\n  HttpCode,\n  HttpStatus,\n  Param,\n  Patch,\n  Post,\n} from '@nestjs/common';\nimport { CreateOrderDto } from './dto/create-order.dto';\nimport { UpdateOrderDto } from './dto/update-order.dto';\nimport { Order } from './interfaces/order.interface';\nimport { OrdersService } from './orders.service';\n\n@Controller('orders')\nexport class OrdersController {\n  constructor(private readonly ordersService: OrdersService) {}\n\n  @Post()\n  create(@Body() createOrderDto: CreateOrderDto): Order {\n    return this.ordersService.create(createOrderDto);\n  }\n\n  @Get()\n  findAll(): Order[] {\n    return this.ordersService.findAll();\n  }\n\n  @Get(':id')\n  findOne(@Param('id') id: string): Order {\n    return this.ordersService.findOne(id);\n  }\n\n  @Patch(':id')\n  update(\n    @Param('id') id: string,\n    @Body() updateOrderDto: UpdateOrderDto,\n  ): Order {\n    return this.ordersService.update(id, updateOrderDto);\n  }\n\n  @Delete(':id')\n  @HttpCode(HttpStatus.NO_CONTENT)\n  remove(@Param('id') id: string): void {\n    this.ordersService.remove(id);\n  }\n}\n"}, {"name": "orders.module.ts", "type": "text", "content": "import { Module } from '@nestjs/common';\nimport { OrdersController } from './orders.controller';\nimport { OrdersService } from './orders.service';\n\n@Module({\n  controllers: [OrdersController],\n  providers: [OrdersService],\n  exports: [OrdersService],\n})\nexport class OrdersModule {}\n"}, {"name": "orders.service.spec.ts", "type": "text", "content": "import { NotFoundException } from '@nestjs/common';\nimport { Test, TestingModule } from '@nestjs/testing';\nimport { OrdersService } from './orders.service';\nimport { CreateOrderDto } from './dto/create-order.dto';\n\ndescribe('OrdersService', () => {\n  let service: OrdersService;\n\n  beforeEach(async () => {\n    const module: TestingModule = await Test.createTestingModule({\n      providers: [OrdersService],\n    }).compile();\n\n    service = module.get<OrdersService>(OrdersService);\n  });\n\n  it('should be defined', () => {\n    expect(service).toBeDefined();\n  });\n\n  describe('create', () => {\n    it('should create an order with calculated total', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'Test User',\n        items: [\n          { productName: 'Item A', quantity: 2, price: 15 },\n          { productName: 'Item B', quantity: 1, price: 30 },\n        ],\n      };\n      const order = service.create(dto);\n      expect(order.id).toBeDefined();\n      expect(order.customerName).toBe('Test User');\n      expect(order.totalAmount).toBe(60);\n      expect(order.status).toBe('pending');\n      expect(order.items).toHaveLength(2);\n    });\n  });\n\n  describe('findAll', () => {\n    it('should return empty array initially', () => {\n      expect(service.findAll()).toEqual([]);\n    });\n\n    it('should return all created orders', () => {\n      service.create({\n        customerName: 'A',\n        items: [{ productName: 'X', quantity: 1, price: 10 }],\n      });\n      service.create({\n        customerName: 'B',\n        items: [{ productName: 'Y', quantity: 1, price: 20 }],\n      });\n      expect(service.findAll()).toHaveLength(2);\n    });\n  });\n\n  describe('findOne', () => {\n    it('should return the order by id', () => {\n      const created = service.create({\n        customerName: 'C',\n        items: [{ productName: 'Z', quantity: 1, price: 5 }],\n      });\n      const found = service.findOne(created.id);\n      expect(found.id).toBe(created.id);\n    });\n\n    it('should throw NotFoundException', () => {\n      expect(() => service.findOne('bad-id')).toThrow(NotFoundException);\n    });\n  });\n\n  describe('update', () => {\n    it('should update fields and recalculate total when items change', () => {\n      const created = service.create({\n        customerName: 'D',\n        items: [{ productName: 'W', quantity: 1, price: 100 }],\n      });\n      const updated = service.update(created.id, {\n        items: [{ productName: 'W', quantity: 3, price: 100 }],\n      });\n      expect(updated.totalAmount).toBe(300);\n    });\n\n    it('should update status without changing total', () => {\n      const created = service.create({\n        customerName: 'E',\n        items: [{ productName: 'V', quantity: 1, price: 50 }],\n      });\n      const updated = service.update(created.id, { status: 'shipped' });\n      expect(updated.status).toBe('shipped');\n      expect(updated.totalAmount).toBe(50);\n    });\n\n    it('should throw NotFoundException for non-existent order', () => {\n      expect(() => service.update('bad-id', { status: 'cancelled' })).toThrow(\n        NotFoundException,\n      );\n    });\n  });\n\n  describe('remove', () => {\n    it('should remove the order', () => {\n      const created = service.create({\n        customerName: 'F',\n        items: [{ productName: 'U', quantity: 1, price: 10 }],\n      });\n      service.remove(created.id);\n      expect(service.findAll()).toHaveLength(0);\n    });\n\n    it('should throw NotFoundException for non-existent order', () => {\n      expect(() => service.remove('bad-id')).toThrow(NotFoundException);\n    });\n  });\n});\n"}, {"name": "orders.service.ts", "type": "text", "content": "import { Injectable, NotFoundException } from '@nestjs/common';\nimport { randomUUID } from 'crypto';\nimport { CreateOrderDto } from './dto/create-order.dto';\nimport { UpdateOrderDto } from './dto/update-order.dto';\nimport { Order } from './interfaces/order.interface';\n\n@Injectable()\nexport class OrdersService {\n  private readonly orders: Order[] = [];\n\n  create(createOrderDto: CreateOrderDto): Order {\n    const now = new Date();\n    const order: Order = {\n      id: randomUUID(),\n      customerName: createOrderDto.customerName,\n      items: createOrderDto.items,\n      totalAmount: createOrderDto.items.reduce(\n        (sum, item) => sum + item.price * item.quantity,\n        0,\n      ),\n      status: 'pending',\n      createdAt: now,\n      updatedAt: now,\n    };\n\n    this.orders.push(order);\n    return order;\n  }\n\n  findAll(): Order[] {\n    return this.orders;\n  }\n\n  findOne(id: string): Order {\n    const order = this.orders.find((o) => o.id === id);\n    if (!order) {\n      throw new NotFoundException(`Order with id \"${id}\" not found`);\n    }\n    return order;\n  }\n\n  update(id: string, updateOrderDto: UpdateOrderDto): Order {\n    const index = this.orders.findIndex((o) => o.id === id);\n    if (index === -1) {\n      throw new NotFoundException(`Order with id \"${id}\" not found`);\n    }\n\n    const existing = this.orders[index];\n    const updated: Order = {\n      ...existing,\n      ...updateOrderDto,\n      updatedAt: new Date(),\n    };\n\n    if (updateOrderDto.items) {\n      updated.totalAmount = updateOrderDto.items.reduce(\n        (sum, item) => sum + item.price * item.quantity,\n        0,\n      );\n    }\n\n    this.orders[index] = updated;\n    return updated;\n  }\n\n  remove(id: string): void {\n    const index = this.orders.findIndex((o) => o.id === id);\n    if (index === -1) {\n      throw new NotFoundException(`Order with id \"${id}\" not found`);\n    }\n    this.orders.splice(index, 1);\n  }\n}\n"}, {"name": "update-order.dto.ts", "type": "text", "content": "import {\n  IsString,\n  IsNotEmpty,\n  IsArray,\n  ValidateNested,\n  IsOptional,\n  IsIn,\n  ArrayMinSize,\n} from 'class-validator';\nimport { Type } from 'class-transformer';\nimport { OrderItemDto } from './create-order.dto';\n\nexport class UpdateOrderDto {\n  @IsOptional()\n  @IsString()\n  @IsNotEmpty()\n  customerName?: string;\n\n  @IsOptional()\n  @IsArray()\n  @ArrayMinSize(1)\n  @ValidateNested({ each: true })\n  @Type(() => OrderItemDto)\n  items?: OrderItemDto[];\n\n  @IsOptional()\n  @IsIn(['pending', 'confirmed', 'shipped', 'delivered', 'cancelled'])\n  status?: 'pending' | 'confirmed' | 'shipped' | 'delivered' | 'cancelled';\n}\n"}], "orders-crud-without_skill": [{"name": "app.module.ts", "type": "text", "content": "import { Module } from '@nestjs/common';\nimport { AppController } from './app.controller';\nimport { AppService } from './app.service';\nimport { AuthModule } from './auth/auth.module';\nimport { OrdersModule } from './orders/orders.module';\n\n@Module({\n  imports: [AuthModule, OrdersModule],\n  controllers: [AppController],\n  providers: [AppService],\n})\nexport class AppModule {}\n"}, {"name": "create-order.dto.ts", "type": "text", "content": "import {\n  IsString,\n  IsNotEmpty,\n  IsArray,\n  ValidateNested,\n  IsNumber,\n  Min,\n  ArrayMinSize,\n} from 'class-validator';\nimport { Type } from 'class-transformer';\n\nexport class OrderItemDto {\n  @IsString()\n  @IsNotEmpty()\n  productName: string;\n\n  @IsNumber()\n  @Min(1)\n  quantity: number;\n\n  @IsNumber()\n  @Min(0)\n  price: number;\n}\n\nexport class CreateOrderDto {\n  @IsString()\n  @IsNotEmpty()\n  customerName: string;\n\n  @IsArray()\n  @ArrayMinSize(1)\n  @ValidateNested({ each: true })\n  @Type(() => OrderItemDto)\n  items: OrderItemDto[];\n}\n"}, {"name": "order.interface.ts", "type": "text", "content": "export interface OrderItem {\n  productName: string;\n  quantity: number;\n  price: number;\n}\n\nexport interface Order {\n  id: string;\n  customerName: string;\n  items: OrderItem[];\n  totalAmount: number;\n  status: 'pending' | 'confirmed' | 'shipped' | 'delivered' | 'cancelled';\n  createdAt: Date;\n  updatedAt: Date;\n}\n"}, {"name": "orders.controller.spec.ts", "type": "text", "content": "import { Test, TestingModule } from '@nestjs/testing';\nimport { NotFoundException } from '@nestjs/common';\nimport { OrdersController } from './orders.controller';\nimport { OrdersService } from './orders.service';\nimport { CreateOrderDto } from './dto/create-order.dto';\n\ndescribe('OrdersController', () => {\n  let controller: OrdersController;\n\n  beforeEach(async () => {\n    const module: TestingModule = await Test.createTestingModule({\n      controllers: [OrdersController],\n      providers: [OrdersService],\n    }).compile();\n\n    controller = module.get<OrdersController>(OrdersController);\n  });\n\n  it('should be defined', () => {\n    expect(controller).toBeDefined();\n  });\n\n  describe('create', () => {\n    it('should create an order', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'John Doe',\n        items: [{ productName: 'Widget', quantity: 2, price: 10 }],\n      };\n      const result = controller.create(dto);\n      expect(result.customerName).toBe('John Doe');\n      expect(result.totalAmount).toBe(20);\n      expect(result.status).toBe('pending');\n      expect(result.id).toBeDefined();\n    });\n  });\n\n  describe('findAll', () => {\n    it('should return an array of orders', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'Jane Doe',\n        items: [{ productName: 'Gadget', quantity: 1, price: 50 }],\n      };\n      controller.create(dto);\n      const result = controller.findAll();\n      expect(result).toHaveLength(1);\n    });\n  });\n\n  describe('findOne', () => {\n    it('should return a single order', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'Jane Doe',\n        items: [{ productName: 'Gadget', quantity: 1, price: 50 }],\n      };\n      const created = controller.create(dto);\n      const result = controller.findOne(created.id);\n      expect(result.id).toBe(created.id);\n    });\n\n    it('should throw NotFoundException for non-existent order', () => {\n      expect(() => controller.findOne('non-existent')).toThrow(\n        NotFoundException,\n      );\n    });\n  });\n\n  describe('update', () => {\n    it('should update an order', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'Jane Doe',\n        items: [{ productName: 'Gadget', quantity: 1, price: 50 }],\n      };\n      const created = controller.create(dto);\n      const result = controller.update(created.id, { status: 'confirmed' });\n      expect(result.status).toBe('confirmed');\n    });\n  });\n\n  describe('remove', () => {\n    it('should remove an order', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'Jane Doe',\n        items: [{ productName: 'Gadget', quantity: 1, price: 50 }],\n      };\n      const created = controller.create(dto);\n      controller.remove(created.id);\n      expect(controller.findAll()).toHaveLength(0);\n    });\n\n    it('should throw NotFoundException for non-existent order', () => {\n      expect(() => controller.remove('non-existent')).toThrow(\n        NotFoundException,\n      );\n    });\n  });\n});\n"}, {"name": "orders.controller.ts", "type": "text", "content": "import {\n  Body,\n  Controller,\n  Delete,\n  Get,\n  HttpCode,\n  HttpStatus,\n  Param,\n  Patch,\n  Post,\n} from '@nestjs/common';\nimport { CreateOrderDto } from './dto/create-order.dto';\nimport { UpdateOrderDto } from './dto/update-order.dto';\nimport { Order } from './interfaces/order.interface';\nimport { OrdersService } from './orders.service';\n\n@Controller('orders')\nexport class OrdersController {\n  constructor(private readonly ordersService: OrdersService) {}\n\n  @Post()\n  create(@Body() createOrderDto: CreateOrderDto): Order {\n    return this.ordersService.create(createOrderDto);\n  }\n\n  @Get()\n  findAll(): Order[] {\n    return this.ordersService.findAll();\n  }\n\n  @Get(':id')\n  findOne(@Param('id') id: string): Order {\n    return this.ordersService.findOne(id);\n  }\n\n  @Patch(':id')\n  update(\n    @Param('id') id: string,\n    @Body() updateOrderDto: UpdateOrderDto,\n  ): Order {\n    return this.ordersService.update(id, updateOrderDto);\n  }\n\n  @Delete(':id')\n  @HttpCode(HttpStatus.NO_CONTENT)\n  remove(@Param('id') id: string): void {\n    this.ordersService.remove(id);\n  }\n}\n"}, {"name": "orders.module.ts", "type": "text", "content": "import { Module } from '@nestjs/common';\nimport { OrdersController } from './orders.controller';\nimport { OrdersService } from './orders.service';\n\n@Module({\n  controllers: [OrdersController],\n  providers: [OrdersService],\n  exports: [OrdersService],\n})\nexport class OrdersModule {}\n"}, {"name": "orders.service.spec.ts", "type": "text", "content": "import { NotFoundException } from '@nestjs/common';\nimport { Test, TestingModule } from '@nestjs/testing';\nimport { OrdersService } from './orders.service';\nimport { CreateOrderDto } from './dto/create-order.dto';\n\ndescribe('OrdersService', () => {\n  let service: OrdersService;\n\n  beforeEach(async () => {\n    const module: TestingModule = await Test.createTestingModule({\n      providers: [OrdersService],\n    }).compile();\n\n    service = module.get<OrdersService>(OrdersService);\n  });\n\n  it('should be defined', () => {\n    expect(service).toBeDefined();\n  });\n\n  describe('create', () => {\n    it('should create an order with calculated total', () => {\n      const dto: CreateOrderDto = {\n        customerName: 'Test User',\n        items: [\n          { productName: 'Item A', quantity: 2, price: 15 },\n          { productName: 'Item B', quantity: 1, price: 30 },\n        ],\n      };\n      const order = service.create(dto);\n      expect(order.id).toBeDefined();\n      expect(order.customerName).toBe('Test User');\n      expect(order.totalAmount).toBe(60);\n      expect(order.status).toBe('pending');\n      expect(order.items).toHaveLength(2);\n    });\n  });\n\n  describe('findAll', () => {\n    it('should return empty array initially', () => {\n      expect(service.findAll()).toEqual([]);\n    });\n\n    it('should return all created orders', () => {\n      service.create({\n        customerName: 'A',\n        items: [{ productName: 'X', quantity: 1, price: 10 }],\n      });\n      service.create({\n        customerName: 'B',\n        items: [{ productName: 'Y', quantity: 1, price: 20 }],\n      });\n      expect(service.findAll()).toHaveLength(2);\n    });\n  });\n\n  describe('findOne', () => {\n    it('should return the order by id', () => {\n      const created = service.create({\n        customerName: 'C',\n        items: [{ productName: 'Z', quantity: 1, price: 5 }],\n      });\n      const found = service.findOne(created.id);\n      expect(found.id).toBe(created.id);\n    });\n\n    it('should throw NotFoundException', () => {\n      expect(() => service.findOne('bad-id')).toThrow(NotFoundException);\n    });\n  });\n\n  describe('update', () => {\n    it('should update fields and recalculate total when items change', () => {\n      const created = service.create({\n        customerName: 'D',\n        items: [{ productName: 'W', quantity: 1, price: 100 }],\n      });\n      const updated = service.update(created.id, {\n        items: [{ productName: 'W', quantity: 3, price: 100 }],\n      });\n      expect(updated.totalAmount).toBe(300);\n    });\n\n    it('should update status without changing total', () => {\n      const created = service.create({\n        customerName: 'E',\n        items: [{ productName: 'V', quantity: 1, price: 50 }],\n      });\n      const updated = service.update(created.id, { status: 'shipped' });\n      expect(updated.status).toBe('shipped');\n      expect(updated.totalAmount).toBe(50);\n    });\n\n    it('should throw NotFoundException for non-existent order', () => {\n      expect(() => service.update('bad-id', { status: 'cancelled' })).toThrow(\n        NotFoundException,\n      );\n    });\n  });\n\n  describe('remove', () => {\n    it('should remove the order', () => {\n      const created = service.create({\n        customerName: 'F',\n        items: [{ productName: 'U', quantity: 1, price: 10 }],\n      });\n      service.remove(created.id);\n      expect(service.findAll()).toHaveLength(0);\n    });\n\n    it('should throw NotFoundException for non-existent order', () => {\n      expect(() => service.remove('bad-id')).toThrow(NotFoundException);\n    });\n  });\n});\n"}, {"name": "orders.service.ts", "type": "text", "content": "import { Injectable, NotFoundException } from '@nestjs/common';\nimport { randomUUID } from 'crypto';\nimport { CreateOrderDto } from './dto/create-order.dto';\nimport { UpdateOrderDto } from './dto/update-order.dto';\nimport { Order } from './interfaces/order.interface';\n\n@Injectable()\nexport class OrdersService {\n  private readonly orders: Order[] = [];\n\n  create(createOrderDto: CreateOrderDto): Order {\n    const now = new Date();\n    const order: Order = {\n      id: randomUUID(),\n      customerName: createOrderDto.customerName,\n      items: createOrderDto.items,\n      totalAmount: createOrderDto.items.reduce(\n        (sum, item) => sum + item.price * item.quantity,\n        0,\n      ),\n      status: 'pending',\n      createdAt: now,\n      updatedAt: now,\n    };\n\n    this.orders.push(order);\n    return order;\n  }\n\n  findAll(): Order[] {\n    return this.orders;\n  }\n\n  findOne(id: string): Order {\n    const order = this.orders.find((o) => o.id === id);\n    if (!order) {\n      throw new NotFoundException(`Order with id \"${id}\" not found`);\n    }\n    return order;\n  }\n\n  update(id: string, updateOrderDto: UpdateOrderDto): Order {\n    const index = this.orders.findIndex((o) => o.id === id);\n    if (index === -1) {\n      throw new NotFoundException(`Order with id \"${id}\" not found`);\n    }\n\n    const existing = this.orders[index];\n    const updated: Order = {\n      ...existing,\n      ...updateOrderDto,\n      updatedAt: new Date(),\n    };\n\n    if (updateOrderDto.items) {\n      updated.totalAmount = updateOrderDto.items.reduce(\n        (sum, item) => sum + item.price * item.quantity,\n        0,\n      );\n    }\n\n    this.orders[index] = updated;\n    return updated;\n  }\n\n  remove(id: string): void {\n    const index = this.orders.findIndex((o) => o.id === id);\n    if (index === -1) {\n      throw new NotFoundException(`Order with id \"${id}\" not found`);\n    }\n    this.orders.splice(index, 1);\n  }\n}\n"}, {"name": "update-order.dto.ts", "type": "text", "content": "import {\n  IsString,\n  IsNotEmpty,\n  IsArray,\n  ValidateNested,\n  IsOptional,\n  IsIn,\n  ArrayMinSize,\n} from 'class-validator';\nimport { Type } from 'class-transformer';\nimport { OrderItemDto } from './create-order.dto';\n\nexport class UpdateOrderDto {\n  @IsOptional()\n  @IsString()\n  @IsNotEmpty()\n  customerName?: string;\n\n  @IsOptional()\n  @IsArray()\n  @ArrayMinSize(1)\n  @ValidateNested({ each: true })\n  @Type(() => OrderItemDto)\n  items?: OrderItemDto[];\n\n  @IsOptional()\n  @IsIn(['pending', 'confirmed', 'shipped', 'delivered', 'cancelled'])\n  status?: 'pending' | 'confirmed' | 'shipped' | 'delivered' | 'cancelled';\n}\n"}], "auth-jwt-with_skill": [{"name": "app.module.ts", "type": "text", "content": "import { Module } from '@nestjs/common';\nimport { AppController } from './app.controller';\nimport { AppService } from './app.service';\nimport { AuthModule } from './auth/auth.module';\nimport { OrdersModule } from './orders/orders.module';\n\n@Module({\n  imports: [AuthModule, OrdersModule],\n  controllers: [AppController],\n  providers: [AppService],\n})\nexport class AppModule {}\n"}, {"name": "auth.controller.ts", "type": "text", "content": "import {\n  Controller,\n  Post,\n  Body,\n  Get,\n  UseGuards,\n  Request,\n  HttpCode,\n  HttpStatus,\n} from '@nestjs/common';\nimport { AuthService } from './auth.service';\nimport { RegisterDto } from './dto/register.dto';\nimport { LoginDto } from './dto/login.dto';\nimport { JwtAuthGuard } from './guards/jwt-auth.guard';\n\n@Controller('auth')\nexport class AuthController {\n  constructor(private readonly authService: AuthService) {}\n\n  @Post('register')\n  async register(@Body() dto: RegisterDto) {\n    return this.authService.register(dto);\n  }\n\n  @Post('login')\n  @HttpCode(HttpStatus.OK)\n  async login(@Body() dto: LoginDto) {\n    return this.authService.login(dto);\n  }\n\n  @Get('profile')\n  @UseGuards(JwtAuthGuard)\n  getProfile(@Request() req: any) {\n    return req.user;\n  }\n}\n"}, {"name": "auth.module.ts", "type": "text", "content": "import { Module } from '@nestjs/common';\nimport { JwtModule } from '@nestjs/jwt';\nimport { PassportModule } from '@nestjs/passport';\nimport { AuthController } from './auth.controller';\nimport { AuthService } from './auth.service';\nimport { JwtStrategy } from './strategies/jwt.strategy';\n\n@Module({\n  imports: [\n    PassportModule,\n    JwtModule.register({\n      secret:\n        process.env.JWT_SECRET || 'default-jwt-secret-change-in-production',\n      signOptions: { expiresIn: '1h' },\n    }),\n  ],\n  controllers: [AuthController],\n  providers: [AuthService, JwtStrategy],\n  exports: [AuthService],\n})\nexport class AuthModule {}\n"}, {"name": "auth.service.ts", "type": "text", "content": "import {\n  Injectable,\n  ConflictException,\n  UnauthorizedException,\n} from '@nestjs/common';\nimport { JwtService } from '@nestjs/jwt';\nimport * as bcrypt from 'bcrypt';\nimport { RegisterDto } from './dto/register.dto';\nimport { LoginDto } from './dto/login.dto';\nimport { JwtPayload } from './interfaces/jwt-payload.interface';\n\ninterface StoredUser {\n  id: string;\n  name: string;\n  email: string;\n  passwordHash: string;\n}\n\n@Injectable()\nexport class AuthService {\n  private readonly users: StoredUser[] = [];\n  private idCounter = 0;\n\n  constructor(private readonly jwtService: JwtService) {}\n\n  async register(dto: RegisterDto): Promise<{\n    accessToken: string;\n    user: { id: string; name: string; email: string };\n  }> {\n    const existing = this.users.find((u) => u.email === dto.email);\n    if (existing) {\n      throw new ConflictException('Email already registered');\n    }\n\n    const salt = await bcrypt.genSalt(10);\n    const passwordHash = await bcrypt.hash(dto.password, salt);\n\n    this.idCounter++;\n    const user: StoredUser = {\n      id: String(this.idCounter),\n      name: dto.name,\n      email: dto.email,\n      passwordHash,\n    };\n    this.users.push(user);\n\n    const payload: JwtPayload = { sub: user.id, email: user.email };\n    const accessToken = this.jwtService.sign(payload);\n\n    return {\n      accessToken,\n      user: { id: user.id, name: user.name, email: user.email },\n    };\n  }\n\n  async login(dto: LoginDto): Promise<{\n    accessToken: string;\n    user: { id: string; name: string; email: string };\n  }> {\n    const user = this.users.find((u) => u.email === dto.email);\n    if (!user) {\n      throw new UnauthorizedException('Invalid email or password');\n    }\n\n    const isPasswordValid = await bcrypt.compare(\n      dto.password,\n      user.passwordHash,\n    );\n    if (!isPasswordValid) {\n      throw new UnauthorizedException('Invalid email or password');\n    }\n\n    const payload: JwtPayload = { sub: user.id, email: user.email };\n    const accessToken = this.jwtService.sign(payload);\n\n    return {\n      accessToken,\n      user: { id: user.id, name: user.name, email: user.email },\n    };\n  }\n\n  async validateUserById(\n    id: string,\n  ): Promise<{ id: string; name: string; email: string } | null> {\n    const user = this.users.find((u) => u.id === id);\n    if (!user) {\n      return null;\n    }\n    return { id: user.id, name: user.name, email: user.email };\n  }\n}\n"}, {"name": "jwt-auth.guard.ts", "type": "text", "content": "import { Injectable } from '@nestjs/common';\nimport { AuthGuard } from '@nestjs/passport';\n\n@Injectable()\nexport class JwtAuthGuard extends AuthGuard('jwt') {}\n"}, {"name": "jwt-payload.interface.ts", "type": "text", "content": "export interface JwtPayload {\n  sub: string;\n  email: string;\n}\n"}, {"name": "jwt.strategy.ts", "type": "text", "content": "import { Injectable, UnauthorizedException } from '@nestjs/common';\nimport { PassportStrategy } from '@nestjs/passport';\nimport { ExtractJwt, Strategy } from 'passport-jwt';\nimport { AuthService } from '../auth.service';\nimport { JwtPayload } from '../interfaces/jwt-payload.interface';\n\n@Injectable()\nexport class JwtStrategy extends PassportStrategy(Strategy) {\n  constructor(private readonly authService: AuthService) {\n    super({\n      jwtFromRequest: ExtractJwt.fromAuthHeaderAsBearerToken(),\n      ignoreExpiration: false,\n      secretOrKey:\n        process.env.JWT_SECRET || 'default-jwt-secret-change-in-production',\n    });\n  }\n\n  async validate(payload: JwtPayload) {\n    const user = await this.authService.validateUserById(payload.sub);\n    if (!user) {\n      throw new UnauthorizedException();\n    }\n    return user;\n  }\n}\n"}, {"name": "login.dto.ts", "type": "text", "content": "import { IsEmail, IsString } from 'class-validator';\n\nexport class LoginDto {\n  @IsEmail()\n  email: string;\n\n  @IsString()\n  password: string;\n}\n"}, {"name": "main.ts", "type": "text", "content": "import { NestFactory } from '@nestjs/core';\nimport { ValidationPipe } from '@nestjs/common';\nimport { AppModule } from './app.module';\n\nasync function bootstrap() {\n  const app = await NestFactory.create(AppModule);\n  app.useGlobalPipes(\n    new ValidationPipe({\n      whitelist: true,\n      forbidNonWhitelisted: true,\n      transform: true,\n    }),\n  );\n  await app.listen(process.env.PORT ?? 3000);\n}\nbootstrap();\n"}, {"name": "register.dto.ts", "type": "text", "content": "import { IsEmail, IsString, MinLength, MaxLength } from 'class-validator';\n\nexport class RegisterDto {\n  @IsString()\n  @MinLength(2)\n  @MaxLength(50)\n  name: string;\n\n  @IsEmail()\n  email: string;\n\n  @IsString()\n  @MinLength(8)\n  @MaxLength(128)\n  password: string;\n}\n"}], "auth-jwt-without_skill": [{"name": "app.module.ts", "type": "text", "content": "import { Module } from '@nestjs/common';\nimport { AppController } from './app.controller';\nimport { AppService } from './app.service';\nimport { AuthModule } from './auth/auth.module';\nimport { OrdersModule } from './orders/orders.module';\n\n@Module({\n  imports: [AuthModule, OrdersModule],\n  controllers: [AppController],\n  providers: [AppService],\n})\nexport class AppModule {}\n"}, {"name": "auth.controller.ts", "type": "text", "content": "import {\n  Controller,\n  Post,\n  Body,\n  Get,\n  UseGuards,\n  Request,\n  HttpCode,\n  HttpStatus,\n} from '@nestjs/common';\nimport { AuthService } from './auth.service';\nimport { RegisterDto } from './dto/register.dto';\nimport { LoginDto } from './dto/login.dto';\nimport { JwtAuthGuard } from './guards/jwt-auth.guard';\n\n@Controller('auth')\nexport class AuthController {\n  constructor(private readonly authService: AuthService) {}\n\n  @Post('register')\n  async register(@Body() dto: RegisterDto) {\n    return this.authService.register(dto);\n  }\n\n  @Post('login')\n  @HttpCode(HttpStatus.OK)\n  async login(@Body() dto: LoginDto) {\n    return this.authService.login(dto);\n  }\n\n  @Get('profile')\n  @UseGuards(JwtAuthGuard)\n  getProfile(@Request() req: any) {\n    return req.user;\n  }\n}\n"}, {"name": "auth.module.ts", "type": "text", "content": "import { Module } from '@nestjs/common';\nimport { JwtModule } from '@nestjs/jwt';\nimport { PassportModule } from '@nestjs/passport';\nimport { AuthController } from './auth.controller';\nimport { AuthService } from './auth.service';\nimport { JwtStrategy } from './strategies/jwt.strategy';\n\n@Module({\n  imports: [\n    PassportModule,\n    JwtModule.register({\n      secret:\n        process.env.JWT_SECRET || 'default-jwt-secret-change-in-production',\n      signOptions: { expiresIn: '1h' },\n    }),\n  ],\n  controllers: [AuthController],\n  providers: [AuthService, JwtStrategy],\n  exports: [AuthService],\n})\nexport class AuthModule {}\n"}, {"name": "auth.service.ts", "type": "text", "content": "import {\n  Injectable,\n  ConflictException,\n  UnauthorizedException,\n} from '@nestjs/common';\nimport { JwtService } from '@nestjs/jwt';\nimport * as bcrypt from 'bcrypt';\nimport { RegisterDto } from './dto/register.dto';\nimport { LoginDto } from './dto/login.dto';\nimport { JwtPayload } from './interfaces/jwt-payload.interface';\n\ninterface StoredUser {\n  id: string;\n  name: string;\n  email: string;\n  passwordHash: string;\n}\n\n@Injectable()\nexport class AuthService {\n  private readonly users: StoredUser[] = [];\n  private idCounter = 0;\n\n  constructor(private readonly jwtService: JwtService) {}\n\n  async register(dto: RegisterDto): Promise<{\n    accessToken: string;\n    user:     // ---- State ----
    let feedbackMap = {};  // run_id -> feedback text
    let currentIndex = 0;
    let visitedRuns = new Set();

    // ---- Init ----
    async function init() {
      // Load saved feedback from server — but only if this isn't a fresh
      // iteration (indicated by previous_feedback being present). When
      // previous feedback exists, the feedback.json on disk is stale from
      // the prior iteration and should not pre-fill the textareas.
      const hasPrevious = Object.keys(EMBEDDED_DATA.previous_feedback || {}).length > 0
        || Object.keys(EMBEDDED_DATA.previous_outputs || {}).length > 0;
      if (!hasPrevious) {
        try {
          const resp = await fetch("/api/feedback");
          const data = await resp.json();
          if (data.reviews) {
            for (const r of data.reviews) feedbackMap[r.run_id] = r.feedback;
          }
        } catch { /* first run, no feedback yet */ }
      }

      document.getElementById("skill-name").textContent = EMBEDDED_DATA.skill_name;
      showRun(0);

      // Wire up feedback auto-save
      const textarea = document.getElementById("feedback");
      let saveTimeout = null;
      textarea.addEventListener("input", () => {
        clearTimeout(saveTimeout);
        document.getElementById("feedback-status").textContent = "";
        saveTimeout = setTimeout(() => saveCurrentFeedback(), 800);
      });
    }

    // ---- Navigation ----
    function navigate(delta) {
      const newIndex = currentIndex + delta;
      if (newIndex >= 0 && newIndex < EMBEDDED_DATA.runs.length) {
        saveCurrentFeedback();
        showRun(newIndex);
      }
    }

    function updateNavButtons() {
      document.getElementById("prev-btn").disabled = currentIndex === 0;
      document.getElementById("next-btn").disabled =
        currentIndex === EMBEDDED_DATA.runs.length - 1;
    }

    // ---- Show a run ----
    function showRun(index) {
      currentIndex = index;
      const run = EMBEDDED_DATA.runs[index];

      // Progress
      document.getElementById("progress").textContent =
        `${index + 1} of ${EMBEDDED_DATA.runs.length}`;

      // Prompt
      document.getElementById("prompt-text").textContent = run.prompt;

      // Config badge
      const badge = document.getElementById("config-badge");
      const configMatch = run.id.match(/(with_skill|without_skill|new_skill|old_skill)/);
      if (configMatch) {
        const config = configMatch[1];
        const isBaseline = config === "without_skill" || config === "old_skill";
        badge.textContent = config.replace(/_/g, " ");
        badge.className = "config-badge " + (isBaseline ? "config-baseline" : "config-primary");
        badge.style.display = "inline-block";
      } else {
        badge.style.display = "none";
      }

      // Outputs
      renderOutputs(run);

      // Previous outputs
      renderPrevOutputs(run);

      // Grades
      renderGrades(run);

      // Previous feedback
      const prevFb = (EMBEDDED_DATA.previous_feedback || {})[run.id];
      const prevEl = document.getElementById("prev-feedback");
      if (prevFb) {
        document.getElementById("prev-feedback-text").textContent = prevFb;
        prevEl.style.display = "block";
      } else {
        prevEl.style.display = "none";
      }

      // Feedback
      document.getElementById("feedback").value = feedbackMap[run.id] || "";
      document.getElementById("feedback-status").textContent = "";

      updateNavButtons();

      // Track visited runs and promote done button when all visited
      visitedRuns.add(index);
      const doneBtn = document.getElementById("done-btn");
      if (visitedRuns.size >= EMBEDDED_DATA.runs.length) {
        doneBtn.classList.add("ready");
      }

      // Scroll main content to top
      document.querySelector(".main").scrollTop = 0;
    }

    // ---- Render outputs ----
    function renderOutputs(run) {
      const container = document.getElementById("outputs-body");
      container.innerHTML = "";

      const outputs = run.outputs || [];
      if (outputs.length === 0) {
        container.innerHTML = '<div class="empty-state">출력 파일 없음</div>';
        return;
      }

      for (const file of outputs) {
        const fileDiv = document.createElement("div");
        fileDiv.className = "output-file";

        // Always show file header with download link
        const header = document.createElement("div");
        header.className = "output-file-header";
        const nameSpan = document.createElement("span");
        nameSpan.textContent = file.name;
        header.appendChild(nameSpan);
        const dlBtn = document.createElement("a");
        dlBtn.className = "dl-btn";
        dlBtn.textContent = "다운로드";
        dlBtn.download = file.name;
        dlBtn.href = getDownloadUri(file);
        header.appendChild(dlBtn);
        fileDiv.appendChild(header);

        const content = document.createElement("div");
        content.className = "output-file-content";

        if (file.type === "text") {
          const pre = document.createElement("pre");
          pre.textContent = file.content;
          content.appendChild(pre);
        } else if (file.type === "image") {
          const img = document.createElement("img");
          img.src = file.data_uri;
          img.alt = file.name;
          content.appendChild(img);
        } else if (file.type === "pdf") {
          const iframe = document.createElement("iframe");
          iframe.src = file.data_uri;
          content.appendChild(iframe);
        } else if (file.type === "xlsx") {
          renderXlsx(content, file.data_b64);
        } else if (file.type === "binary") {
          const a = document.createElement("a");
          a.className = "download-link";
          a.href = file.data_uri;
          a.download = file.name;
          a.textContent = file.name + " 다운로드";
          content.appendChild(a);
        } else if (file.type === "error") {
          const pre = document.createElement("pre");
          pre.textContent = file.content;
          pre.style.color = "var(--red)";
          content.appendChild(pre);
        }

        fileDiv.appendChild(content);
        container.appendChild(fileDiv);
      }
    }

    // ---- XLSX rendering via SheetJS ----
    function renderXlsx(container, b64Data) {
      try {
        const raw = Uint8Array.from(atob(b64Data), c => c.charCodeAt(0));
        const wb = XLSX.read(raw, { type: "array" });

        for (let i = 0; i < wb.SheetNames.length; i++) {
          const sheetName = wb.SheetNames[i];
          const ws = wb.Sheets[sheetName];

          if (wb.SheetNames.length > 1) {
            const sheetLabel = document.createElement("div");
            sheetLabel.style.cssText =
              "font-weight:600; font-size:0.8rem; color:#b0aea5; margin-top:0.5rem; margin-bottom:0.25rem;";
            sheetLabel.textContent = "시트: " + sheetName;
            container.appendChild(sheetLabel);
          }

          const htmlStr = XLSX.utils.sheet_to_html(ws, { editable: false });
          const wrapper = document.createElement("div");
          wrapper.innerHTML = htmlStr;
          container.appendChild(wrapper);
        }
      } catch (err) {
        container.textContent = "스프레드시트 렌더링 오류: " + err.message;
      }
    }

    // ---- Grades ----
    function renderGrades(run) {
      const section = document.getElementById("grades-section");
      const content = document.getElementById("grades-content");

      if (!run.grading) {
        section.style.display = "none";
        return;
      }

      const grading = run.grading;
      section.style.display = "block";
      // Reset to collapsed
      content.classList.remove("open");
      document.getElementById("grades-arrow").classList.remove("open");

      const summary = grading.summary || {};
      const expectations = grading.expectations || [];

      let html = '<div style="padding: 1rem;">';

      // Summary line
      const passRate = summary.pass_rate != null
        ? Math.round(summary.pass_rate * 100) + "%"
        : "?";
      const badgeClass = summary.pass_rate >= 0.8 ? "grade-pass" : summary.pass_rate >= 0.5 ? "" : "grade-fail";
      html += '<div class="grades-summary">';
      html += '<span class="grade-badge ' + badgeClass + '">' + passRate + '</span>';
      html += '<span>' + (summary.total || 0) + '개 중 ' + (summary.passed || 0) + '개 통과, ' + (summary.failed || 0) + '개 실패</span>';
      html += '</div>';

      // Assertions list
      html += '<ul class="assertion-list">';
      for (const exp of expectations) {
        const statusClass = exp.passed ? "pass" : "fail";
        const statusIcon = exp.passed ? "\u2713" : "\u2717";
        html += '<li class="assertion-item">';
        html += '<span class="assertion-status ' + statusClass + '">' + statusIcon + '</span>';
        html += '<span>' + escapeHtml(exp.text) + '</span>';
        if (exp.evidence) {
          html += '<div class="assertion-evidence">' + escapeHtml(exp.evidence) + '</div>';
        }
        html += '</li>';
      }
      html += '</ul>';

      html += '</div>';
      content.innerHTML = html;
    }

    function toggleGrades() {
      const content = document.getElementById("grades-content");
      const arrow = document.getElementById("grades-arrow");
      content.classList.toggle("open");
      arrow.classList.toggle("open");

        if (file.type === "text") {

        } else if (file.type === "image") {

        } else if (file.type === "pdf") {

          a.textContent = file.name + " 다운로드";
          fc.appendChild(a);
        }

        fileDiv.appendChild(fc);
        wrapper.appendChild(fileDiv);
      }

      content.appendChild(wrapper);
    }

    function togglePrevOutputs() {
      const content = document.getElementById("prev-outputs-content");
      const arrow = document.getElementById("prev-outputs-arrow");
      content.classList.toggle("open");
      arrow.classList.toggle("open");
    }

    // ---- Feedback (saved to server -> feedback.json) ----
    function saveCurrentFeedback() {
      const run = EMBEDDED_DATA.runs[currentIndex];
      const text = document.getElementById("feedback").value;

      if (text.trim() === "") {
        delete feedbackMap[run.id];
      } else {
        feedbackMap[run.id] = text;
      }

      // Build reviews array from map
      const reviews = [];
      for (const [run_id, feedback] of Object.entries(feedbackMap)) {
        if (feedback.trim()) {
          reviews.push({ run_id, feedback, timestamp: new Date().toISOString() });
        }
      }

      fetch("/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ reviews, status: "in_progress" }),
      }).then(() => {
        document.getElementById("feedback-status").textContent = "저장됨";
      }).catch(() => {
        // Static mode or server unavailable — no-op on auto-save,
        // feedback will be downloaded on final submit
        document.getElementById("feedback-status").textContent = "제출 시 다운로드됩니다";
      });
    }

    // ---- Done ----
    function showDoneDialog() {
      // Save current textarea to feedbackMap (but don't POST yet)
      const run = EMBEDDED_DATA.runs[currentIndex];
      const text = document.getElementById("feedback").value;
      if (text.trim() === "") {
        delete feedbackMap[run.id];
      } else {
        feedbackMap[run.id] = text;
      }

      // POST once with status: complete — include ALL runs so the model
      // can distinguish "no feedback" (looks good) from "not reviewed"
      const reviews = [];
      const ts = new Date().toISOString();
      for (const r of EMBEDDED_DATA.runs) {
        reviews.push({ run_id: r.id, feedback: feedbackMap[r.id] || "", timestamp: ts });
      }
      const payload = JSON.stringify({ reviews, status: "complete" }, null, 2);
      fetch("/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: payload,
      }).then(() => {
        document.getElementById("done-overlay").classList.add("visible");
      }).catch(() => {
        // Server not available (static mode) — download as file
        const blob = new Blob([payload], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "feedback.json";
        a.click();
        URL.revokeObjectURL(url);
        document.getElementById("done-overlay").classList.add("visible");
      });
    }
