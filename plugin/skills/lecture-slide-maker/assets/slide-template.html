<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; overflow: hidden; }
    .slide { width: 100vw; height: 100vh; display: none; padding: 50px 100px; flex-direction: column; animation: fadeIn 0.3s ease; overflow-y: auto; }
    .slide.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .slide.cover, .slide.section { justify-content: center; align-items: center; text-align: center; }
    .slide.cover { background: radial-gradient(ellipse at center, #1e3a5f 0%, #0f172a 70%); }
    .slide.section.part1 { background: radial-gradient(ellipse at center, #1e3a5f 0%, #0f172a 70%); }
    .slide.section.part2 { background: radial-gradient(ellipse at center, #1a3a2a 0%, #0f172a 70%); }
    .slide.section.part2 h1 { color: #4ade80; }
    .slide.section.intermission { background: radial-gradient(ellipse at center, #3d2a1a 0%, #0f172a 70%); }
    .slide.section.intermission h1 { color: #fbbf24; }
    h1 { font-size: 56px; font-weight: 800; color: #60a5fa; margin-bottom: 20px; }
    h2 { font-size: 36px; font-weight: 700; color: #f1f5f9; margin-bottom: 24px; }
    h3 { font-size: 24px; font-weight: 600; color: #94a3b8; margin-bottom: 16px; }
    p { font-size: 20px; line-height: 1.8; color: #cbd5e1; margin-bottom: 12px; }
    .subtitle { font-size: 24px; color: #94a3b8; }
    .emoji { font-size: 72px; margin-bottom: 20px; }
    .tags { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 24px; }
    .tag { background: rgba(59,130,246,0.2); border: 1px solid #3b82f6; padding: 10px 20px; border-radius: 25px; font-size: 16px; color: #93c5fd; }
    .meta-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-top: 40px; max-width: 800px; }
    .meta-item { background: rgba(30,41,59,0.8); padding: 20px; border-radius: 12px; border: 1px solid #334155; }
    .meta-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .meta-value { font-size: 18px; color: #f1f5f9; font-weight: 500; }
    .slide-header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #334155; }
    .lesson-num { font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .objectives { display: flex; flex-direction: column; gap: 16px; margin: 20px 0; }
    .objective { display: flex; align-items: center; gap: 14px; background: rgba(34,197,94,0.1); padding: 16px 20px; border-radius: 10px; border-left: 4px solid #22c55e; }
    .objective-text { font-size: 18px; color: #d1fae5; }
    .code-block { background: #0d1117; border-radius: 12px; overflow: hidden; margin: 16px 0; border: 1px solid #30363d; }
    .code-header { background: #161b22; padding: 10px 16px; font-size: 13px; color: #8b949e; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 8px; }
    .dots { display: flex; gap: 6px; margin-right: 10px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27ca40; }
    .code-content { padding: 16px 20px; overflow-x: auto; }
    .code-content pre { font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; font-size: 14px; line-height: 1.6; margin: 0; }
    code { background: #1e293b; padding: 3px 8px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #f472b6; }
    .tip-box { border-radius: 12px; padding: 20px 24px; margin: 16px 0; }
    .tip-box.tip { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.3); }
    .tip-box.good { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); }
    .tip-box.bad { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); }
    .tip-box.warning { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3); }
    .tip-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .tip-box.tip .tip-title { color: #60a5fa; }
    .tip-box.good .tip-title { color: #4ade80; }
    .tip-box.bad .tip-title { color: #f87171; }
    .tip-box.warning .tip-title { color: #fbbf24; }
    .tip-content { font-size: 16px; color: #cbd5e1; line-height: 1.6; }
    table { width: 100%; border-collapse: collapse; margin: 16px 0; background: rgba(30,41,59,0.5); border-radius: 10px; overflow: hidden; }
    th { background: #334155; color: #f1f5f9; padding: 12px 16px; text-align: left; font-weight: 600; font-size: 14px; }
    td { padding: 12px 16px; border-top: 1px solid #334155; color: #cbd5e1; font-size: 14px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin: 20px 0; }
    .col { display: flex; flex-direction: column; }
    ul { list-style: none; margin: 12px 0; }
    ul li { position: relative; padding-left: 24px; margin-bottom: 10px; font-size: 18px; color: #cbd5e1; }
    ul li::before { content: '•'; position: absolute; left: 0; color: #60a5fa; }
    .toc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 32px; }
    .toc-section h3 { color: #60a5fa; font-size: 18px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid #3b82f6; }
    .toc-section.part2 h3 { color: #4ade80; border-bottom-color: #22c55e; }
    .toc-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; font-size: 16px; color: #cbd5e1; }
    .toc-num { width: 28px; height: 28px; background: #334155; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #94a3b8; }
    .quiz-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; margin: 20px 0; }
    .quiz-item { background: rgba(30,41,59,0.6); padding: 20px; border-radius: 10px; border: 1px solid #334155; }
    .quiz-item h4 { color: #f1f5f9; font-size: 16px; margin-bottom: 12px; }
    .answers-box { background: linear-gradient(135deg, rgba(245,158,11,0.15) 0%, rgba(30,41,59,0.8) 100%); border-radius: 12px; padding: 24px; margin-top: 24px; border: 1px solid rgba(245,158,11,0.3); }
    .answers-box h3 { color: #fbbf24; margin-bottom: 12px; font-size: 18px; }
    .answers-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
    .answer-item { text-align: center; }
    .answer-item .label { font-size: 12px; color: #94a3b8; }
    .answer-item .value { font-size: 16px; color: #fef3c7; font-weight: 600; }
    .summary-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin: 20px 0; }
    .summary-item { background: rgba(30,41,59,0.6); padding: 20px; border-radius: 10px; border: 1px solid #334155; }
    .summary-item h4 { color: #60a5fa; font-size: 16px; margin-bottom: 8px; }
    .summary-item p { font-size: 14px; color: #94a3b8; margin: 0; }
    .progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); transition: width 0.3s; z-index: 1000; }
    .nav-controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 16px; background: rgba(15,23,42,0.95); padding: 12px 24px; border-radius: 40px; border: 1px solid #334155; backdrop-filter: blur(10px); z-index: 100; }
    .nav-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: #334155; color: #f1f5f9; font-size: 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .nav-btn:hover { background: #3b82f6; transform: scale(1.1); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .slide-counter { font-size: 14px; color: #94a3b8; min-width: 70px; text-align: center; }
    .slide-counter .current { color: #f1f5f9; font-weight: 600; }
    .keyboard-hint { position: fixed; bottom: 30px; right: 30px; font-size: 12px; color: #475569; }
    kbd { background: #334155; padding: 3px 6px; border-radius: 4px; }
    @media (max-width: 1024px) {
      .slide { padding: 30px 40px; }
      h1 { font-size: 40px; }
      h2 { font-size: 28px; }
      .two-col, .toc-grid, .quiz-grid, .summary-grid { grid-template-columns: 1fr; }
      .meta-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="progress-bar" id="progressBar"></div>

  <!-- 슬라이드 1: 표지 -->
  <div class="slide cover active">
    <h1>{{MAIN_TITLE}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
    <div class="tags">
      <!-- {{TAGS}} -->
    </div>
    <div class="meta-grid">
      <div class="meta-item"><div class="meta-label">수업 시간</div><div class="meta-value">{{DURATION}}</div></div>
      <div class="meta-item"><div class="meta-label">대상</div><div class="meta-value">{{TARGET}}</div></div>
      <div class="meta-item"><div class="meta-label">구성</div><div class="meta-value">{{STRUCTURE}}</div></div>
    </div>
  </div>

  <!-- 슬라이드 2: 목차 -->
  <div class="slide">
    <h2>📚 목차</h2>
    <div class="toc-grid">
      <div class="toc-section">
        <h3>PART 1: {{PART1_TITLE}}</h3>
        <!-- {{PART1_ITEMS}} -->
      </div>
      <div class="toc-section part2">
        <h3>PART 2: {{PART2_TITLE}}</h3>
        <!-- {{PART2_ITEMS}} -->
      </div>
    </div>
  </div>

  <!-- {{SLIDES}} -->

  <!-- 네비게이션 -->
  <div class="nav-controls">
    <button class="nav-btn" id="prevBtn" onclick="prev()">←</button>
    <div class="slide-counter"><span class="current" id="cur">1</span> / <span id="total">0</span></div>
    <button class="nav-btn" id="nextBtn" onclick="next()">→</button>
  </div>
  <div class="keyboard-hint"><kbd>←</kbd> <kbd>→</kbd> 또는 <kbd>Space</kbd></div>

  <script>
    hljs.highlightAll();
    let cur = 0;
    const slides = document.querySelectorAll('.slide');
    const total = slides.length;
    document.getElementById('total').textContent = total;
    
    function show(i) {
      slides.forEach(s => s.classList.remove('active'));
      slides[i].classList.add('active');
      document.getElementById('cur').textContent = i + 1;
      document.getElementById('progressBar').style.width = ((i + 1) / total * 100) + '%';
      document.getElementById('prevBtn').disabled = i === 0;
      document.getElementById('nextBtn').disabled = i === total - 1;
    }
    function next() { if (cur < total - 1) show(++cur); }
    function prev() { if (cur > 0) show(--cur); }
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
    });
    let tx = 0;
    document.addEventListener('touchstart', e => tx = e.changedTouches[0].screenX);
    document.addEventListener('touchend', e => {
      const diff = tx - e.changedTouches[0].screenX;
      if (diff > 50) next();
      else if (diff < -50) prev();
    });
    show(0);
  </script>
</body>
</html>
